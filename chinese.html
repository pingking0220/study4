<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四下國語 期末複習｜第7～12課（南一版）</title>
<style>
  :root{
    --bg:#fbf5f4; --card:#ffffff; --ink:#3a2230; --muted:#7a6470;
    --u3:#c0392b; --u3-soft:#f7e4e1;
    --u4:#7c4dbd; --u4-soft:#efe7f9;
    --line:#ecdfe2; --shadow:0 6px 20px rgba(58,34,48,.08);
    --ok:#16a34a; --no:#dc2626; --accent:#c0392b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.7; -webkit-text-size-adjust:100%;}
  .wrap{max-width:880px; margin:0 auto; padding:18px 16px 60px;}
  header.top{text-align:center; padding:20px 10px 6px;}
  header.top h1{font-size:1.55rem; margin:0 0 4px;}
  header.top p{margin:0; color:var(--muted); font-size:.95rem;}
  .hidden{display:none !important;}
  .overview{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:14px 16px; margin:16px 0; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .overview .bar{flex:1; min-width:160px; height:14px; background:#f0e6e8; border-radius:99px; overflow:hidden;}
  .overview .bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,#f0907f,#c0392b); transition:width .5s;}
  .overview .pct{font-weight:800; font-size:1.1rem;}
  .overview small{color:var(--muted)}
  .unit{margin:22px 0 6px;}
  .unit h2{display:flex; align-items:center; gap:10px; font-size:1.2rem; margin:0 0 10px; padding-left:12px; border-left:6px solid var(--u3);}
  .unit.u4 h2{border-left-color:var(--u4);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:16px; margin:12px 0;}
  .lesson-head{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .lesson-head .name{font-size:1.08rem; font-weight:800;}
  .badge{font-size:.92rem; padding:4px 10px; border-radius:99px; background:#f0e6e8; color:var(--muted); white-space:nowrap;}
  .badge.lv1{background:#fdf0e1;color:#a85a17}
  .badge.lv2{background:#eef1f4;color:#4b5563}
  .badge.lv3{background:#fff6d6;color:#a07c00}
  .badge.lv4{background:#e7f9ee;color:#15803d; font-weight:800}
  .btnrow{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap;}
  button{font-family:inherit; cursor:pointer; border:0; border-radius:12px; padding:11px 16px; font-size:1rem; font-weight:700; transition:transform .05s, filter .15s;}
  button:active{transform:translateY(1px)}
  .btn-main{background:var(--accent); color:#fff;}
  .btn-soft{background:#f0e6e8; color:var(--ink);}
  .btn-u3{background:var(--u3); color:#fff;}
  .btn-u4{background:var(--u4); color:#fff;}
  .btn-ghost{background:transparent; color:var(--accent); padding:8px 4px;}
  button:hover{filter:brightness(.97)}
  .section-title{font-weight:800; font-size:1.05rem; margin:4px 0 8px; display:flex; align-items:center; gap:8px;}
  .points{margin:0; padding:0; list-style:none;}
  .points li{position:relative; padding:8px 10px 8px 30px; border-bottom:1px dashed var(--line);}
  .points li:last-child{border-bottom:0}
  .points li::before{content:"📖"; position:absolute; left:6px; top:8px; font-size:.95rem;}
  .review p{margin:.4rem 0;}
  .review .kw{background:#fdeecf; padding:0 3px; border-radius:4px; font-weight:700;}
  .quizbar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; color:var(--muted); font-size:.95rem;}
  .qprog{flex:1; height:8px; background:#f0e6e8; border-radius:99px; overflow:hidden;}
  .qprog > i{display:block; height:100%; background:var(--accent); width:0; transition:width .3s;}
  .qtext{font-size:1.15rem; font-weight:800; margin:10px 0 14px;}
  .qtype{font-size:.8rem; font-weight:700; padding:2px 8px; border-radius:6px; background:#f0e6e8; color:var(--muted); margin-right:8px;}
  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:block; width:100%; text-align:left; background:#fcf7f7; border:2px solid var(--line); color:var(--ink); font-weight:600; padding:13px 14px; border-radius:12px;}
  .opt:hover{border-color:#edc9c3}
  .opt.correct{border-color:var(--ok); background:#e7f9ee;}
  .opt.wrong{border-color:var(--no); background:#fde8e8;}
  .opt[disabled]{cursor:default; opacity:1;}
  .feedback{margin-top:14px; padding:12px 14px; border-radius:12px; font-weight:600; display:none;}
  .feedback.show{display:block;}
  .feedback.good{background:#e7f9ee; color:#14532d;}
  .feedback.bad{background:#fde8e8; color:#7f1d1d;}
  .feedback .lab{font-weight:800; display:block; margin-bottom:2px;}
  .result{text-align:center; padding:10px 6px;}
  .result .big{font-size:3rem; margin:6px 0;}
  .result .score{font-size:1.3rem; font-weight:800;}
  .levelup{font-size:1.15rem; font-weight:800; margin:10px 0; padding:10px; border-radius:12px;}
  .levelup.up{background:#e7f9ee; color:#15803d;}
  .levelup.same{background:#f0e6e8; color:#6b5560;}
  .ladder{display:flex; justify-content:center; gap:6px; margin:14px 0; flex-wrap:wrap;}
  .rung{font-size:.85rem; padding:6px 10px; border-radius:10px; background:#f0e6e8; color:var(--muted);}
  .rung.on{background:#fff6d6; color:#a07c00; font-weight:800;}
  .rung.cur{outline:3px solid #fbbf24;}
  footer{ text-align:center; color:var(--muted); font-size:.82rem; margin-top:30px;}
  .toplink{display:inline-block; margin:10px 0; color:var(--accent); font-weight:700; cursor:pointer;}
  @media(max-width:520px){ header.top h1{font-size:1.25rem} .qtext{font-size:1.05rem} }
</style>
</head>
<body>
<div class="wrap">
  <section id="home">
    <header class="top">
      <h1>📚 四下國語 期末複習</h1>
      <p>第參單元 愛在哪裡 ｜ 第肆單元 想像起飛（南一版・第7～12課）</p>
    </header>
    <div class="overview">
      <div><div class="pct"><span id="ovPct">0</span>%</div><small>精熟進度</small></div>
      <div class="bar"><i id="ovBar"></i></div>
      <div><small id="ovText"></small></div>
    </div>
    <div id="unitList"></div>
    <div style="text-align:center; margin-top:20px;">
      <button class="btn-ghost" onclick="resetAll()">🗑️ 重置所有進度</button>
    </div>
    <footer>
      內容依南一版國小國語四下教師專用課本整理，供班級複習使用。<br>
      等級：⚪ 未挑戰 → 🥉 銅牌 → 🥈 銀牌 → 🥇 金牌 → 🏆 精熟（每回合隨機抽 10 題，全對即達精熟）
    </footer>
  </section>

  <section id="lesson" class="hidden">
    <span class="toplink" onclick="goHome()">← 回首頁</span>
    <div class="card"><div class="lesson-head"><span class="name" id="lsName"></span><span class="badge" id="lsBadge"></span></div></div>
    <div class="card"><div class="section-title">🔑 重點提示</div><ul class="points" id="lsPoints"></ul></div>
    <div class="card review"><div class="section-title">📖 複習內容</div><div id="lsReview"></div></div>
    <div class="card" style="text-align:center;">
      <div class="section-title" style="justify-content:center;">✏️ 複習測驗</div>
      <p style="color:var(--muted); margin:.2rem 0 0;">隨機抽題，答對率越高、等級越高，可無限次重做挑戰 <b>🏆 精熟</b>。</p>
      <div class="btnrow" style="justify-content:center;"><button class="btn-main" id="lsStart">開始測驗</button></div>
    </div>
  </section>

  <section id="quiz" class="hidden">
    <span class="toplink" onclick="quitQuiz()">← 結束測驗</span>
    <div class="card">
      <div class="quizbar"><span id="qIdx"></span><div class="qprog"><i id="qBar"></i></div><span id="qScore"></span></div>
      <div class="qtext" id="qText"></div>
      <div class="opts" id="qOpts"></div>
      <div class="feedback" id="qFb"></div>
      <div class="btnrow" style="justify-content:flex-end;"><button class="btn-main hidden" id="qNext">下一題 →</button></div>
    </div>
  </section>

  <section id="result" class="hidden">
    <div class="card result">
      <div class="big" id="rEmoji">🎉</div>
      <div class="score" id="rScore"></div>
      <div class="levelup" id="rLevel"></div>
      <div class="ladder" id="rLadder"></div>
      <div class="btnrow" style="justify-content:center;">
        <button class="btn-main" id="rRetry">再挑戰一次</button>
        <button class="btn-soft" id="rReview">看重點</button>
        <button class="btn-soft" onclick="goHome()">回首頁</button>
      </div>
    </div>
  </section>
</div>

      {type:"choice", q:"白鹿告訴蛙巫，怎麼做才能永遠守護蛙族？", options:["爬上九蛙疊像最頂端，讓清晨第一道日光照在身上","喝下神水","吃下仙草","到山頂大喊"], answer:0, explain:"爬上九蛙疊像頂端讓清晨第一道日光照身，靈魂便留存雕像中。"},
      {type:"choice", q:"本課故事的結構順序是？", options:["背景→問題→轉折→解決→結果","起→承→轉→合","總說→分說→總結","現在→回憶"], answer:0, explain:"用故事梯：背景、問題、轉折、解決、結果。"},
      {type:"choice", q:"本課把「九蛙」當作人來寫、賦予生命，用了什麼方法練習想像？", options:["轉化法","組合法","改變規模法","摹寫法"], answer:0, explain:"賦予事物生命，是轉化法。"},
      {type:"choice", q:"蛙巫爬九蛙疊像時，是誰幫助牠？", options:["蛙族","白鹿","人類","遊客"], answer:0, explain:"蛙族圍著推著蛙巫，幫牠爬上頂端。"},
      {type:"choice", q:"日月潭是臺灣第幾大的（半天然）湖泊？", options:["第一大","第二大","第三大","最小"], answer:0, explain:"日月潭是臺灣第一大的半天然湖泊。"},
      {type:"choice", q:"身體老化的「ㄕㄨㄞ老」應寫成？", options:["衰老","哀老","衷老","衰退"], answer:0, explain:"「衰老」指身體、外貌老化。"},
      {type:"choice", q:"成語「一帆風□」（非常順利）應填？", options:["順","川","巡","訓"], answer:0, explain:"「一帆風順」比喻非常順利、毫無阻礙。"}
    ]
   }
  ]
 }
];

const LEVELS = ["⚪ 未挑戰","🥉 銅牌","🥈 銀牌","🥇 金牌","🏆 精熟"];
const LADDER = ["🥉 銅牌","🥈 銀牌","🥇 金牌","🏆 精熟"];
const ROUND_SIZE = 10;
const STORE_KEY = "gy4_u34_levels_v1";
function loadLevels(){ try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};} }
function saveLevels(o){ try{localStorage.setItem(STORE_KEY, JSON.stringify(o));}catch(e){} }
function getLevel(id){ return loadLevels()[id]||0; }
function setLevel(id, lv){ const o=loadLevels(); o[id]=Math.max(o[id]||0, lv); saveLevels(o); }
function tierForAccuracy(acc){ if(acc>=1.0)return 4; if(acc>=0.9)return 3; if(acc>=0.75)return 2; if(acc>=0.6)return 1; return 0; }
function badgeClass(lv){ return lv>0 ? ("badge lv"+lv) : "badge"; }

const allLessons = DATA.flatMap(u=>u.lessons);
function renderHome(){
  const list = document.getElementById("unitList"); list.innerHTML="";
  DATA.forEach(u=>{
    const wrap=document.createElement("div"); wrap.className="unit"+(u.cls==="u4"?" u4":"");
    wrap.innerHTML=`<h2>${u.title}</h2>`;
    u.lessons.forEach(ls=>{
      const lv=getLevel(ls.id); const card=document.createElement("div"); card.className="card";
      card.innerHTML=`<div class="lesson-head"><span class="name">${ls.name}</span><span class="${badgeClass(lv)}">${LEVELS[lv]}</span></div>
        <div class="btnrow">
          <button class="${u.cls==='u4'?'btn-u4':'btn-u3'}" data-go="lesson" data-id="${ls.id}">看重點 / 複習</button>
          <button class="btn-main" data-go="quiz" data-id="${ls.id}">開始測驗</button>
        </div>`;
      wrap.appendChild(card);
    });
    list.appendChild(wrap);
  });
  const mastered=allLessons.filter(l=>getLevel(l.id)>=4).length;
  const pct=Math.round(mastered/allLessons.length*100);
  document.getElementById("ovPct").textContent=pct;
  document.getElementById("ovBar").style.width=pct+"%";
  document.getElementById("ovText").textContent = mastered===allLessons.length ? "🎊 太厲害了！全部達到精熟！" : `已精熟 ${mastered} / ${allLessons.length} 課，繼續加油！`;
  list.querySelectorAll("button[data-go]").forEach(b=>{
    b.addEventListener("click",()=>{ const id=b.getAttribute("data-id"); if(b.getAttribute("data-go")==="lesson") openLesson(id); else startQuiz(id); });
  });
}
function findLesson(id){ return allLessons.find(l=>l.id===id); }
function show(sec){ ["home","lesson","quiz","result"].forEach(s=>document.getElementById(s).classList.toggle("hidden", s!==sec)); window.scrollTo({top:0,behavior:"smooth"}); }
function goHome(){ renderHome(); show("home"); }
function openLesson(id){
  const ls=findLesson(id); const lv=getLevel(id);
  document.getElementById("lsName").textContent=ls.name;
  const badge=document.getElementById("lsBadge"); badge.className=badgeClass(lv); badge.textContent=LEVELS[lv];
  document.getElementById("lsPoints").innerHTML=ls.points.map(p=>`<li>${p}</li>`).join("");
  document.getElementById("lsReview").innerHTML=ls.review;
  document.getElementById("lsStart").onclick=()=>startQuiz(id);
  show("lesson");
}
let q={lessonId:null, items:[], idx:0, correct:0, answered:false};
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function startQuiz(id){ const ls=findLesson(id); const pool=shuffle(ls.questions); q={lessonId:id, items:pool.slice(0,Math.min(ROUND_SIZE,pool.length)), idx:0, correct:0, answered:false}; show("quiz"); renderQuestion(); }
function renderQuestion(){
  q.answered=false; const it=q.items[q.idx];
  document.getElementById("qIdx").textContent=`第 ${q.idx+1} / ${q.items.length} 題`;
  document.getElementById("qScore").textContent=`✔ ${q.correct}`;
  document.getElementById("qBar").style.width=Math.round(q.idx/q.items.length*100)+"%";
  document.getElementById("qText").innerHTML=`<span class="qtype">${it.type==="tf"?"是非題":"選擇題"}</span>${it.q}`;
  const opts=document.getElementById("qOpts"); opts.innerHTML="";
  const choices=it.type==="tf"?["⭕ 對","❌ 錯"]:it.options;
  choices.forEach((c,i)=>{ const b=document.createElement("button"); b.className="opt"; b.innerHTML=c; b.addEventListener("click",()=>answer(i,b)); opts.appendChild(b); });
  const fb=document.getElementById("qFb"); fb.className="feedback"; fb.innerHTML="";
  document.getElementById("qNext").classList.add("hidden");
}
function answer(i,btn){
  if(q.answered)return; q.answered=true; const it=q.items[q.idx];
  const correctIdx=it.type==="tf"?(it.answer?0:1):it.answer; const isRight=(i===correctIdx);
  if(isRight)q.correct++;
  const opts=document.getElementById("qOpts").children;
  for(let k=0;k<opts.length;k++)opts[k].setAttribute("disabled","true");
  opts[correctIdx].classList.add("correct"); if(!isRight)btn.classList.add("wrong");
  const fb=document.getElementById("qFb"); fb.className="feedback show "+(isRight?"good":"bad");
  fb.innerHTML=`<span class="lab">${isRight?"✅ 答對了！":"❌ 答錯了"}</span>${it.explain}`;
  document.getElementById("qScore").textContent=`✔ ${q.correct}`;
  const next=document.getElementById("qNext"); next.classList.remove("hidden");
  next.textContent=(q.idx===q.items.length-1)?"看結果 🎯":"下一題 →";
}
document.getElementById("qNext").addEventListener("click",()=>{ if(q.idx<q.items.length-1){q.idx++; renderQuestion();} else finishQuiz(); });
function quitQuiz(){ goHome(); }
function finishQuiz(){
  const total=q.items.length, acc=q.correct/total;
  const before=getLevel(q.lessonId), earned=tierForAccuracy(acc), after=Math.max(before,earned);
  setLevel(q.lessonId, after);
  document.getElementById("qBar").style.width="100%";
  document.getElementById("rScore").textContent=`答對 ${q.correct} / ${total} 題（${Math.round(acc*100)}%）`;
  document.getElementById("rEmoji").textContent=acc>=1?"🏆":acc>=0.9?"🥇":acc>=0.75?"🥈":acc>=0.6?"🥉":"💪";
  const lvBox=document.getElementById("rLevel");
  if(after>before){ lvBox.className="levelup up"; lvBox.innerHTML=`🎉 升級！本課等級達到 <b>${LEVELS[after]}</b>`; }
  else if(earned>=4){ lvBox.className="levelup up"; lvBox.innerHTML=`🏆 太棒了！維持 <b>精熟</b> 等級！`; }
  else{ lvBox.className="levelup same"; lvBox.innerHTML=`目前等級 <b>${LEVELS[after]}</b>。${after<4?`再加油，挑戰 <b>${LADDER[after]}</b>${after<3?"以上":""}！`:""}`; }
  const ladder=document.getElementById("rLadder"); ladder.innerHTML="";
  LADDER.forEach((name,k)=>{ const lv=k+1; const r=document.createElement("span"); r.className="rung"+(after>=lv?" on":"")+(after===lv?" cur":""); r.textContent=name; ladder.appendChild(r); });
  document.getElementById("rRetry").onclick=()=>startQuiz(q.lessonId);
  document.getElementById("rReview").onclick=()=>openLesson(q.lessonId);
  show("result");
}
function resetAll(){ if(confirm("確定要清除所有課程的等級與進度嗎？")){ localStorage.removeItem(STORE_KEY); goHome(); } }
goHome();
</script>
