<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四下國語 期末複習｜引導闖關版（南一）</title>
<style>
  :root{
    --bg:#f1f7fb; --card:#ffffff; --ink:#16263a; --muted:#5b7186;
    --u3:#c0392b; --u4:#7c4dbd; --line:#dde7ef; --shadow:0 6px 20px rgba(16,38,58,.08);
    --ok:#16a34a; --no:#dc2626; --accent:#c0392b; --lock:#b8c4d0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.7; -webkit-text-size-adjust:100%;}
  .wrap{max-width:840px; margin:0 auto; padding:18px 16px 70px;}
  header.top{text-align:center; padding:18px 10px 4px;}
  header.top h1{font-size:1.5rem; margin:0 0 4px;}
  header.top p{margin:0; color:var(--muted); font-size:.92rem;}
  .hidden{display:none !important;}
  .overview{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:14px 16px; margin:16px 0; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .overview .bar{flex:1; min-width:150px; height:14px; background:#e8eff5; border-radius:99px; overflow:hidden;}
  .overview .bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,#f0907f,#c0392b); transition:width .5s;}
  .overview .pct{font-weight:800; font-size:1.1rem;}
  .overview small{color:var(--muted)}
  .unit{margin:20px 0 6px;}
  .unit h2{display:flex; align-items:center; gap:10px; font-size:1.15rem; margin:0 0 10px; padding-left:12px; border-left:6px solid var(--u3);}
  .unit.u4 h2{border-left-color:var(--u4);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:16px; margin:12px 0;}
  .lesson-head{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .lesson-head .name{font-size:1.08rem; font-weight:800;}
  .badge{font-size:.9rem; padding:4px 10px; border-radius:99px; background:#eef2f7; color:var(--muted); white-space:nowrap;}
  .badge.s1{background:#eaf1f8;color:#3b6aa0}
  .badge.s2{background:#fdf0e1;color:#a85a17}
  .badge.s3{background:#eef1f4;color:#566270}
  .badge.s4{background:#fff6d6;color:#9a7a00}
  .badge.s5{background:#e7f9ee;color:#15803d;font-weight:800}
  .ministars{margin-top:8px; font-size:.95rem; letter-spacing:2px;}
  .btnrow{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap;}
  button{font-family:inherit; cursor:pointer; border:0; border-radius:12px; padding:11px 16px; font-size:1rem; font-weight:700; transition:transform .05s, filter .15s;}
  button:active{transform:translateY(1px)}
  button:disabled{cursor:not-allowed; opacity:.55;}
  .btn-main{background:var(--accent); color:#fff;}
  .btn-soft{background:#eef2f7; color:var(--ink);}
  .btn-u3{background:var(--u3); color:#fff;}
  .btn-u4{background:var(--u4); color:#fff;}
  .btn-ghost{background:transparent; color:var(--accent); padding:8px 4px;}
  button:hover:not(:disabled){filter:brightness(.97)}
  .toplink{display:inline-block; margin:8px 0; color:var(--accent); font-weight:700; cursor:pointer;}

  /* stage map */
  .stage{display:flex; align-items:center; gap:14px; padding:14px 16px; margin:10px 0; border-radius:14px; background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow);}
  .stage .ic{font-size:1.7rem; width:40px; text-align:center; flex:none;}
  .stage .info{flex:1;}
  .stage .info .t{font-weight:800; font-size:1.05rem;}
  .stage .info .d{color:var(--muted); font-size:.85rem;}
  .stage.locked{opacity:.6; background:#f4f7fa;}
  .stage.done{border-color:#bfe6cd; background:#f1fbf5;}
  .stage .act{flex:none;}
  .stage .status{font-size:.85rem; font-weight:700; padding:4px 10px; border-radius:99px;}
  .status.ok{background:#e7f9ee;color:#15803d}
  .status.lk{background:#eef2f7;color:#94a3b8}

  /* cards (guided reading) */
  .tierchip{display:inline-block; font-size:.85rem; font-weight:800; padding:3px 12px; border-radius:99px; margin-bottom:14px;}
  .tier-基礎{background:#e3f5ec; color:#1c7a4f;}
  .tier-進階{background:#e1eefb; color:#1d5fa8;}
  .tier-深入{background:#f4e9da; color:#8a5a1d;}
  .learncard{min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:26px 18px;}
  .learncard .big{font-size:1.4rem; font-weight:800; line-height:1.8;}
  .learncard .big .hl{background:#fff3cd; padding:0 4px; border-radius:5px;}
  .dots{display:flex; gap:6px; justify-content:center; margin:14px 0 4px; flex-wrap:wrap;}
  .dot{width:9px; height:9px; border-radius:50%; background:#d6e2ee;}
  .dot.on{background:var(--accent);}
  .dot.seen{background:#9cc3e8;}

  /* quiz */
  .quizbar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; color:var(--muted); font-size:.92rem;}
  .qprog{flex:1; height:8px; background:#eef2f7; border-radius:99px; overflow:hidden;}
  .qprog > i{display:block; height:100%; background:var(--accent); width:0; transition:width .3s;}
  .qtext{font-size:1.15rem; font-weight:800; margin:10px 0 14px;}
  .qtype{font-size:.78rem; font-weight:700; padding:2px 8px; border-radius:6px; background:#eef2f7; color:var(--muted); margin-right:8px;}
  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:block; width:100%; text-align:left; background:#f7fafc; border:2px solid var(--line); color:var(--ink); font-weight:600; padding:13px 14px; border-radius:12px;}
  .opt:hover{border-color:#bcdcf5}
  .opt.correct{border-color:var(--ok); background:#e7f9ee;}
  .opt.wrong{border-color:var(--no); background:#fde8e8;}
  .opt[disabled]{cursor:default;}
  .feedback{margin-top:14px; padding:12px 14px; border-radius:12px; font-weight:600; display:none;}
  .feedback.show{display:block;}
  .feedback.good{background:#e7f9ee; color:#14532d;}
  .feedback.bad{background:#fde8e8; color:#7f1d1d;}
  .feedback .lab{font-weight:800; display:block; margin-bottom:2px;}

  /* result */
  .result{text-align:center; padding:10px 6px;}
  .result .big{font-size:3rem; margin:6px 0;}
  .result .score{font-size:1.3rem; font-weight:800;}
  .verdict{font-size:1.1rem; font-weight:800; margin:10px 0; padding:12px; border-radius:12px;}
  .verdict.pass{background:#e7f9ee; color:#15803d;}
  .verdict.fail{background:#fdf0e1; color:#a85a17;}
  footer{ text-align:center; color:var(--muted); font-size:.8rem; margin-top:30px;}
  @media(max-width:520px){ header.top h1{font-size:1.22rem} .qtext{font-size:1.05rem} .learncard .big{font-size:1.2rem} }
</style>
</head>
<body>
<div class="wrap">

  <!-- HOME -->
  <section id="home">
    <header class="top">
      <h1>📖 四下國語 期末複習</h1>
      <p>引導闖關版 ｜ 第參單元 愛在哪裡・第肆單元 想像起飛（南一・第7~12課）</p>
    </header>
    <div class="overview">
      <div><div class="pct"><span id="ovPct">0</span>%</div><small>精熟進度</small></div>
      <div class="bar"><i id="ovBar"></i></div>
      <div><small id="ovText"></small></div>
    </div>
    <div id="unitList"></div>
    <div style="text-align:center; margin-top:18px;">
      <button class="btn-ghost" onclick="resetAll()">🗑️ 重置所有進度</button>
    </div>
    <footer>
      內容依南一版國小國語四下教師專用課本整理。每課先「讀重點小卡」，再一關一關闖：🥉基礎→🥈中等→🥇進階→🏆精熟。<br>
      每關隨機抽 10 題、選項順序會打散；答對率達標才解鎖下一關，精熟關要全對。共 <span id="ovQ">0</span> 題題庫。
    </footer>
  </section>

  <!-- LESSON MAP -->
  <section id="lesson" class="hidden">
    <span class="toplink" onclick="goHome()">← 回首頁</span>
    <div class="card"><div class="lesson-head"><span class="name" id="lsName"></span><span class="badge" id="lsBadge"></span></div></div>
    <div id="stageList"></div>
  </section>

  <!-- CARDS -->
  <section id="cards" class="hidden">
    <span class="toplink" onclick="backToLesson()">← 回闖關地圖</span>
    <div class="card">
      <div style="text-align:center"><span class="tierchip" id="cdTier"></span></div>
      <div class="learncard"><div class="big" id="cdText"></div></div>
      <div class="dots" id="cdDots"></div>
      <div class="quizbar"><span id="cdIdx"></span><span></span></div>
      <div class="btnrow" style="justify-content:space-between;">
        <button class="btn-soft" id="cdPrev">← 上一張</button>
        <button class="btn-main" id="cdNext">下一張 →</button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <span class="toplink" onclick="backToLesson()">← 結束，回地圖</span>
    <div class="card">
      <div class="quizbar"><span id="qLvl"></span><div class="qprog"><i id="qBar"></i></div><span id="qScore"></span></div>
      <div class="qtext" id="qText"></div>
      <div class="opts" id="qOpts"></div>
      <div class="feedback" id="qFb"></div>
      <div class="btnrow" style="justify-content:flex-end;"><button class="btn-main hidden" id="qNext">下一題 →</button></div>
    </div>
  </section>

  <!-- RESULT -->
  <section id="result" class="hidden">
    <div class="card result">
      <div class="big" id="rEmoji">🎉</div>
      <div class="score" id="rScore"></div>
      <div class="verdict" id="rVerdict"></div>
      <div class="btnrow" style="justify-content:center;">
        <button class="btn-main" id="rRetry">再挑戰一次</button>
        <button class="btn-soft" id="rNext"></button>
        <button class="btn-soft" onclick="backToLesson()">回地圖</button>
      </div>
    </div>
  </section>
</div>

<script>

, "options": ["束手無策", "負重致遠", "利令智昏", "各自為政"], "answer": 3, "explain": "各自為政指各依己見行事、不顧整體配合,正符合此情境。"}, {"lv": 3, "type": "choice", "q": "下列關於「致意」與課文情境的搭配,何者最恰當?", "options": ["用『致意』來形容責罵母親", "用『致意』來表達對母親的感謝與敬愛", "『致意』是指把花丟掉", "『致意』是指忘記母親"], "answer": 1, "explain": "致意指表達思念、問候、感謝等情意,課文用以表達對母親的謝意與敬愛。"}, {"lv": 3, "type": "choice", "q": "課文寫康乃馨時,先寫它在西方國家的地位,再寫外形,接著說母親節由來,最後說它成為母親花的原因。這樣安排的好處是什麼?", "options": ["讓段落雜亂無章", "層次分明,讓讀者完整了解康乃馨成為母親花的來龍去脈", "只是為了湊字數", "刻意不讓人看懂"], "answer": 1, "explain": "課本賞析指出此段先地位、再外形、再由來、最後原因,層次清楚。"}, {"lv": 3, "type": "choice", "q": "綜合全課判斷,作者選擇「說明文」而非「記敘文」來寫母親花,最主要是因為什麼?", "options": ["要清楚介紹各國母親花的外形、意義等知識", "要講一個完整的故事", "要抒發強烈的個人情感", "要說服別人買花"], "answer": 0, "explain": "本課為說明文(事物類),目的在介紹各國母親花的外形、功用、特色與意義等知識。"}, {"lv": 3, "type": "choice", "q": "課文同時提到萱草「花期短、清晨開黃昏謝」以及「遊子種萱草讓母親排解思念」,把這兩點合起來看,作者想凸顯的是什麼?", "options": ["萱草雖然花期短暫,卻承載著母子之間深厚的情感", "萱草沒有什麼用處", "萱草比康乃馨漂亮", "萱草只能在中國生長"], "answer": 0, "explain": "作者藉花期短與遊子種草的典故,凸顯萱草寄託母子情感的意義。"}, {"lv": 3, "type": "tf", "q": "課文先在總說點出「各國母親花並不都一樣」,最後在總結又呼應這一點,屬於前後呼應、用總結法收尾。", "answer": true, "explain": "課文首段點題、末段呼應並歸納謝意相同,正是總結法與前後呼應。"}, {"lv": 3, "type": "tf", "q": "從課文可以推知,各國之所以選用不同的花當母親花,跟各地的文化與傳說有關,但表達的謝意是一致的。", "answer": true, "explain": "課文藉美國、中國、越南印尼、泰國不同花例,說明形式因文化而異而謝意相同。"}, {"lv": 3, "type": "tf", "q": "課文中提到美國訂立母親節是在西元一九四一年。", "answer": false, "explain": "課文寫明是西元一九一四年,不是一九四一年。"}]}, {"id": "L8", "name": "第八課　屋頂上的小貓", "cards": [{"tier": "基礎", "text": "作者：<span class='hl'>子魚</span>。文體：記敘文。<br>主旨：善待動物、尊重生命。"}, {"tier": "基礎", "text": "寫法：<span class='hl'>倒敘法</span><br>（先寫現在，再回憶過去）。"}, {"tier": "進階", "text": "內容：夏夜貓叫聲讓作者想起六歲時，<br>媽媽和他「<span class='hl'>化身小貓對話</span>」。"}, {"tier": "進階", "text": "後來作者照顧從天而降的幼貓，取名「<span class='hl'>小煤球</span>」<br>（耳朵、鼻頭像煤球般黑）。"}, {"tier": "進階", "text": "修辭：「喵嗚──」描寫聲音是「<span class='hl'>摹寫</span>」；<br>「哇！」是「<span class='hl'>感嘆</span>」。"}, {"tier": "深入", "text": "結尾用「<span class='hl'>感想法</span>」：<br>領會對生命應有的態度。"}, {"tier": "深入", "text": "字辨：「<span class='hl'>必須</span>」後接動作（一定要）；<br>「<span class='hl'>需要</span>」後接事物。"}, {"tier": "深入", "text": "生字成語：先發制人、養精蓄銳、<br>嬌生慣養、循循善誘。"}], "questions": [{"lv": 1, "type": "choice", "q": "〈屋頂上的小貓〉這一課的作者是誰？", "options": ["子魚", "林良", "王淑芬", "楊喚"], "answer": 0, "explain": "本課作者是子魚，本名孫藝玨。"}, {"lv": 1, "type": "tf", "q": "〈屋頂上的小貓〉的作者子魚，本名是林良。", "answer": false, "explain": "子魚本名是孫藝玨，不是林良。"}, {"lv": 1, "type": "choice", "q": "〈屋頂上的小貓〉這一課的文體是什麼？", "options": ["說明文", "議論文", "記敘文", "應用文"], "answer": 2, "explain": "本課文本表述為記敘文本，屬於記敘文。"}, {"lv": 1, "type": "tf", "q": "〈屋頂上的小貓〉是一篇說明文。", "answer": false, "explain": "本課是記敘文（記敘文本），不是說明文。"}, {"lv": 1, "type": "choice", "q": "〈屋頂上的小貓〉被編在第幾單元？", "options": ["第參單元", "第壹單元", "第貳單元", "第肆單元"], "answer": 0, "explain": "本課屬於第參單元「愛在哪裡」。"}, {"lv": 1, "type": "tf", "q": "〈屋頂上的小貓〉所屬的單元名稱是「愛在哪裡」。", "answer": true, "explain": "本課編在第參單元「愛在哪裡」。"}, {"lv": 1, "type": "choice", "q": "作者幫從天而降的幼貓取了什麼名字？", "options": ["小黑", "小灰", "阿珠", "小煤球"], "answer": 3, "explain": "作者為幼貓取名「小煤球」。"}, {"lv": 1, "type": "tf", "q": "作者把照顧的那隻幼貓取名為「阿珠」。", "answer": false, "explain": "幼貓取名為「小煤球」；阿珠是鄰居的貓。"}, {"lv": 1, "type": "choice", "q": "作者第一次被屋頂上的貓叫聲嚇到時，是幾歲？", "options": ["六歲", "四歲", "五歲", "七歲"], "answer": 0, "explain": "課文說「六歲的我嚇得發抖」。"}, {"lv": 1, "type": "tf", "q": "作者被屋頂的貓叫聲嚇得發抖時，是四歲。", "answer": false, "explain": "課文寫嚇得發抖的是「六歲」的作者，不是四歲。"}, {"lv": 1, "type": "choice", "q": "作者小時候是在什麼情況下開始聽到屋頂上的貓叫聲？", "options": ["上學第一天", "剛搬新家那年", "過年的時候", "生病住院時"], "answer": 1, "explain": "課文說「那年剛搬新家」，屋頂上開始傳來貓叫聲。"}, {"lv": 1, "type": "tf", "q": "作者是在剛搬新家那年，每到晚上就聽到屋頂上的貓叫聲。", "answer": true, "explain": "課文寫剛搬新家那年，屋頂上就會吵個不停。"}, {"lv": 1, "type": "choice", "q": "是誰安慰害怕的作者，說屋頂的聲音是「貓在聊天」？", "options": ["爸爸", "哥哥", "媽媽", "鄰居"], "answer": 2, "explain": "課文中是媽媽安慰作者：「別怕！是貓在聊天。」"}, {"lv": 1, "type": "tf", "q": "屋頂上的怪聲音，是爸爸告訴作者那是貓在聊天。", "answer": false, "explain": "是媽媽（不是爸爸）安慰作者說那是貓在聊天。"}, {"lv": 1, "type": "choice", "q": "媽媽說鄰居的貓「阿珠」最近發生了什麼事？", "options": ["走丟了", "生病了", "搬走了", "生了五個小孩"], "answer": 3, "explain": "媽媽說：「聽說阿珠最近生了五個小孩！」"}, {"lv": 1, "type": "tf", "q": "媽媽說阿珠最近生了五個小孩。", "answer": true, "explain": "課文中媽媽提到阿珠生了五個小孩。"}, {"lv": 1, "type": "choice", "q": "幼貓是怎麼出現在作者面前的？", "options": ["從天花板破洞掉下來，落在書包上", "作者在路邊撿到的", "媽媽買回來的", "鄰居送來的"], "answer": 0, "explain": "幼貓從天而降，落在作者的書包上，母貓原本在天花板破洞張望。"}, {"lv": 1, "type": "tf", "q": "幼貓是從天而降，落在作者的書包上。", "answer": true, "explain": "課文寫一團軟軟的東西從天而降，是隻幼貓，落在書包上。"}, {"lv": 1, "type": "choice", "q": "作者用什麼為小貓做了一個溫暖的床？", "options": ["木箱", "布袋", "紙箱", "竹籃"], "answer": 2, "explain": "課文寫作者用紙箱做了溫暖的貓床。"}, {"lv": 1, "type": "tf", "q": "作者用木箱為小貓做了一個溫暖的床。", "answer": false, "explain": "課文寫的是「紙箱」，不是木箱。"}, {"lv": 1, "type": "choice", "q": "本課的主旨是要鼓勵學生做什麼？", "options": ["努力讀書、認真學習", "幫忙做家事", "勇敢面對考試", "善待動物並尊重生命"], "answer": 3, "explain": "主旨是藉照顧幼貓的體悟，鼓勵善待動物並尊重生命。"}, {"lv": 1, "type": "tf", "q": "本課的主旨是鼓勵學生善待動物並尊重生命。", "answer": true, "explain": "課本主旨欄明確說明此意旨。"}, {"lv": 1, "type": "choice", "q": "在第參單元「愛在哪裡」中，本課表現的是哪一種愛？", "options": ["對父母的愛", "對動物的愛", "對朋友的愛", "對國家的愛"], "answer": 1, "explain": "本課透過照顧幼貓，表現對動物（生命）的愛。"}, {"lv": 1, "type": "tf", "q": "本課表現的是對動物的愛與關懷。", "answer": true, "explain": "本課以照顧幼貓間接傳達關懷動物的觀念。"}, {"lv": 1, "type": "choice", "q": "作者照顧小貓的過程中，最後領會了什麼？", "options": ["做家事的方法", "養貓要花很多錢", "對生命應有的態度", "怎麼跟鄰居相處"], "answer": 2, "explain": "作者在照顧幼貓的過程中，領會對生命應有的態度。"}, {"lv": 1, "type": "tf", "q": "作者在照顧幼貓的過程中，領會了對生命應有的態度。", "answer": true, "explain": "這是課文結尾抒發的感想。"}, {"lv": 1, "type": "choice", "q": "小貓剛被帶回來的頭幾天，牠的反應是怎樣？", "options": ["又哭又叫、躲起來", "立刻就很親近作者", "馬上跑回屋頂", "安靜地睡覺"], "answer": 0, "explain": "頭幾天小貓又哭又叫，躲在牆角、桌下，顯得不適應。"}, {"lv": 1, "type": "tf", "q": "小貓剛被帶回來的頭幾天，又哭又叫，還躲了起來。", "answer": true, "explain": "課文寫小貓又哭又叫，躲在牆角、桌下。"}, {"lv": 1, "type": "choice", "q": "大約過了多久，小貓才願意走進紙箱、讓作者抱牠？", "options": ["一天後", "三天後", "一個月後", "一星期後"], "answer": 3, "explain": "課文寫「一星期後」小貓走進紙箱，也願意讓作者抱。"}, {"lv": 1, "type": "tf", "q": "小貓被帶回來的第一天，就立刻願意走進紙箱讓作者抱。", "answer": false, "explain": "是「一星期後」小貓才願意走進紙箱、讓作者抱。"}, {"lv": 1, "type": "choice", "q": "作者和媽媽用什麼方式來「翻譯」貓的叫聲？", "options": ["查字典", "用想像力", "問鄰居", "上網查"], "answer": 1, "explain": "媽媽要作者「用想像力」，兩人化身小貓對話。"}, {"lv": 1, "type": "tf", "q": "作者和媽媽是用想像力來「翻譯」貓語、化身小貓對話。", "answer": true, "explain": "媽媽說「不要問，用想像力！」"}, {"lv": 1, "type": "choice", "q": "作者一開始聽到屋頂上的貓叫聲，誤以為是什麼？", "options": ["有小偷", "下雨了", "有鬼", "有客人"], "answer": 2, "explain": "課文寫六歲的作者嚇得發抖，「以為有鬼」。"}, {"lv": 1, "type": "tf", "q": "作者小時候聽到屋頂的怪聲，以為是有小偷闖進家裡。", "answer": false, "explain": "課文寫作者嚇得發抖，「以為有鬼」，不是以為有小偷。"}, {"lv": 1, "type": "choice", "q": "課文開頭描寫的是哪個季節的夜晚？", "options": ["春夜", "秋夜", "冬夜", "夏夜"], "answer": 3, "explain": "課文開頭寫「夏夜晚風輕拂」。"}, {"lv": 1, "type": "tf", "q": "課文開頭描寫的是冬夜寒冷的情景。", "answer": false, "explain": "課文開頭寫的是「夏夜晚風輕拂」，是夏夜。"}, {"lv": 1, "type": "choice", "q": "課文一開始，是什麼樣的聲音使作者想起一段記憶？", "options": ["像嬰兒的哭聲", "打雷聲", "狗叫聲", "汽車喇叭聲"], "answer": 0, "explain": "課文寫像嬰兒（新生兒）的哭聲使作者想起一段記憶。"}, {"lv": 1, "type": "tf", "q": "是一陣像嬰兒哭聲的聲音，使作者想起一段溫暖的記憶。", "answer": true, "explain": "課文開頭即如此描寫。"}, {"lv": 1, "type": "choice", "q": "作者是在做什麼的時候，幼貓「咚」一聲掉下來？", "options": ["睡覺", "吃早餐", "看電視", "寫作業"], "answer": 3, "explain": "課文寫第二天早上「我在寫作業時」，房裡傳來咚一聲。"}, {"lv": 1, "type": "tf", "q": "幼貓掉下來時，作者正在睡覺。", "answer": false, "explain": "課文寫幼貓掉下來時，作者正在「寫作業」。"}, {"lv": 2, "type": "choice", "q": "本課採用的寫作手法是先寫現在、再回憶過去，這種手法稱為什麼？", "options": ["倒敘法", "順敘法", "插敘法", "補敘法"], "answer": 0, "explain": "本課先寫現在的夏夜，再倒敘回憶往事，是倒敘法。"}, {"lv": 2, "type": "tf", "q": "本課按照事情發生的先後順序，從頭講到尾，屬於順敘法。", "answer": false, "explain": "本課先寫現在再回憶過去，是倒敘法，不是順敘法。"}, {"lv": 2, "type": "choice", "q": "關於倒敘法的敘述，下列哪一項正確？", "options": ["完全按時間先後寫", "只寫未來會發生的事", "先寫現在的事件，再追述過去", "把事件平鋪直敘到底"], "answer": 2, "explain": "倒敘是敘事時間從當下倒回，本課先寫現在再追述往事。"}, {"lv": 2, "type": "tf", "q": "倒敘法是指完全依照事情發生的先後順序，一路寫到結尾。", "answer": false, "explain": "那是順敘法；倒敘是敘事時間從當下倒回去。"}, {"lv": 2, "type": "choice", "q": "本課的結尾屬於哪一種結尾法？", "options": ["問句法", "引用法", "摹寫法", "感想法"], "answer": 3, "explain": "本課結尾根據主旨抒發自身感想，是「感想法」。"}, {"lv": 2, "type": "tf", "q": "本課結尾是作者抒發自己的感想，屬於「感想法」結尾。", "answer": true, "explain": "課文最後抒發對 訊、引發讀者好奇，增加閱讀樂趣", "湊字數"], "answer": 2, "explain": "課本說明倒敘可填補背景、引發讀者好奇、增加閱讀樂趣。"}, {"lv": 3, "type": "tf", "q": "先寫現在再倒敘回憶，可以引起讀者的閱讀興趣。", "answer": true, "explain": "課本多處說明倒敘法能引起讀者閱讀興趣。"}, {"lv": 3, "type": "choice", "q": "「想要在考試中得到好成績，上課必須專心學習，並做到預習與複習。」這句話最能說明「必須」的什麼特點？", "options": ["可有可無", "只是隨口說說", "表示一種期望而已", "帶有命令、強制、非這麼做不可的語氣"], "answer": 3, "explain": "「必須」後接動作，帶命令、強制語氣，表示非這麼做不可。"}, {"lv": 3, "type": "tf", "q": "從「上課必須專心學習」可以看出「必須」帶有強制、非做不可的語氣。", "answer": true, "explain": "課本辨析說明「必須」具強制性。"}, {"lv": 3, "type": "choice", "q": "成語「嬌生慣養」最適合用來形容下列哪一種人？", "options": ["在備受寵愛縱容中長大、吃不了苦的人", "做事先下手取得先機的人", "善於引導別人的老師", "懂得儲備精神力量的人"], "answer": 0, "explain": "「嬌生慣養」指在備受寵愛縱容中成長，例句說小嘉嬌生慣養吃不了苦。"}, {"lv": 3, "type": "tf", "q": "「嬌生慣養」是指善於循序漸進地誘導別人。", "answer": false, "explain": "那是「循循善誘」的意思；嬌生慣養指在備受寵愛縱容中成長。"}, {"lv": 3, "type": "choice", "q": "「在老師的（　）下，班上同學都對閱讀充滿了熱情。」最適合填入的成語是？", "options": ["先發制人", "養精蓄銳", "循循善誘", "嬌生慣養"], "answer": 2, "explain": "「循循善誘」指善於循序漸進的誘導，符合老師引導學生的情境。"}, {"lv": 3, "type": "tf", "q": "「循循善誘」是指善於循序漸進地誘導別人。", "answer": true, "explain": "這是本課生字延伸成語的解釋。"}, {"lv": 3, "type": "choice", "q": "「這支籃球隊（　），迅速搶下許多分。」最適合填入的成語是？", "options": ["循循善誘", "先發制人", "嬌生慣養", "似曾相識"], "answer": 1, "explain": "「先發制人」指凡事先下手取得先機而能制伏對方。"}, {"lv": 3, "type": "tf", "q": "「先發制人」是指保養精神、積蓄力量。", "answer": false, "explain": "那是「養精蓄銳」的意思；先發制人指先下手取得先機而制伏對方。"}, {"lv": 3, "type": "choice", "q": "「經過這幾天的（　），我方選手已做好準備，士氣高昂。」最適合填入的成語是？", "options": ["嬌生慣養", "先發制人", "循循善誘", "養精蓄銳"], "answer": 3, "explain": "「養精蓄銳」指保養精神、積蓄力量，符合比賽前準備的情境。"}, {"lv": 3, "type": "tf", "q": "「養精蓄銳」是指保養精神、積蓄力量。", "answer": true, "explain": "這是本課生字延伸成語的解釋。"}, {"lv": 3, "type": "choice", "q": "課文一開頭把「像嬰兒激烈的哭聲」和「平靜的夜」放在一起，主要造成什麼效果？", "options": ["押韻的效果", "強烈的對比", "重複強調", "幽默搞笑"], "answer": 1, "explain": "課本說明激烈的哭聲與平靜的夜形成強烈對比。"}, {"lv": 3, "type": "tf", "q": "課文開頭以「激烈的哭聲」對照「平靜的夜」，形成強烈對比。", "answer": true, "explain": "課本賞析指出此處的強烈對比。"}, {"lv": 3, "type": "choice", "q": "課文寫「像極新生兒激烈的哭聲」雖然有喻詞「像」，但課本為什麼不把它標為譬喻？", "options": ["因為「像」不是喻詞", "因為它是視覺摹寫", "因為缺乏被譬喻的對象（本體），譬喻結構不完整", "因為它是感嘆句"], "answer": 2, "explain": "課本說明此句缺乏本體、譬喻結構不完整，故只算描摹聲音的聽覺摹寫。"}, {"lv": 3, "type": "tf", "q": "「像極新生兒激烈的哭聲」雖有喻詞「像」，但因譬喻結構不完整，課本只當作聽覺摹寫。", "answer": true, "explain": "課本特別說明此句不標譬喻，只算聽覺摹寫。"}, {"lv": 3, "type": "choice", "q": "媽媽不直接回答「阿珠是誰」，反而要作者「用想像力」，這樣做最主要的用意是什麼？", "options": ["不想理會作者", "考驗作者的記性", "怕作者太吵", "讓兩人能承接彼此的想像、使對話順暢有趣"], "answer": 3, "explain": "課本說明母子必須承接彼此的想像做回應，對話才能順暢。"}, {"lv": 3, "type": "tf", "q": "媽媽要作者用想像力回應，是為了讓兩人承接彼此的想像、使對話順暢。", "answer": true, "explain": "課本賞析說明此安排的用意。"}, {"lv": 3, "type": "choice", "q": "本課把「對話」大量寫進文章中，對文章主要有什麼幫助？", "options": ["為文章增添趣味性", "讓文章更難懂", "減少篇幅", "只是用來湊字數"], "answer": 0, "explain": "課本說明對話的寫作方式為文章增添了趣味性。"}, {"lv": 3, "type": "tf", "q": "課文大量使用母子化身小貓的對話，主要是為了讓文章變得更難懂。", "answer": false, "explain": "對話是為文章增添趣味性，而不是讓文章更難懂。"}, {"lv": 3, "type": "choice", "q": "綜合全文，作者透過「照顧小煤球」這件事，最想傳達給讀者的是什麼？", "options": ["養貓的步驟與方法", "媽媽很會說笑話", "要善待動物、尊重每一個生命", "新家屋頂有問題"], "answer": 2, "explain": "全文主旨在鼓勵善待動物、尊重生命，這是作者最想傳達的。"}, {"lv": 3, "type": "tf", "q": "綜合全文，作者最想傳達的是「養貓的正確步驟與方法」。", "answer": false, "explain": "全文主旨是善待動物、尊重生命，不是教養貓的步驟方法。"}, {"lv": 3, "type": "choice", "q": "從「現在聽到像嬰兒的哭聲→想起六歲的回憶→照顧小煤球→領會對生命的態度」，這樣的鋪排同時運用了哪兩種寫法？", "options": ["順敘法與引用法", "倒敘法與感想法", "說明法與設問法", "誇飾法與排比法"], "answer": 1, "explain": "全文先以倒敘帶出回憶，結尾再以感想法抒發體悟，兩者並用。"}, {"lv": 3, "type": "tf", "q": "本課同時運用了「倒敘法」帶出回憶，並用「感想法」作結尾。", "answer": true, "explain": "課本本課教點同時提到倒敘法與感想法結尾。"}, {"lv": 3, "type": "choice", "q": "如果要把對話句「『你想養貓，對不對？』媽媽看穿了我的心思。」改寫成敘述句，要特別注意什麼？", "options": ["要加更多標點", "要把貓刪掉", "人稱要跟著轉變", "要改成問句"], "answer": 2, "explain": "課本說明對話句改成敘述句時，人稱也要跟著轉變。"}, {"lv": 3, "type": "tf", "q": "把對話句改寫成敘述句時，句中的人稱要跟著轉變。", "answer": true, "explain": "課本句子練習特別提醒此點。"}]}, {"id": "L9", "name": "第九課　用一公斤愛嘉明湖", "cards": [{"tier": "基礎", "text": "文體：<span class='hl'>記敘文（遊記）</span>。<br>主旨：用實際行動展現對山林的愛。"}, {"tier": "基礎", "text": "<span class='hl'>嘉明湖</span>在臺東縣，<br>是臺灣<span class='hl'>第二高</span>的高山湖泊。"}, {"tier": "進階 ", "湖水顏色深藍如寶石", "湖形像一滴眼淚"], "answer": 2, "explain": "課文指出因湖水顏色深藍如寶石，被登山界稱為「天使的眼淚」。"}, {"lv": 2, "type": "choice", "q": "「夢寐以求」這個成語的意思最接近下列何者？", "options": ["睡得很香甜", "做了一個惡夢", "半夢半醒", "睡夢中都在尋找追求，願望強烈迫切"], "answer": 3, "explain": "「夢寐以求」形容睡夢中都在尋找追求，願望強烈而迫切。"}, {"lv": 2, "type": "choice", "q": "作者描寫嘉明湖時提到「沒有溪流注入，卻終年清澈湛藍」，這種寫法兼具了哪一種修辭？", "options": ["摹寫（視覺）", "排比", "誇飾", "頂真"], "answer": 0, "explain": "描寫湖水「清澈湛藍」的顏色屬於視覺摹寫。"}, {"lv": 2, "type": "choice", "q": "「捷足先登」這個成語比喻什麼？", "options": ["走路走得很慢", "爬山爬得很高", "行動最快者先達到目的", "腳受傷無法行走"], "answer": 2, "explain": "「捷足先登」比喻行動最快者先達到目的。"}, {"lv": 2, "type": "choice", "q": "「義憤填膺」是形容什麼？", "options": ["心中充滿喜悅", "胸中充滿因正義而激起的憤怒", "非常害怕", "非常疲倦"], "answer": 1, "explain": "「義憤填膺」指胸中充滿因正義而激起的憤怒。"}, {"lv": 2, "type": "choice", "q": "「出類拔萃」這個成語是形容什麼？", "options": ["才能特出，超越眾人", "個子長得很高", "跑得非常快", "運氣特別好"], "answer": 0, "explain": "「出類拔萃」形容才能特出，超越眾人。"}, {"lv": 2, "type": "tf", "q": "「迷人的嘉明湖一直呼喚著我」是擬人修辭。", "answer": true, "explain": "把嘉明湖當作人會呼喚，是擬人修辭。"}, {"lv": 2, "type": "tf", "q": "本課結尾使用的是「期許法」。", "answer": true, "explain": "本課教點指出結尾用期許法，希望山友一起響應。"}, {"lv": 2, "type": "tf", "q": "作者用「湛藍」來指稱湖水，是以事物的顏色（特色）來指稱事物。", "answer": true, "explain": "以顏色等特色指稱事物，是本課的描寫手法之一。"}, {"lv": 2, "type": "tf", "q": "敘述過去的回憶時，時間詞應該用「明天」而不是「隔天」。", "answer": false, "explain": "敘述非當下、事後回憶時應用「隔天」，而非「明天」。"}, {"lv": 2, "type": "tf", "q": "「雖然沒有溪流注入，卻終年清澈湛藍」是轉折複句。", "answer": true, "explain": "前後分句意思相對，用「雖然……卻……」是轉折複句。"}, {"lv": 2, "type": "tf", "q": "出類拔萃、夢寐以求、百折不撓都是本課的生字延伸成語。", "answer": true, "explain": "本課生字延伸成語包含出類拔萃、夢寐以求、捷足先登、義憤填膺、百折不撓。"}, {"lv": 2, "type": "tf", "q": "「咬緊牙關」是形容心情非常愉快。", "answer": false, "explain": "「咬緊牙關」比喻忍受痛苦而堅持到底。"}, {"lv": 2, "type": "tf", "q": "「天使的眼淚」是布農族對嘉明湖的稱呼。", "answer": false, "explain": "「天使的眼淚」是登山界的稱呼；布農族稱它「月亮的鏡子」。"}, {"lv": 2, "type": "tf", "q": "「汗流浹背」是形容流了很多汗、溼透了背部。", "answer": true, "explain": "「汗流浹背」指流了很多汗，溼透了背部。"}, {"lv": 2, "type": "tf", "q": "文章開頭用天使落淚的傳說來描寫嘉明湖，是為了引起讀者好奇並帶出登山動機。", "answer": true, "explain": "開頭以傳說帶出嘉明湖的神祕美 公斤，一公斤土石會增加背負的重量，因而左右為難。"}, {"lv": 3, "type": "choice", "q": "結尾說「說不定會讓天使感動，再落下幾滴淚呢」，這樣寫的用意最可能是什麼？", "options": ["真的相信有天使", "責怪天使不幫忙", "說明天氣會下雨", "語氣俏皮，用『感動』凸顯行動的意義，並呼應題目與首段"], "answer": 3, "explain": "末句語氣俏皮，以「感動」凸顯行動意涵，並與題目、首段「天使的眼淚」呼應。"}, {"lv": 3, "type": "choice", "q": "作者選擇用「期許法」作結尾，對全篇有什麼好處？", "options": ["讓文章更有感染力，呼籲山友一起響應這份對山林的愛", "讓文章變短", "說明活動的費用", "介紹下一個景點"], "answer": 0, "explain": "期許法在結尾表達旨意，呼籲山友響應，使文章更具感染力。"}, {"lv": 3, "type": "choice", "q": "下列哪一句最適合用「百折不撓」來形容作者的登山表現？", "options": ["他一看到山路就放棄了", "即使汗流浹背、氣喘如牛，他仍咬緊牙關一步步往前行", "他坐車上山很輕鬆", "他覺得活動沒有意義"], "answer": 1, "explain": "作者受盡辛苦仍堅持完成，符合「百折不撓」意志剛強、堅持到底之意。"}, {"lv": 3, "type": "choice", "q": "課文用對話（自言自語）「『一公斤？』」來敘述，主要作用是什麼？", "options": ["增加字數", "描寫天氣", "更能表達作者心中的為難與掙扎", "介紹活動規則"], "answer": 2, "explain": "透過自言自語的對話，更能表達作者面對是否背土石時心中的為難。"}, {"lv": 3, "type": "choice", "q": "這個活動為什麼用「南橫公路向陽山區崩塌的土石」做為回填材料？", "options": ["因為比較便宜", "因為那裡的土比較重", "因為運送比較方便", "為避免外來土壤影響當地環境，並減少成本、降低碳足跡"], "answer": 3, "explain": "使用當地崩塌土石可避免外來土壤影響環境，也能減少成本與碳足跡。"}, {"lv": 3, "type": "choice", "q": "作者說這場登山是「夢幻挑戰」，「夢幻」一詞最主要表達什麼？", "options": ["作者神往、期待的風景能成行，夢想成真", "路途遙遠", "裝備很高級", "天氣很好"], "answer": 0, "explain": "作者神往期待的風景如今能成行、夢想成真，對他而言十分夢幻。"}, {"lv": 3, "type": "choice", "q": "從全文看，作者參與背土石活動，建立了什麼樣的連結？", "options": ["人與金錢的連結", "人與人、人與大自然之間的連結", "城市與鄉村的連結", "過去與未來的連結"], "answer": 1, "explain": "這項對環境友善的雙向付出，建立了人與人、人與大自然之間的連結。"}, {"lv": 3, "type": "choice", "q": "結合全文，「一公斤的愛」最能呼應本課的哪一個主旨？", "options": ["介紹高山湖泊的形成", "說明登山的危險", "用實際行動具體展現對山林的愛", "記錄旅行的花費"], "answer": 2, "explain": "「一公斤的愛」即用實際行動回填土石，呼應對山林之愛的主旨。"}, {"lv": 3, "type": "choice", "q": "作者凝望湖水時「又想起那一公斤的愛」，這樣安排在結構上有什麼作用？", "options": ["岔開話題", "說明湖水深度", "介紹布農族文化", "以完成任務的踏實與成就，連結眼前美景，使行動更有意義"], "answer": 3, "explain": "完成土石回填的成就與踏實，造就眼前美景，也讓行動更富意義。"}, {"lv": 3, "type": "choice", "q": "下列哪一項最符合本課想傳達的態度？", "options": ["欣賞美景就好，環境不關我事", "愛護山林要從實際行動做起", "登山愈快愈好", "裝備愈多愈厲害"], "answer": 1, "explain": "本課強調以實際行動（背土石回填）展現並落實對山林的愛。"}, {"lv": 3, "type": "choice", "q": "作者面對「再背一公斤」的掙扎，最後做了什麼決定？這反映他怎樣的心境？", "options": ["放下土石，覺得太重了", "請別人幫忙背，自己輕鬆走", "背起對山林滿滿的愛，負重前行，反映他對山林的喜愛勝過辛苦", "半路就放棄下山"], "answer": 2, "explain": "作者最後決定背起對山林滿滿的愛負重前行，顯示愛山林之情勝過身體的辛苦。"}, {"lv": 3, "type": "choice", "q": "綜合全文，作者最希望讀者讀完這篇文章後做到什麼？", "options": ["記住嘉明湖的海拔", "學會登山技巧", "一起響應活動，用實際行動愛護山林", "背更重的裝備"], "answer": 2, "explain": "作者以期許法呼籲每位山友一起響應，用實際行動愛護山林。"}, {"lv": 3, "type": "choice", "q": "作者完成土石回填、把土石背到指定地點時，心中是什麼感受？", "options": ["充滿成就感", "非常後悔", "覺得無聊", "感到生氣"], "answer": 0, "explain": "課文寫五個小時後將土石背到指定地點，那一刻作者充滿成就感。"}, {"lv": 3, "type": "tf", "q": "課題中的「一公斤」象徵作者用實際行動回填土石、付出對山林的愛。", "answer": true, "explain": "「一公斤」指背上山回填的土石，象徵以行動付出對山林的愛。"}, {"lv": 3, "type": "tf", "q": "作者已背將近十公斤裝備，所以拒絕再背一公斤土石。", "answer": false, "explain": "作者雖左右為難，最後仍決定背起對山林的愛，負重前行。"}, {"lv": 3, "type": "tf", "q": "「區區的一公斤，在這段路上格外有分量」的「分量」只代表重量，沒有別的意思。", "answer": false, "explain": "「分量」除了重量，更指作者賦予這一公斤對山林的愛與特殊意義。"}, {"lv": 3, "type": "tf", "q": "步道沿線土石流失，是因為眾人踩踏加上雨水沖刷造成的。", "answer": true, "explain": "課文指出眾人踩踏加上雨水沖刷，使步道沿線土石流失。"}, {"lv": 3, "type": "tf", "q": "如果沒有回填土石，對地形景觀、生物甚至遊客安全都會造成很大影響。", "answer": true, "explain": "課文指出若沒回填，將對地形景觀、生物與遊客安全造成很大影響。"}, {"lv": 3, "type": "tf", "q": "作者背土石的心情，是從期待、猶豫、疲憊到最後的自豪、感動與期許。", "answer": true, "explain": "課文呈現作者由期待、高興、猶豫、疲憊到自豪、感動、期許的心情轉變。"}, {"lv": 3, "type": "tf", "q": "結尾「讓天使感動再落下幾滴淚」語氣俏皮，並呼應了題目與第一段。", "answer": true, "explain": "末句以俏皮語氣用「感動」凸顯行動意義，並與題目、首段呼應。"}, {"lv": 3, "type": "tf", "q": "用「百折不撓」來形容作者咬緊牙關、堅持把土石背到指定地點是恰當的。", "answer": true, "explain": "作者歷經辛苦仍堅持完成，符合百折不撓堅持到底之意。"}, {"lv": 3, "type": "tf", "q": "作者用自言自語「『一公斤？』」的對話，是為了表達心中的為難。", "answer": true, "explain": "透過自言自語更能表達作者是否背土石的為難與掙扎。"}, {"lv": 3, "type": "tf", "q": "活動用南橫向陽山區崩塌的土石回填，是為了避免外來土壤影響環境並降低碳足跡。", "answer": true, "explain": "使用當地崩塌土石可避免外來土壤影響，並減少成本、降低碳足跡。"}, {"lv": 3, "type": "tf", "q": "作者稱這場登山為「夢幻挑戰」，是因為裝備非常高級。", "answer": false, "explain": "「夢幻」是因為作者神往期待的風景能成行、夢想成真，與裝備無關。"}, {"lv": 3, "type": "tf", "q": "本課透過背土石的活動，建立了人與人、人與大自然之間的連結。", "answer": true, "explain": "這項對環境友善的雙向付出，建立了人與人、人與大自然的連結。"}, {"lv": 3, "type": "tf", "q": "作者參與活動是被迫的，他其實覺得這個活動沒有意義。", "answer": false, "explain": "作者懷著對山林的愛主動響應，完成後充滿成就感，肯定活動的意義。"}, {"lv": 3, "type": "tf", "q": "「一公斤的愛」呼應了本課「用實際行動展現對山林的愛」的主旨。", "answer": true, "explain": "「一公斤的愛」即以行動回填土石，呼應對山林之愛的主旨。"}, {"lv": 3, "type": "tf", "q": "作者完成土石回填後充滿成就感，這份踏實也讓眼前的美景更有意義。", "answer": true, "explain": "完成任務的成就與踏實造就眼前美景，使行動更富意義。"}, {"lv": 3, "type": "tf", "q": "本課想傳達的態度是：愛護山林只要欣賞美景就好，不必付出行動。", "answer": false, "explain": "本課強調愛護山林要從實際行動（背土石回填）做起。"}]}]}, {"id": "u4", "title": "第肆單元　想像起飛", "cls": "u4", "lessons": [{"id": "L10", "name": "第十課　想像與發明", "cards": [{"tier": "基礎", "text": "文體：<span class='hl'>說明文</span>。<br>主旨：<span class='hl'>想像促進發明</span>。"}, {"tier": "基礎", "text": "課文結構：<span class='hl'>總說 → 分說 → 總結</span>。"}, {"tier": "進階", "text": "例子：<span class='hl'>蔡倫</span>改進東漢造紙<br>（用樹皮、破布、麻頭、魚網），後人稱「蔡侯紙」。"}, {"tier": "進階", "text": "例子：<span class='hl'>便利貼</span>是「紙張加上膠」的發明（3M 公司）。"}, {"tier": "進階", "text": "「合併兩物」的想像：椅子＋輪子＝輪椅；<br>紙張＋膠＝便利貼（這叫「<span class='hl'>組合法</span>」）。"}, {"tier": "深入", "text": "修辭：「想像是智慧的火苗」是「<span class='hl'>譬喻</span>」。"}, {"tier": "深入", "text": "想像是促成發明的<span class='hl'>重要關鍵</span>，<br>為社會帶來進步。"}, {"tier": "深入", "text": "生字成語：秀外慧中、事過境遷、<br>因材施教、知己知彼、權宜之計。"}], "questions": [{"lv": 1, "type": "tf", "q": "〈想像與發明〉這一課收錄在第肆單元「想像起飛」裡。", "answer": true, "explain": "本課屬於第肆單元「想像起飛」。"}, {"lv": 1, "type": "tf", "q": "第肆單元「想像起飛」的單元主旨是「想像讓故事豐富、生活精采」。", "answer": true, "explain": "單元主旨即為「想像讓故事豐富、生活精采」。"}, {"lv": 1, "type": "tf", "q": "〈想像與發明〉是一篇記敘文。", "answer": false, "explain": "本課是說明文（事理類），不是記敘文。"}, {"lv": 1, "type": "tf", "q": "〈想像與發明〉這一課的主旨是「發明限制想像」。", "answer": false, "explain": "課文主旨是「想像促進發明」，不是發明限制想像。"}, {"lv": 1, "type": "tf", "q": "在第肆單元裡，〈想像與發明〉示範的是「結合兩物的想像」。", "answer": true, "explain": "本課示範「結合兩物的想像」。"}, {"lv": 1, "type": "tf", "q": "課文中提到改進造紙技術的人是蔡倫。", "answer": true, "explain": "課文舉蔡倫改進造紙技術為例。"}, {"lv": 1, "type": "tf", "q": "蔡倫改進的是西漢時期的造紙技術。", "answer": false, "explain": "課文說蔡倫改進的是東漢時的造紙技術，不是西漢。"}, {"lv": 1, "type": "tf", "q": "後人把蔡倫製的紙稱為「蔡侯紙」。", "answer": true, "explain": "因蔡倫被封為龍亭侯，後人稱他製的紙為「蔡侯紙」。"}, {"lv": 1, "type": "tf", "q": "蔡倫因為對文教的貢獻，被皇帝封為「龍亭侯」。", "answer": true, "explain": "課文補充資料指出蔡倫被皇帝封為龍亭侯。"}, {"lv": 1, "type": "tf", "q": "蔡倫造紙利用的材料包括樹皮、破布、麻頭和魚網。", "answer": true, "explain": "課文列出樹皮、破布、麻頭和魚網等材料。"}, {"lv": 1, "type": "tf", "q": "便利貼是把紙張加上膠所做成的發明。", "answer": true, "explain": "便利貼是「紙張加上膠」的合併兩物發明。"}, {"lv": 1, "type": "tf", "q": "課文舉例，把椅子加上膠就變成了輪椅。", "answer": false, "explain": "輪椅是「椅子加上輪子」，不是加上膠。"}, {"lv": 1, "type": "tf", "q": "「想像是智慧的火苗」這句話運用了譬喻的修辭。", "answer": true, "explain": "把想像比喻為火苗，屬於譬喻修辭。"}, {"lv": 1, "type": "tf", "q": "本課練習想像的方法叫做「摹寫法」，也就是合併兩物。", "answer": false, "explain": "本課練習想像的方法是「組合法」（合併兩物），不是摹寫法。"}, {"lv": 1, "type": "tf", "q": "想找出文章大意，可以用找「主題句」的方法。", "answer": true, "explain": "課文教點提到透過找主題句來掌握大意。"}, {"lv": 1, "type": "tf", "q": "課文認為想像是促成發明的重要關鍵。", "answer": true, "explain": "總結指出想像是促成發明的重要關鍵。"}, {"lv": 1, "type": "tf", "q": "〈想像與發明〉的課文一開始就是「總說」，先說想像讓許多發明誕生。", "answer": true, "explain": "課文結構為總說→分說→總結，總說先點出想像讓發明誕生。"}, {"lv": 1, "type": "tf", "q": "便利貼背面上緣有膠，撕除時不會留下殘膠、傷到表面。", "answer": true, "explain": "補充資料說明便利貼可重複貼附，撕除時不留殘膠。"}, {"lv": 1, "type": "tf", "q": "課文中說蔡倫降低了紙的成本。", "answer": true, "explain": "課文指出蔡倫充分利用廢棄物品，降低了紙的成本。"}, {"lv": 1, "type": "tf", "q": "「秀外慧中」是本課生字延伸的成語之一。", "answer": true, "explain": "秀外慧中是本課生字延伸成語。"}, {"lv": 1, "type": "choice", "q": "〈想像與發明〉這一課的文體是什麼？", "options": ["記敘文", "說明文", "抒情文", "應用文"], "answer": 1, "explain": "本課是說明文（事理類）。"}, {"lv": 1, "type": "choice", "q": "〈想像與發明〉收錄在哪一個單元？", "options": ["第肆單元「想像起飛」", "第壹單元", "第貳單元", "第參單元"], "answer": 0, "explain": "本課屬於第肆單元「想像起飛」。"}, {"lv": 1, "type": "choice", "q": "課文中改進造紙技術的人是誰？", "options": ["麥可‧哈特", "Arthur Fry", "蔡倫", "Spencer Silver"], "answer": 2, "explain": "課文舉蔡倫改進造紙技術為例。"}, {"lv": 1, "type": "choice", "q": "蔡倫改進的是哪個時代的造紙技術？", "options": ["東漢", "唐朝", "西周", "清朝"], "answer": 0, "explain": "課文說蔡倫改進了東漢時的造紙技術。"}, {"lv": 1, "type": "choice", "q": "後人把蔡倫所製的紙稱為什麼？", "options": ["龍亭紙", "東漢紙", "樹皮紙", "蔡侯紙"], "answer": 3, "explain": "蔡倫被封為龍亭侯，後人稱他製的紙為「蔡侯紙」。"}, {"lv": 1, "type": "choice", "q": "下列哪一項「不是」課文中蔡倫造紙用的材料？", "options": ["樹皮", "破布", "塑膠", "魚網"], "answer": 2, "explain": "課文列出樹皮、破布、麻頭、魚網，沒有塑膠。"}, {"lv": 1, "type": "choice", "q": "便利貼是把哪兩樣東西合併而成的發明？", "options": ["椅子加輪子", "紙張加膠", "紙張加墨水", "木頭加釘子"], "answer": 1, "explain": "便利貼是紙張加上膠的合併兩物發明。"}, {"lv": 1, "type": "choice", "q": "「椅子加上輪子」可以變成什麼新物品？", "options": ["輪椅", "便利貼", "紙膠帶", "雙面膠"], "answer": 0, "explain": "椅子加上輪子可以變成輪椅。"}, {"lv": 1, "type": "choice", "q": "〈想像與發明〉這一課的主旨是什麼？", "options": ["發明很困難", "紙張很重要", "蔡倫很偉大", "想像促進發明"], "answer": 3, "explain": "課文主旨是「想像促進發明」。"}, {"lv": 1, "type": "choice", "q": "「想像是智慧的火苗」這句話用了哪一種修辭？", "options": ["設問", "誇飾", "譬喻", "排比"], "answer": 2, "explain": "把想像比喻成火苗，是譬喻修辭。"}, {"lv": 1, "type": "choice", "q": "本課用來練習想像的方法叫做什麼？", "options": ["組合法", "摹寫法", "設問法", "排比法"], "answer": 0, "explain": "本課運用「組合法」（合併兩物）練習想像。"}, {"lv": 1, "type": "choice", "q": "想要找出文章大意，課文建議用什麼方法？", "options": ["背全文", "找主題句", "數字數", "看插圖"], "answer": 1, "explain": "課文教學透過找主題句來形成大意。"}, {"lv": 1, "type": "choice", "q": "〈想像與發明〉課文的結構順序是？", "options": ["總說→分說→總結", "分說→總說→總結", "總結→分說→總說", "分說→總結→總說"], "answer": 0, "explain": "課文結構為總說→分說→總結。"}, {"lv": 1, "type": "choice", "q": "課文認為想像和發明之間是什麼關係？", "options": ["想像阻礙發明", "想像和發明無關", "想像促成發明", "發明限制想像"], "answer": 2, "explain": "課文總結想像促成發明。"}, {"lv": 1, "type": "choice", "q": "下列哪一個是本課生字延伸的成語？", "options": ["守株待兔", "畫蛇添足", "事過境遷", "亡羊補牢"], "answer": 2, "explain": "事過境遷是本課生字延伸成語。"}, {"lv": 1, "type": "choice", "q": "蔡倫因為對文教的貢獻，被皇帝封為什麼？", "options": ["造紙侯", "龍亭侯", "蔡侯", "東漢侯"], "answer": 1, "explain": "蔡倫被皇帝封為龍亭侯。"}, {"lv": 1, "type": "choice", "q": "課文的「總結」想表達的是什麼？", "options": ["想像是促成發明的重要關鍵", "蔡倫很有名", "便利貼很好用", "書寫很重要"], "answer": 0, "explain": "總結指出想像是促成發明的重要關鍵，為社會燃起進步的希望之光。"}, {"lv": 2, "type": "tf", "q": "「椅子加上輪子」和「紙張加上膠」都是運用「組合法」（合併兩物）的例子。", "answer": true, "explain": "兩者都是把兩樣物品合併的組合法例子。"}, {"lv": 2, "type": "tf", "q": "便利貼和輪椅都屬於「改變事物規模」想像而來的發明。", "answer": false, "explain": "便利貼、輪椅都是「合併兩物」的發明，不是改變規模。"}, {"lv": 2, "type": "tf", "q": "蔡倫改進造紙技術，是屬於「改變事物規模」的想像，而不是合併兩物。", "answer": false, "explain": "蔡倫造紙是說明想像帶來發明的例子；本課重點是合併兩物，改變事物規模是第十一課。"}, {"lv": 2, "type": "tf", "q": "「想像是智慧的火苗」是譬喻；課文中「不但……而且……」則是遞進複句。", "answer": true, "explain": "前者為譬喻，後者為遞進複句，兩種手法不同。"}, {"lv": 2, "type": "tf", "q": "用「組合法」想像時，是把兩樣不同的物品合併，創造出新的發明。", "answer": true, "explain": "組合法就是合併兩物產生新發明。"}, {"lv": 2, "type": "tf", "q": "課文舉蔡倫和便利貼為例，目的是說明「想像促進發明」。", "answer": true, "explain": "舉例都是為了支持主旨「想像促進發明」。"}, {"lv": 2, "type": "tf", "q": "「不但費時費力，而且不方便攜帶」這句的「不但……而且……」是因果複句。", "answer": false, "explain": "「不但……而且……」是遞進複句，不是因果複句。"}, {"lv": 2, "type": "tf", "q": "課文是先用蔡倫造紙、便利貼等例子分說，最後才寫總說，屬於先「分」後「總」的寫法。", "answer": false, "explain": "課文是先總說再分說、最後總結，屬先總後分，敘述順序顛倒。"}, {"lv": 2, "type": "tf", "q": "找段落大意時，先找出每段的主題句，再串連各段主題句就能形成全文大意。", "answer": true, "explain": "課文教點說明先找主題句，再串連潤飾形成全文大意。"}, {"lv": 2, "type": "tf", "q": "「紙張加上膠」可以變成的新物品是輪椅和辦公椅。", "answer": false, "explain": "紙張加膠可變成便利貼、紙膠帶、雙面膠；輪椅、辦公椅是椅子加輪子。"}, {"lv": 2, "type": "tf", "q": "蔡倫造紙的例子和「椅子加上輪子」的例子，都是本課用來說明主旨的舉例。", "answer": true, "explain": "兩者都是課文用來說明想像促進發明的例子。"}, {"lv": 2, "type": "tf", "q": "「組合法」和「找主題句」這兩件事，前者是想像的方法，後者是找大意的方法。", "answer": true, "explain": "組合法用於練習想像，找主題句用於掌握大意，作用不同。"}, {"lv": 2, "type": "tf", "q": "課文標題〈想像與發明〉是一個只有單一重點詞語的題目。", "answer": false, "explain": "標題含「想像」和「發明」兩個重點詞語，屬雙項題目。"}, {"lv": 2, "type": "tf", "q": "把手機加上照相機、手電筒、計算機等功能，也是「合併功能」的想像。", "answer": true, "explain": "課文以手機加上多種功能為例，說明合併的想像。"}, {"lv": 2, "type": "tf", "q": "「想像是智慧的火苗，點燃人類的奇思妙想」一句，把想像當成會點火的東西，含有譬喻。", "answer": true, "explain": "將想像比喻為火苗、能點燃，屬譬喻手法。"}, {"lv": 2, "type": "choice", "q": "下列哪一組都是「合併兩物」想像而來的發明？", "options": ["輪椅、便利貼", "龜甲、獸骨", "樹皮、破布", "竹片、麻頭"], "answer": 0, "explain": "輪椅（椅子加輪子）和便利貼（紙張加膠）都是合併兩物。"}, {"lv": 2, "type": "choice", "q": "「紙張加上膠」可以變成下列哪一項新物品？", "options": ["輪椅", "便利貼", "手電筒", "計算機"], "answer": 1, "explain": "紙張加膠可變成便利貼（或紙膠帶、雙面膠）。"}, {"lv": 2, " {"lv": 3, "type": "choice", "q": "「為了比賽，教練看了無數敵隊影片並制定新戰術」最適合用哪個成語形容？", "options": ["秀外慧中", "知己知彼", "事過境遷", "因材施教"], "answer": 1, "explain": "了解自己也了解對手，正是「知己知彼」。"}, {"lv": 3, "type": "choice", "q": "課文把「想像」比喻成「智慧的火苗」，這樣寫的好處是什麼？", "options": ["讓句子變長", "炫耀詞彙", "湊字數", "把抽象的想像寫得生動具體"], "answer": 3, "explain": "譬喻能把抽象的想像寫得生動具體，便於理解。"}, {"lv": 3, "type": "choice", "q": "以下哪一項最能說明「合併兩物」想像帶來的好處？", "options": ["把紙張加上膠，做出可重複貼的便利貼", "把紙張變得更大", "把椅子塗成紅色", "把紙撕成碎片"], "answer": 0, "explain": "紙張加膠做出便利貼，是合併兩物產生更方便發明的好例子。"}, {"lv": 3, "type": "choice", "q": "課文比較古代與現代的書寫工具，得到的「相異」結論是什麼？", "options": ["現代書寫工具不再拘泥於紙張", "古代工具比較好", "兩者完全相同", "現代不用書寫"], "answer": 0, "explain": "課文提問解答指出相異處在於現代書寫工具已不拘泥於紙張。"}, {"lv": 3, "type": "choice", "q": "「遇到困難應尋求澈底解決，而不是只用____撐過一時」，空格最適合填入？", "options": ["因材施教", "秀外慧中", "權宜之計", "知己知彼"], "answer": 2, "explain": "權宜之計指因應一時的計謀，與「撐過一時」呼應。"}, {"lv": 3, "type": "choice", "q": "課文先寫「總說」、再「分說」、最後「總結」，這樣安排的用意是什麼？", "options": ["讓文章更難懂", "先點出觀點，用例子說明，再次強化主旨", "隨意排列", "只是為了好看"], "answer": 1, "explain": "總分總結構能先立論點、舉例支持、最後強化主旨，使說明清楚有條理。"}, {"lv": 3, "type": "choice", "q": "下列哪一個發明的產生過程，最符合課文「想像解決生活困境或需求」的說法？", "options": ["因為刻字不便，想像並發明出輕薄好用的紙", "因為無聊隨便畫畫", "因為模仿別人", "因為不想思考"], "answer": 0, "explain": "刻字不便促成想像並發明紙張，正符合「困境或需求引發想像與發明」。"}, {"lv": 3, "type": "choice", "q": "綜合全課，作者最想傳達的核心觀念是什麼？", "options": ["蔡倫是偉人", "便利貼很實用", "想像促進發明，為社會帶來進步", "古代工具不好用"], "answer": 2, "explain": "全課主旨是想像促進發明，並為社會燃起進步的希望之光。"}, {"lv": 3, "type": "choice", "q": "「許多轟動一時的大事，____後便逐漸被人淡忘」最適合填入哪個成語？", "options": ["秀外慧中", "知己知彼", "事過境遷", "因材施教"], "answer": 2, "explain": "事過境遷指事情過了、環境改變，與「逐漸被淡忘」呼應。"}, {"lv": 3, "type": "choice", "q": "「阿姨____又待人親切，人緣極佳」最適合填入哪個成語形容外貌與內在？", "options": ["秀外慧中", "權宜之計", "事過境遷", "知己知彼"], "answer": 0, "explain": "秀外慧中形容容貌秀美、內心聰慧，符合外貌與內在皆佳。"}, {"lv": 3, "type": "choice", "q": "課文提到「將椅子加上輪子，將紙張加上膠，新的發明一件接著一件問世」，這句話主要說明什麼？", "options": ["發明很慢", "合併兩物的想像不斷帶來新發明", "紙很貴", "椅子很重要"], "answer": 1, "explain": "此句以連續的合併例子說明合併兩物的想像不斷帶來新發明。"}, {"lv": 3, "type": "tf", "q": "課文認為網路出現後，人們只能靠書信和家用電話聯絡彼此。", "answer": false, "explain": "課文說「幾十年前」只能靠書信及家用電話，網路出現後才讓電話化身手機，故敘述顛倒。"}, {"lv": 3, "type": "tf", "q": "從課文可知，想像不只解決問題，還能發展出更多意想不到的創造，使發明一件接著一件問世。", "answer": true, "explain": "課文指出發明將不可能變可能，又發展出更多意想不到的創造，呼應發明接連問世。"}, {"lv": 3, "type": "tf", "q": "用「找主題句、再串連潤飾」的方法掌握全文大意，比把整篇課文背下來更能真正理解文章。", "answer": true, "explain": "課文教點主張先找主題句再串連潤飾形成大意，重在理解而非死背。"}, {"lv": 3, "type": "choice", "q": "課文以蔡倫造紙為例，最主要想讓讀者明白的是？", "options": ["紙的價格", "名人排行榜", "古代很無聊", "透過想像不斷嘗試，發明能滿足需求並推動進步"], "answer": 3, "explain": "段落大意指出蔡倫造紙說明透過想像、不斷嘗試，讓發明滿足需求並影響發展。"}, {"lv": 3, "type": "choice", "q": "課文用「不但費時費力，而且不方便攜帶及收藏」描寫古代刻字，這樣寫的作用是什麼？", "options": ["稱讚古人", "湊字數", "與後文紙的便利對比，凸顯想像帶來的進步", "介紹龜甲"], "answer": 2, "explain": "先寫刻字的不便，再寫想像發明出輕薄好用的紙，形成對比凸顯進步。"}, {"lv": 3, "type": "choice", "q": "綜合課文，下列哪一句最能呼應「想像是促成發明的重要關鍵」？", "options": ["有了想像，人們才能跳脫原有思考、勇於嘗試新創造", "紙很便宜", "蔡倫被封為龍亭侯", "便利貼是正方形"], "answer": 0, "explain": "課文以「有了想像，人們才能跳脫原有思考、勇於嘗試新創造」呼應想像是發明關鍵。"}, {"lv": 3, "type": "choice", "q": "「李老師善於____，讓每個學生都能走上適合自己的道路」，空格最適合填入？", "options": ["知己知彼", "秀外慧中", "因材施教", "權宜之計"], "answer": 2, "explain": "依學生資質給予不同教導，正是因材施教。"}]}, {"id": "L11", "name": "第十一課　小事物　大驚奇", "cards": [{"tier": "基礎", "text": "作者：<span class='hl'>魯皓平</span>。文體：記敘文。<br>介紹微型攝影師「<span class='hl'>田中達也</span>」（日本人）。"}, {"tier": "基礎", "text": "主旨：改變想法、重新思考，<br>就能從<span class='hl'>不同視角發現樂趣</span>。"}, {"tier": "進階", "text": "田中達也的創作：把日常小物<br>「<span class='hl'>改變規模、重新組合、結合微型人偶</span>」。"}, {"tier": "進階", "text": "作品例子：把「<span class='hl'>青花菜</span>」當成濃密的綠蔭、<br>耳機當煎臺。"}, {"tier": "進階", "text": "寫作方法叫「<span class='hl'>改變規模法</span>」；<br>他把靈感收進筆記本。"}, {"tier": "深入", "text": "修辭：「不僅……還……」是「<span class='hl'>遞進複句</span>」。"}, {"tier": "深入", "text": "換個角度看平凡的小東西，<br>就能發現「大驚奇」。"}, {"tier": "深入", "text": "生字成語：尋章摘句、生靈塗炭、<br>集思廣益、改邪歸正。"}], "questions": [{"lv": 1, "type": "choice", "q": "〈小事物 大驚奇〉這一課的作者是誰?", "options": ["魯皓平", "田中達也", "林良", "琦君"], "answer": 0, "explain": "課文標示作者為魯皓平,他撰文介紹微型攝影師田中達也。"}, {"lv": 1, "type": "choice", "q": "〈小事物 大驚奇〉介紹的微型攝影師是哪一位?", "options": ["宮崎駿", "田中達也", "村上春樹", "新海誠"], "answer": 1, "explain": "本課主角是日本微型攝影師田中達也。"}, {"lv": 1, "type": "choice", "q": "田中達也是哪一個國家的人?", "options": ["韓國", "臺灣", "日本", "中國"], "answer": 2, "explain": "田中達也一九八一年出生於日本熊本縣,是日本人。"}, {"lv": 1, "type": "choice", "q": "田中達也出生於日本的哪一個地方?", "options": ["東京都", "北海道", "沖繩縣", "熊本縣"], "answer": 3, "explain": "作者介紹指出田中達也一九八一年出生於日本熊本縣。"}, {"lv": 1, "type": "choice", "q": "田中達也是西元哪一年出生的?", "options": ["一九八一年", "一九七一年", "一九九一年", "二〇〇一年"], "answer": 0, "explain": "課文作者介紹寫明田中達也於一九八一年(西元1981年)出生。"}, {"lv": 1, "type": "choice", "q": "田中達也的職業是什麼?", "options": ["微型攝影師", "畫家", "建築師", "音樂家"], "answer": 0, "explain": "課文提問與課文都指出田中達也是微型攝影師、創作者。"}, {"lv": 1, "type": "choice", "q": "〈小事物 大驚奇〉這一課屬於哪一種文體?", "options": ["說明文", "抒情文", "記敘文", "應用文"], "answer": 2, "explain": "課本標示本課的文本表述為「記敘文本」。"}, {"lv": 1, "type": "choice", "q": "本課收錄在第幾單元?", "options": ["第肆單元「想像起飛」", "第壹單元", "第貳單元", "第參單元"], "answer": 0, "explain": "〈小事物 大驚奇〉屬於第肆單元「想像起飛」。"}, {"lv": 1, "type": "choice", "q": "本課的主旨是什麼?", "options": ["努力讀書才能成功", "要愛護自然環境", "改變既有的想法、重新思考,便可以從不同的視角中發現樂趣", "團結合作力量大"], "answer": 2, "explain": "課文主旨明確寫出:改變既有的想法,重新思考,便可以從不同的視角中發現樂趣。"}, {"lv": 1, "type": "choice", "q": "田中達也創作時,常從哪裡尋找靈感?", "options": ["夢境", "電視節目", "生活中", "圖書館的書"], "answer": 2, "explain": "課文指出他在人們習以為常的生活中找尋靈感。"}, {"lv": 1, "type": "choice", "q": "田中達也會把日常小物作為什麼?", "options": ["創作的材料", "禮物送人", "收藏品出售", "裝飾品擺設"], "answer": 0, "explain": "課文說他收集日常小物作為創作的材料。"}, {"lv": 1, "type": "choice", "q": "田中達也在作品中常結合下列哪一種角色?", "options": ["真人模特兒", "卡通圖案", "微型人偶", "動物標本"], "answer": 2, "explain": "課文指出他將事物改變規模、重新組合,並結合微型人偶。"}, {"lv": 1, "type": "choice", "q": "田中達也透過什麼把作品呈現出來?", "options": ["畫筆", "鏡頭", "電腦繪圖", "雕刻刀"], "answer": 1, "explain": "課文說他運用想像力和鏡頭,把日常小東西化為令人驚奇的畫面。"}, {"lv": 1, "type": "choice", "q": "在作品〈野餐〉中,田中達也用什麼蔬菜來呈現濃密的綠蔭?", "options": ["高麗菜", "菠菜", "青花菜", "紅蘿蔔"], "answer": 2, "explain": "課文提問指出他用青花菜來呈現濃密的綠蔭。"}, {"lv": 1, "type": "choice", "q": "田中達也把把耳機當成什麼,創 眾人合作,不是一個人獨自完成。"}, {"lv": 3, "type": "tf", "q": "作者用「不起眼」、「習以為常」形容那些事物,是為了凸顯它們換個角度看之後的驚奇。", "answer": true, "explain": "課文提問解答:正因事物不起眼,換角度看後才能凸顯其驚奇。"}, {"lv": 3, "type": "tf", "q": "成語「生靈塗炭」可以用來稱讚作品很有創意。", "answer": false, "explain": "生靈塗炭形容人民處於極端艱苦的困境,不能用來稱讚作品。"}, {"lv": 3, "type": "tf", "q": "田中達也偏好用蔬菜這類大眾能理解的材料,是因為若觀眾看不懂主題,創作興趣和意圖就會降低。", "answer": true, "explain": "課文指出他選大眾可理解的通用材料,正是此原因。"}, {"lv": 3, "type": "tf", "q": "本課透過田中達也的故事告訴我們:換個角度看世界,平凡事物也能變得驚奇有趣。", "answer": true, "explain": "這正是本課的主旨與用意。"}, {"lv": 3, "type": "tf", "q": "成語「改邪歸正」適合用來形容田中達也作品的創意巧思。", "answer": false, "explain": "改邪歸正指改正壞行為走回正途;形容創意巧思應用「匠心獨具」。"}, {"lv": 3, "type": "tf", "q": "田中達也作品中的微型人偶,只是冰冷的模型,沒有任何互動感。", "answer": false, "explain": "課文賞析強調他塑造出與人有互動性、有溫度的景象,而非冰冷的模型。"}, {"lv": 3, "type": "tf", "q": "田中達也使用放大鏡,只是因為怕自己看不清楚小人偶,和觀眾的感受無關。", "answer": false, "explain": "課文指出放大鏡是為了把規模放大到與觀眾相同的視野,讓人彷彿身歷其境,並非只為自己看清楚。"}, {"lv": 3, "type": "tf", "q": "作品〈回家〉與〈野餐〉的靈感,都來自田中達也對未來世界的想像。", "answer": false, "explain": "課文指出它們都是來自對於童年歲月的「記憶」,而非對未來的想像。"}, {"lv": 3, "type": "tf", "q": "採用「作品說明＋觀看者的感受」的寫法,能讓作品介紹更具體、讓人更有深刻體會。", "answer": true, "explain": "課文歸納正是此寫法的好處。"}, {"lv": 3, "type": "tf", "q": "把一片葉子想像成一艘在河流裡航行的船,屬於「改變規模法」的想像練習。", "answer": true, "explain": "改變規模法即改變事物大小規模,把葉子看成船正是這種想像。"}, {"lv": 3, "type": "choice", "q": "綜合全課,下列哪一項最能說明田中達也作品「令人感動又貼合生活」的原因?", "options": ["他用了很多昂貴的材料", "他用不同角度看待日常生活,加上親手製作的微型人偶,塑造出與人有互動的景象", "他的作品尺寸都很大", "他拍了很多張照片"], "answer": 1, "explain": "課文賞析指出他用不同角度看待生活,加上親手製作的微型人偶,塑造出與人互動的景象,所以令人感動又貼合生活。"}, {"lv": 3, "type": "choice", "q": "如果同學想學田中達也練習想像,下列哪一種做法最符合本課精神?", "options": ["把不喜歡的東西丟掉", "把作業寫得更工整", "多背一些成語", "挑一樣日常小物,試著改變它的規模或用途,從不同角度重新看待它"], "answer": 3, "explain": "本課鼓勵改變規模、用不同角度看待日常事物;選項B最符合此精神。"}, {"lv": 3, "type": "tf", "q": "從本課可知,創作的靈感不一定要花大錢,從習以為常的日常生活中也能找到。", "answer": true, "explain": "田中達也在人們習以為常的生活中找尋靈感,並用日常小物創作,印證此道理。"}]}, {"id": "L12", "name": "第十二課　九蛙傳奇", "cards": [{"tier": "基礎", "text": "作者：<span class='hl'>陳郁如</span>（有「臺版 J.K. 羅琳」之稱）。<br>文體：記敘文（故事）。"}, {"tier": "基礎", "text": "故事地點：<span class='hl'>日月潭</span><br>（南投縣魚池鄉，臺灣第一大半天然湖泊）。"}, {"tier": "進階", "text": "主旨：透過想像「<span class='hl'>賦予事物生命力</span>」<br>（把九蛙當人寫，叫「轉化法」）。"}, {"tier": "進階", "text": "故事結構（故事梯）：<br><span class='hl'>背景 → 問題 → 轉折 → 解決 → 結果</span>。"}, {"tier": "進階", "text": "情節：蛙巫為保護蛙族獲得法力 →<br>千年衰老、法力漸失。"}, {"tier": "深入", "text": "白鹿說：爬上「<span class='hl'>九蛙疊像</span>」頂端、<br>讓清晨第一道日光照身，就能永遠守護蛙族。"}, {"tier": "深入", "text": "蛙族幫忙推蛙巫爬上頂端，靈魂進入雕像，<br>永遠守護蛙族。（九蛙疊像是日月潭<span class='hl'>水位指標</span>）"}, {"tier": "深入", "text": "生字成語：無妄之災、首鼠兩端、<br>神魂顛倒、一帆風順、息事寧人。"}], "questions": [{"lv": 1, "type": "choice", "q": "〈九蛙傳奇〉這一課的作者是誰？", "options": ["白鹿", "羅琳", "陳郁如", "蛙巫"], "answer": 2, "explain": "課文作者介紹中指出本課作者是陳郁如。"}, {"lv": 1, "type": "tf", "q": "〈九蛙傳奇〉的作者陳郁如目前定居在美國。", "answer": true, "explain": "作者介紹提到陳郁如目前定居美國。"}, {"lv": 1, "type": "choice", "q": "作者陳郁如因為擅長寫奇幻小說，被稱為什麼？", "options": ["臺版安徒生", "臺版J‧K‧羅琳", "臺版格林", "臺版伊索"], "answer": 1, "explain": "課文提到陳郁如有「臺版J‧K‧羅琳」的美稱。"}, {"lv": 1, "type": "tf", "q": "〈九蛙傳奇〉的文體是說明文。", "answer": false, "explain": "本課文本表述標示為記敘文本（故事），不是說明文。"}, {"lv": 1, "type": "choice", "q": "下列哪一部是作者陳郁如的作品系列？", "options": ["「西遊記」系列", "「三國」系列", "「水滸」系列", "「修煉」系列"], "answer": 3, "explain": "課文指出陳郁如著有「修煉」系列、「仙靈傳奇」系列等作品。"}, {"lv": 1, "type": "tf", "q": "陳郁如著有「仙靈傳奇」系列作品。", "answer": true, "explain": "作者介紹中列出陳郁如著有「仙靈傳奇」系列。"}, {"lv": 1, "type": "choice", "q": "〈九蛙傳奇〉這個故事發生的地點是哪裡？", "options": ["澄清湖", "日月潭", "西湖", "洞庭湖"], "answer": 1, "explain": "課文說明蛙巫跟蛙族住在日月潭裡。"}, {"lv": 1, "type": "tf", "q": "日月潭位於南投縣魚池鄉。", "answer": true, "explain": "課文補充資料指出日月潭位於南投縣魚池鄉。"}, {"lv": 1, "type": "choice", "q": "課文中提到日月潭是臺灣的第幾大湖泊？", "options": ["第三大", "第二大", "第一大", "第五大"], "answer": 2, "explain": "課文說明日月潭是臺灣第一大的半天然湖泊。"}, {"lv": 1, "type": "tf", "q": "日月潭分為日潭和月潭兩部分。", "answer": true, "explain": "課文指出日月潭分為日潭和月潭。"}, {"lv": 1, "type": "choice", "q": "日月潭是屬於哪一種類型的湖泊？", "options": ["完全人工水庫", "海邊潟湖", "半天然湖泊", "高山火口湖"], "answer": 2, "explain": "課文說明日月潭是臺灣第一大的半天然湖泊。"}, {"lv": 1, "type": " "蛙巫離開日月潭", "蛙族搬到別的湖", "蛙巫永遠守護著蛙族，蛙族不再受天災傷害", "白鹿成為新的守護者"], "answer": 2, "explain": "課文結果段指出蛙巫永遠守護著蛙族，讓蛙族不再受到天災的傷害。"}, {"lv": 1, "type": "tf", "q": "本課的主旨是透過想像賦予事物生命力，增添故事的豐富性。", "answer": true, "explain": "課文主旨即為此。"}, {"lv": 1, "type": "choice", "q": "本課練習的主要寫作（創思）技法是什麼？", "options": ["譬喻法", "誇飾法", "排比法", "轉化法"], "answer": 3, "explain": "本課教點指出運用「轉化法」練習想像。"}, {"lv": 1, "type": "tf", "q": "本課運用「轉化法」，把九蛙當作人來寫、賦予生命。", "answer": true, "explain": "本課以轉化法賦予九蛙生命，營造故事。"}, {"lv": 1, "type": "choice", "q": "課文用哪一個「故事梯」結構來幫助理出大意？", "options": ["起、承、轉、合", "背景、問題、轉折、解決、結果", "開頭、經過、結尾", "人、事、時、地、物"], "answer": 1, "explain": "課文教點指出故事梯為背景、問題、轉折、解決、結果。"}, {"lv": 1, "type": "tf", "q": "「故事梯」的五個要素是背景、問題、轉折、解決、結果。", "answer": true, "explain": "課文明列此五個故事結構要素。"}, {"lv": 1, "type": "choice", "q": "本課屬於第幾課？", "options": ["第十課", "第十一課", "第十二課", "第十三課"], "answer": 2, "explain": "課文標示本課為第十二課〈九蛙傳奇〉。"}, {"lv": 1, "type": "tf", "q": "〈九蛙傳奇〉屬於第肆單元「想像起飛」。", "answer": true, "explain": "本課編排在第肆單元「想像起飛」。"}, {"lv": 1, "type": "choice", "q": "成語「無妄之災」是用來比喻什麼？", "options": ["必然的成功", "意外的災禍", "美好的回憶", "平凡的生活"], "answer": 1, "explain": "課文生字延伸成語指出「無妄之災」比喻意外的災禍。"}, {"lv": 1, "type": "tf", "q": "成語「一帆風順」比喻非常順利、毫無阻礙。", "answer": true, "explain": "課文生字延伸成語說明「一帆風順」比喻非常順利、毫無阻礙。"}, {"lv": 1, "type": "choice", "q": "成語「神魂顛倒」是用來比喻什麼？", "options": ["身體強壯，精神飽滿", "頭腦清醒，思緒分明", "精神恍惚，心意迷亂", "心情愉快，神采奕奕"], "answer": 2, "explain": "課文生字延伸成語指出「神魂顛倒」比喻精神恍惚，心意迷亂。"}, {"lv": 1, "type": "tf", "q": "成語「息事寧人」是指惹是生非、製造紛爭。", "answer": false, "explain": "「息事寧人」是指平息紛爭以使彼此相安，與惹是生非相反。"}, {"lv": 1, "type": "choice", "q": "蛙巫的靈魂最後進入了什麼之中？", "options": ["白鹿身體", "日月潭水", "清晨陽光", "九蛙疊像"], "answer": 3, "explain": "課文說蛙巫的靈魂進入九蛙疊像中。"}, {"lv": 2, "type": "choice", "q": "依故事梯的順序，「蛙族需要被保護，蛙巫獲得法力」屬於哪一個結構？", "options": ["背景", "問題", "轉折", "結果"], "answer": 0, "explain": "此情節介紹故事背景，說明蛙巫獲得法力的原因。"}, {"lv": 2, "type": "choice", "q": "「蛙巫越來越衰老、法力漸失，使蛙族受天災傷害」屬於故事梯的哪一段？", "options": ["背景", "問題", "轉折", "解決"], "answer": 1, "explain": "蛙巫衰老法力不足以保護蛙族，是故事的問題。"}, /* 關卡定義：stage 0未開始 1讀完重點 2基礎 3中等 4進階 5精熟 */
const STAGES = [
  {key:"read",   stage:1, ic:"📖", name:"讀重點小卡", desc:"一張一句，由淺到深慢慢讀", need:0},
  {key:"bronze", stage:2, ic:"🥉", name:"基礎關",     desc:"最核心的概念，答對 8/10 過關", need:1, pool:[1],     pass:0.8},
  {key:"silver", stage:3, ic:"🥈", name:"中等關",     desc:"加入更多細節，答對 8/10 過關", need:2, pool:[1,2],   pass:0.8},
  {key:"gold",   stage:4, ic:"🥇", name:"進階關",     desc:"應用與情境題，答對 8/10 過關", need:3, pool:[2,3],   pass:0.8},
  {key:"master", stage:5, ic:"🏆", name:"精熟關",     desc:"綜合全部，要全部答對才精熟！", need:4, pool:[1,2,3], pass:1.0},
];
const STAGE_LABEL = ["未開始","📖 讀完重點","🥉 基礎","🥈 中等","🥇 進階","🏆 精熟"];
const ROUND = 10;
const STORE_KEY = "gy4_guided_v1";

function load(){ try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};} }
function save(o){ try{localStorage.setItem(STORE_KEY, JSON.stringify(o));}catch(e){} }
function getStage(id){ return load()[id]||0; }
function setStage(id, s){ const o=load(); o[id]=Math.max(o[id]||0, s); save(o); }
function badgeClass(s){ return s>0?("badge s"+s):"badge"; }

const allLessons = DATA.flatMap(u=>u.lessons);
const totalQ = allLessons.reduce((n,l)=>n+l.questions.length,0);

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

/* ---- HOME ---- */
function renderHome(){
  const list=document.getElementById("unitList"); list.innerHTML="";
  DATA.forEach(u=>{
    const wrap=document.createElement("div"); wrap.className="unit"+(u.cls==="u4"?" u4":"");
    wrap.innerHTML=`<h2>${u.title}</h2>`;
    u.lessons.forEach(ls=>{
      const s=getStage(ls.id);
      const stars=["🥉","🥈","🥇","🏆"].map((m,k)=> s>=k+2 ? m : "⚪").join("　");
      const card=document.createElement("div"); card.className="card";
      card.innerHTML=`<div class="lesson-head"><span class="name">${ls.name}</span><span class="${badgeClass(s)}">${STAGE_LABEL[s]}</span></div>
        <div class="ministars">${stars}</div>
        <div class="btnrow"><button class="${u.cls==='u4'?'btn-u4':'btn-u3'}" data-id="${ls.id}">進入闖關 →</button></div>`;
      wrap.appendChild(card);
    });
    list.appendChild(wrap);
  });
  const mastered=allLessons.filter(l=>getStage(l.id)>=5).length;
  const pct=Math.round(mastered/allLessons.length*100);
  document.getElementById("ovPct").textContent=pct;
  document.getElementById("ovBar").style.width=pct+"%";
  document.getElementById("ovText").textContent = mastered===allLessons.length?"🎊 全部精熟，太厲害了！":`已精熟 ${mastered} / ${allLessons.length} 課，加油！`;
  document.getElementById("ovQ").textContent=totalQ;
  list.querySelectorAll("button[data-id]").forEach(b=> b.addEventListener("click",()=>openLesson(b.getAttribute("data-id"))));
}
function show(sec){ ["home","lesson","cards","quiz","result"].forEach(s=>document.getElementById(s).classList.toggle("hidden", s!==sec)); window.scrollTo({top:0,behavior:"smooth"}); }
function goHome(){ renderHome(); show("home"); }

/* ---- LESSON MAP ---- */
let curId=null;
function findLesson(id){ return allLessons.find(l=>l.id===id); }
function openLesson(id){
  curId=id; const ls=findLesson(id); const s=getStage(id);
  document.getElementById("lsName").textContent=ls.name;
  const b=document.getElementById("lsBadge"); b.className=badgeClass(s); b.textContent=STAGE_LABEL[s];
  const box=document.getElementById("stageList"); box.innerHTML="";
  STAGES.forEach(st=>{
    const unlocked = s>=st.need;
    const done = s>=st.stage;
    const row=document.createElement("div");
    row.className="stage"+(done?" done":"")+(!unlocked?" locked":"");
    let actHtml;
    if(!unlocked){ actHtml=`<span class="status lk">🔒 未解鎖</span>`; }
    else { actHtml=`<button class="${done?'btn-soft':'btn-main'}" data-key="${st.key}">${st.key==='read'?(done?'再讀一次':'開始讀'):(done?'再挑戰':'開始')}</button>`; }
    row.innerHTML=`<div class="ic">${done?'✅':st.ic}</div>
      <div class="info"><div class="t">${st.ic} ${st.name}</div><div class="d">${st.desc}</div></div>
      <div class="act">${actHtml}</div>`;
    box.appendChild(row);
  });
  box.querySelectorAll("button[data-key]").forEach(btn=> btn.addEventListener("click",()=>{
    const key=btn.getAttribute("data-key");
    if(key==="read") startCards(); else startQuiz(key);
  }));
  show("lesson");
}
function backToLesson(){ openLesson(curId); }

/* ---- CARDS (guided reading) ---- */
let cd={idx:0, cards:[]};
function startCards(){ cd={idx:0, cards:findLesson(curId).cards}; show("cards"); renderCard(); }
function renderCard(){
  const c=cd.cards[cd.idx];
  document.getElementById("cdTier").textContent="🌱🌿🌳"[["基礎","進階","深入"].indexOf(c.tier)]+" "+c.tier;
  document.getElementById("cdTier").className="tierchip tier-"+c.tier;
  document.getElementById("cdText").innerHTML=c.text;
  document.getElementById("cdIdx").textContent=`第 ${cd.idx+1} / ${cd.cards.length} 張`;
  const dots=document.getElementById("cdDots"); dots.innerHTML="";
  cd.cards.forEach((_,i)=>{ const d=document.createElement("span"); d.className="dot"+(i===cd.idx?" on":(i<cd.idx?" seen":"")); dots.appendChild(d); });
  document.getElementById("cdPrev").disabled = cd.idx===0;
  document.getElementById("cdNext").textContent = cd.idx===cd.cards.length-1 ? "讀完了！✅" : "下一張 →";
}
document.getElementById("cdPrev").addEventListener("click",()=>{ if(cd.idx>0){cd.idx--; renderCard();} });
document.getElementById("cdNext").addEventListener("click",()=>{
  if(cd.idx<cd.cards.length-1){ cd.idx++; renderCard(); }
  else { setStage(curId,1); backToLesson(); }
});

/* ---- QUIZ ---- */
let q={key:null, items:[], idx:0, correct:0, answered:false, cfg:null};
function startQuiz(key){
  const cfg=STAGES.find(s=>s.key===key); const ls=findLesson(curId);
  let pool=ls.questions.filter(it=>cfg.pool.includes(it.lv));
  pool=shuffle(pool).slice(0, Math.min(ROUND, pool.length)).map(it=>{
    if(it.type==="choice"){ // 打散選項，重算正解
      const idxs=shuffle(it.options.map((_,i)=>i));
      const opts=idxs.map(i=>it.options[i]);
      const ans=idxs.indexOf(it.answer);
      return {...it, options:opts, answer:ans};
    }
    return it;
  });
  q={key, items:pool, idx:0, correct:0, answered:false, cfg};
  show("quiz"); renderQ();
}
function renderQ(){
  q.answered=false; const it=q.items[q.idx];
  document.getElementById("qLvl").textContent=`${q.cfg.ic} ${q.cfg.name}`;
  document.getElementById("qScore").textContent=`✔ ${q.correct} / ${q.items.length}`;
  document.getElementById("qBar").style.width=Math.round(q.idx/q.items.length*100)+"%";
  document.getElementById("qText").innerHTML=`<span class="qtype">${it.type==="tf"?"是非題":"選擇題"}</span>${it.q}`;
  const opts=document.getElementById("qOpts"); opts.innerHTML="";
  const choices=it.type==="tf"?["⭕ 對","❌ 錯"]:it.options;
  choices.forEach((c,i)=>{ const b=document.createElement("button"); b.className="opt"; b.innerHTML=c; b.addEventListener("click",()=>answer(i,b)); opts.appendChild(b); });
  const fb=document.getElementById("qFb"); fb.className="feedback"; fb.innerHTML="";
  document.getElementById("qNext").classList.add("hidden");
}
function answer(i,btn){
  if(q.answered)return; q.answered=true; const it=q.items[q.idx];
  const correctIdx=it.type==="tf"?(it.answer?0:1):it.answer; const right=(i===correctIdx);
  if(right)q.correct++;
  const opts=document.getElementById("qOpts").children;
  for(let k=0;k<opts.length;k++)opts[k].setAttribute("disabled","true");
  opts[correctIdx].classList.add("correct"); if(!right)btn.classList.add("wrong");
  const fb=document.getElementById("qFb"); fb.className="feedback show "+(right?"good":"bad");
  fb.innerHTML=`<span class="lab">${right?"✅ 答對了！":"❌ 答錯了"}</span>${it.explain}`;
  document.getElementById("qScore").textContent=`✔ ${q.correct} / ${q.items.length}`;
  const nx=document.getElementById("qNext"); nx.classList.remove("hidden");
  nx.textContent=(q.idx===q.items.length-1)?"看結果 🎯":"下一題 →";
}
document.getElementById("qNext").addEventListener("click",()=>{ if(q.idx<q.items.length-1){q.idx++; renderQ();} else finishQuiz(); });

function finishQuiz(){
  const total=q.items.length, acc=q.correct/total, passed=acc>=q.cfg.pass;
  document.getElementById("qBar").style.width="100%";
  document.getElementById("rScore").textContent=`答對 ${q.correct} / ${total} 題（${Math.round(acc*100)}%）`;
  document.getElementById("rEmoji").textContent = passed?(q.cfg.key==="master"?"🏆":"🎉"):"💪";
  const v=document.getElementById("rVerdict");
  const nextBtn=document.getElementById("rNext");
  if(passed){
    const before=getStage(curId); setStage(curId, q.cfg.stage);
    v.className="verdict pass";
    if(q.cfg.key==="master") v.innerHTML="🏆 恭喜！這一課 <b>精熟</b> 達成！";
    else v.innerHTML=`✅ 過關！解鎖下一關 <b>${STAGES.find(s=>s.need===q.cfg.stage)?.name||""}</b>`;
    const nextStage=STAGES.find(s=>s.need===q.cfg.stage);
    if(nextStage){ nextBtn.classList.remove("hidden"); nextBtn.textContent="前往 "+nextStage.name+" →"; nextBtn.onclick=()=> nextStage.key==="read"?startCards():startQuiz(nextStage.key); }
    else { nextBtn.classList.add("hidden"); }
  } else {
    v.className="verdict fail";
    const need=Math.ceil(q.cfg.pass*total);
    v.innerHTML=`再加油！這一關要答對 <b>${need}/${total}</b> 才能過。再挑戰一次，題目會換新的！`;
    nextBtn.classList.add("hidden");
  }
  document.getElementById("rRetry").onclick=()=>startQuiz(q.key);
  show("result");
}

function resetAll(){ if(confirm("確定清除所有課程的闖關進度嗎？")){ localStorage.removeItem(STORE_KEY); goHome(); } }
goHome();
</script>
