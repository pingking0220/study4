<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四下自然 期末複習｜引導闖關版（南一）</title>
<style>
  :root{
    --bg:#f1f7fb; --card:#ffffff; --ink:#16263a; --muted:#5b7186;
    --u3:#1d74c4; --u4:#8a6230; --line:#dde7ef; --shadow:0 6px 20px rgba(16,38,58,.08);
    --ok:#16a34a; --no:#dc2626; --accent:#1d74c4; --lock:#b8c4d0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.7; -webkit-text-size-adjust:100%;}
  .wrap{max-width:840px; margin:0 auto; padding:18px 16px 70px;}
  header.top{text-align:center; padding:18px 10px 4px;}
  header.top h1{font-size:1.5rem; margin:0 0 4px;}
  header.top p{margin:0; color:var(--muted); font-size:.92rem;}
  .hidden{display:none !important;}
  .overview{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:14px 16px; margin:16px 0; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .overview .bar{flex:1; min-width:150px; height:14px; background:#e8eff5; border-radius:99px; overflow:hidden;}
  .overview .bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,#38bdf8,#1d74c4); transition:width .5s;}
  .overview .pct{font-weight:800; font-size:1.1rem;}
  .overview small{color:var(--muted)}
  .unit{margin:20px 0 6px;}
  .unit h2{display:flex; align-items:center; gap:10px; font-size:1.15rem; margin:0 0 10px; padding-left:12px; border-left:6px solid var(--u3);}
  .unit.u4 h2{border-left-color:var(--u4);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:16px; margin:12px 0;}
  .lesson-head{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .lesson-head .name{font-size:1.08rem; font-weight:800;}
  .badge{font-size:.9rem; padding:4px 10px; border-radius:99px; background:#eef2f7; color:var(--muted); white-space:nowrap;}
  .badge.s1{background:#eaf1f8;color:#3b6aa0}
  .badge.s2{background:#fdf0e1;color:#a85a17}
  .badge.s3{background:#eef1f4;color:#566270}
  .badge.s4{background:#fff6d6;color:#9a7a00}
  .badge.s5{background:#e7f9ee;color:#15803d;font-weight:800}
  .ministars{margin-top:8px; font-size:.95rem; letter-spacing:2px;}
  .btnrow{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap;}
  button{font-family:inherit; cursor:pointer; border:0; border-radius:12px; padding:11px 16px; font-size:1rem; font-weight:700; transition:transform .05s, filter .15s;}
  button:active{transform:translateY(1px)}
  button:disabled{cursor:not-allowed; opacity:.55;}
  .btn-main{background:var(--accent); color:#fff;}
  .btn-soft{background:#eef2f7; color:var(--ink);}
  .btn-u3{background:var(--u3); color:#fff;}
  .btn-u4{background:var(--u4); color:#fff;}
  .btn-ghost{background:transparent; color:var(--accent); padding:8px 4px;}
  button:hover:not(:disabled){filter:brightness(.97)}
  .toplink{display:inline-block; margin:8px 0; color:var(--accent); font-weight:700; cursor:pointer;}

  /* stage map */
  .stage{display:flex; align-items:center; gap:14px; padding:14px 16px; margin:10px 0; border-radius:14px; background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow);}
  .stage .ic{font-size:1.7rem; width:40px; text-align:center; flex:none;}
  .stage .info{flex:1;}
  .stage .info .t{font-weight:800; font-size:1.05rem;}
  .stage .info .d{color:var(--muted); font-size:.85rem;}
  .stage.locked{opacity:.6; background:#f4f7fa;}
  .stage.done{border-color:#bfe6cd; background:#f1fbf5;}
  .stage .act{flex:none;}
  .stage .status{font-size:.85rem; font-weight:700; padding:4px 10px; border-radius:99px;}
  .status.ok{background:#e7f9ee;color:#15803d}
  .status.lk{background:#eef2f7;color:#94a3b8}

  /* cards (guided reading) */
  .tierchip{display:inline-block; font-size:.85rem; font-weight:800; padding:3px 12px; border-radius:99px; margin-bottom:14px;}
  .tier-基礎{background:#e3f5ec; color:#1c7a4f;}
  .tier-進階{background:#e1eefb; color:#1d5fa8;}
  .tier-深入{background:#f4e9da; color:#8a5a1d;}
  .learncard{min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:26px 18px;}
  .learncard .big{font-size:1.4rem; font-weight:800; line-height:1.8;}
  .learncard .big .hl{background:#fff3cd; padding:0 4px; border-radius:5px;}
  .dots{display:flex; gap:6px; justify-content:center; margin:14px 0 4px; flex-wrap:wrap;}
  .dot{width:9px; height:9px; border-radius:50%; background:#d6e2ee;}
  .dot.on{background:var(--accent);}
  .dot.seen{background:#9cc3e8;}

  /* quiz */
  .quizbar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; color:var(--muted); font-size:.92rem;}
  .qprog{flex:1; height:8px; background:#eef2f7; border-radius:99px; overflow:hidden;}
  .qprog > i{display:block; height:100%; background:var(--accent); width:0; transition:width .3s;}
  .qtext{font-size:1.15rem; font-weight:800; margin:10px 0 14px;}
  .qtype{font-size:.78rem; font-weight:700; padding:2px 8px; border-radius:6px; background:#eef2f7; color:var(--muted); margin-right:8px;}
  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:block; width:100%; text-align:left; background:#f7fafc; border:2px solid var(--line); color:var(--ink); font-weight:600; padding:13px 14px; border-radius:12px;}
  .opt:hover{border-color:#bcdcf5}
  .opt.correct{border-color:var(--ok); background:#e7f9ee;}
  .opt.wrong{border-color:var(--no); background:#fde8e8;}
  .opt[disabled]{cursor:default;}
  .feedback{margin-top:14px; padding:12px 14px; border-radius:12px; font-weight:600; display:none;}
  .feedback.show{display:block;}
  .feedback.good{background:#e7f9ee; color:#14532d;}
  .feedback.bad{background:#fde8e8; color:#7f1d1d;}
  .feedback .lab{font-weight:800; display:block; margin-bottom:2px;}

  /* result */
  .result{text-align:center; padding:10px 6px;}
  .result .big{font-size:3rem; margin:6px 0;}
  .result .score{font-size:1.3rem; font-weight:800;}
  .verdict{font-size:1.1rem; font-weight:800; margin:10px 0; padding:12px; border-radius:12px;}
  .verdict.pass{background:#e7f9ee; color:#15803d;}
  .verdict.fail{background:#fdf0e1; color:#a85a17;}
  footer{ text-align:center; color:var(--muted); font-size:.8rem; margin-top:30px;}
  @media(max-width:520px){ header.top h1{font-size:1.22rem} .qtext{font-size:1.05rem} .learncard .big{font-size:1.2rem} }
</style>
</head>
<body>
<div class="wrap">

  <!-- HOME -->
  <section id="home">
    <header class="top">
      <h1>🔬 四下自然 期末複習</h1>

        <button class="btn-main" id="cdNext">下一張 →</button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <span class="toplink" onclick="backToLesson()">← 結束，回地圖</span>

      <div class="quizbar"><span id="qLvl"></span><div class="qprog"><i id="qBar"></i></div><span id="qScore"></span></div>
      <div class="qtext" id="qText"></div>
      <div class="opts" id="qOpts"></div>
      <div class="feedback" id="qFb"></div>
      <div class="btnrow" style="justify-content:flex-end;"><button class="btn-main hidden" id="qNext">下一題 →</button></div>
    </div>
  </section>

  <!-- RESULT -->
  <section id="result" class="hidden">
    <div class="card result">
      <div class="big" id="rEmoji">🎉</div>
      <div class="score" id="rScore"></div>
      <div class="verdict" id="rVerdict"></div>
      <div class="btnrow" style="justify-content:center;">
        <button class="btn-main" id="rRetry">再挑戰一次</button>
        <button class="btn-soft" id="rNext"></button>
        <button class="btn-soft" onclick="backToLesson()">回地圖</button>
      </div>
    </div>
  </section>
</div>

<script>
const DATA = [{"id": "u3", "title": "第三單元　水的移動", "cls": "u3", "lessons": [{"id": "3A", "name": "3-1　毛細現象", "cards": [{"tier": "基礎", "text": "水通常會<span class='hl'>由高處往低處流</span>。<br>例如：雨水、瀑布、溪水。"}, {"tier": "基礎", "text": "但是水也會<span class='hl'>沿著物體的縫隙</span>移動，<br>這叫做「<span class='hl'>毛細現象</span>」。"}, {"tier": "基礎", "text": "毛細現象的水會往<span class='hl'>四面八方</span>移動，<br>不是只往下喔！"}, {"tier": "基礎", "text": "<span class='hl'>有縫隙</span>的東西會吸水：<br>衛生紙、餐巾紙、毛巾、海綿、報紙。"}, {"tier": "基礎", "text": "<span class='hl'>沒有縫隙</span>的東西幾乎不吸水：<br>塑膠袋、塑膠尺、玻璃片、鋁箔紙。"}, {"tier": "進階", "text": "重要規則：縫隙<span class='hl'>愈小</span>，<br>水移動的距離就<span class='hl'>愈長</span>（愈明顯）。"}, {"tier": "進階", "text": "想看清楚物體的小縫隙，<br>可以用<span class='hl'>放大鏡</span>來觀察。"}, {"tier": "進階", "text": "做實驗時用<span class='hl'>染色的水</span>，<br>是為了方便看清楚水怎麼移動。"}, {"tier": "進階", "text": "公平實驗：比較不同材質吸水，<br>要裁成<span class='hl'>一樣大小</span>，只讓「材質」不同。"}, {"tier": "深入", "text": "生活應用：蠟燭的<span class='hl'>燭芯</span>吸蠟油，<br>幫助火焰燃燒。"}, {"tier": "深入", "text": "生活應用：毛筆吸墨、毛巾吸汗、<br>海綿吸水、精油擴香棒。"}, {"tier": "深入", "text": "好厲害！植物的根、莖、葉裡有<span class='hl'>導管</span>，<br>靠毛細現象把水送到全身。"}], "questions": [{"lv": 1, "type": "tf", "q": "水通常會由高處往低處流。", "answer": true, "explain": "課本提到，一般情況下水會由高處往低處流，例如雨水、瀑布和溪流。"}, {"lv": 1, "type": "tf", "q": "水會沿著物體的縫隙往四面八方移動，這種現象叫做毛細現象。", "answer": true, "explain": "水沿著物體縫隙往四面八方移動的現象，就稱為毛細現象。"}, {"lv": 1, "type": "tf", "q": "毛細現象只會讓水往下流，不會往上移動。", "answer": false, "explain": "毛細現象的水會沿著縫隙往四面八方移動，包括往上，不是只往下。"}, {"lv": 1, "type": "tf", "q": "餐巾紙是有縫隙、會吸水的物體。", "answer": true, "explain": "餐巾紙、衛生紙、報紙、毛巾等都是有縫隙、會吸水的物體。"}, {"lv": 1, "type": "tf", "q": "塑膠袋有很多縫隙，所以很會吸水。", "answer": false, "explain": "塑膠袋沒有縫隙，幾乎不吸水。"}, {"lv": 1, "type": "tf", "q": "衛生紙會吸水，是因為它有細小的縫隙。", "answer": true, "explain": "衛生紙有細小縫隙，水會沿著縫隙移動，所以會吸水。"}, {"lv": 1, "type": "tf", "q": "玻璃片表面光滑、沒有縫隙，幾乎不會吸水。", "answer": true, "explain": "玻璃片屬於沒有縫隙的物體，幾乎不吸水。"}, {"lv": 1, "type": "tf", "q": "毛巾可以吸水，是因為毛巾有縫隙。", "answer": true, "explain": "毛巾有縫隙，水會沿著縫隙移動，所以毛巾能吸水。"}, {"lv": 1 : 0, "explain": "球滾下斜坡是重力造成；其餘三項都是毛細現象，原理相同。"}, {"lv": 3, "type": "choice", "q": "做毛細現象實驗時，老師強調餐巾紙和塑膠袋要「裁成一樣大」。如果沒這麼做，會有什麼問題？", "options": ["多了大小這個變因，無法確定差異是不是材質造成的", "水會變得比較髒", "實驗時間會變長", "顏色會變淡"], "answer": 0, "explain": "大小不同會多一個變因，就無法判斷結果是不是只因材質不同，實驗不公平。"}, {"lv": 3, "type": "choice", "q": "小華想知道「為什麼抹布能改變水移動的方向，把水往上吸」，最合理的解釋是？", "options": ["抹布有縫隙，水沿著縫隙產生毛細現象往上移動", "抹布會自己加熱水", "抹布比水重所以把水拉上來", "水本來就喜歡往上流"], "answer": 0, "explain": "抹布有縫隙，水沿著縫隙往上移動，這是毛細現象，所以能改變水的方向。"}, {"lv": 3, "type": "tf", "q": "用吸管喝果汁時飲料往上跑，這和毛細現象的原理完全相同。", "answer": false, "explain": "用吸管喝飲料是靠嘴巴吸出壓力差，不是毛細現象。"}, {"lv": 3, "type": "tf", "q": "若想做出吸水力強的腳踏墊，選擇有許多細小縫隙的材質會比光滑沒縫隙的材質好。", "answer": true, "explain": "細小縫隙多的材質毛細現象明顯，吸水力較強，例如矽藻土腳踏墊。"}, {"lv": 3, "type": "tf", "q": "在材質相同的情況下，水在縫隙較小的通道裡，會比在縫隙較大的通道裡爬得更高。", "answer": true, "explain": "縫隙愈小，水移動的距離愈長，所以爬得更高。"}, {"lv": 3, "type": "tf", "q": "把一張餐巾紙的角浸到染色水中，最後只有浸到水的地方會變色，其他地方都不會變。", "answer": false, "explain": "水會沿著縫隙往四面八方擴散，所以顏色會慢慢擴散到其他地方。"}, {"lv": 3, "type": "tf", "q": "蠟燭的燭芯如果換成完全沒有縫隙的材料，蠟油就比較不容易被吸上去幫助燃燒。", "answer": true, "explain": "沒有縫隙就無法產生毛細現象，蠟油不易上升，會影響燃燒。"}, {"lv": 3, "type": "tf", "q": "植物若把根、莖、葉裡的導管都堵住，仍然能靠毛細現象把水送到葉子。", "answer": false, "explain": "導管被堵住就無法藉毛細現象運送水分，水就送不到葉子。"}, {"lv": 3, "type": "tf", "q": "比較兩種材料吸水能力時，把它們裁成不同大小也沒關係，因為材質才是重點。", "answer": false, "explain": "大小不同會多出一個變因，必須裁成相同大小，公平實驗只能讓材質不同。"}, {"lv": 3, "type": "tf", "q": "毛筆若沾的是清水而不是墨汁，水一樣會沿著毛筆的縫隙上升。", "answer": true, "explain": "毛細現象和液體的顏色無關，清水也會沿著毛筆的縫隙上升。"}, {"lv": 3, "type": "tf", "q": "在乾燥的地面下，土壤裡的水有可能因毛細作用沿著小孔隙往上移動。", "answer": true, "explain": "課本提到，地面很乾時，水會因毛細作用沿著小孔隙往上冒出，稱為毛細水。"}, {"lv": 3, "type": "tf", "q": "想觀察「縫隙大小對水移動的影響」，只要改變縫隙，其他條件（材質、水）都應保持相同。", "answer": true, "explain": "這是公平實驗，要單獨改變縫隙大小，其他變因都保持相同才能看出影響。"}, {"lv": 3, "type": "choice", "q": "用兩片玻璃片做實驗，一側夾迴紋針、一側綁橡皮筋。為什麼沒夾迴紋針的一側水爬得比較高？", "options": ["那一側縫隙比較小", "那一側縫隙比較大", "那一側玻璃比較重", "那一側水比較多"], "answer": 0, "explain": "沒夾迴紋針的一側縫隙較小，水移動距離較長，所以爬得比較高。"}, {"lv": 3, "type": "choice", "q": "下列哪一個生活設計，最主要是「利用」毛細現象來達到效果？", "options": ["用擴香棒讓精油慢慢往上散發香味", "用電風扇把房間吹涼", "用冰箱把水結成冰", "用鏡子反射光線"], "answer": 0, "explain": "精油沿著擴香棒縫隙上升是毛細現象；其餘選項與毛細現象無關。"}, {"lv": 3, "type": "choice", "q": "小英發現抹布掛在水桶邊一段時間後，桶外的抹布也溼了。最合理的解釋是？", "options": ["水沿著抹布的縫隙往上、往外移動（毛細現象）", "水自己跳出水桶", "抹布把水加熱蒸發再凝結", "水桶在漏水"], "answer": 0, "explain": "水沿著抹布縫隙產生毛細現象，往上越過桶緣再往下，使桶外抹布也溼了。"}, {"lv": 3, "type": "choice", "q": "關於「為什麼海綿、毛巾很會吸水，塑膠袋卻幾乎不吸水」，下列解釋何者最完整？", "options": ["海綿、毛巾有許多縫隙能產生毛細現象，塑膠袋沒有縫隙", "海綿、毛巾比較重，塑膠袋比較輕", "海綿、毛巾比較大，塑膠袋比較小", "海綿、毛巾比較貴，塑膠袋比較便宜"], "answer": 0, "explain": "吸水與否取決於有沒有縫隙：有縫隙才會產生毛細現象吸水，塑膠袋沒縫隙故不吸水。"}, {"lv": 3, "type": "choice", "q": "小強想證明「水會沿著縫隙往四面八方移動，而不是只往一個方向」，下列哪個觀察最能支持？", "options": ["在餐巾紙中間滴一滴染色水，顏色向四周圈狀擴散", "把餐巾紙直立，水只往下滴", "把餐巾紙泡進水裡整張變色", "用塑膠袋裝水水不動"], "answer": 0, "explain": "中間滴水後顏色向四周擴散，正好說明水沿縫隙往四面八方移動。"}, {"lv": 3, "type": "choice", "q": "從毛細現象的角度判斷，下列哪一種情況「最不可能」發生？", "options": ["水在沒有縫隙的玻璃片上沿著表面大幅爬升", "水在衛生紙上向四周擴散", "水在毛巾裡往上移動", "水在海綿裡上升"], "answer": 0, "explain": "沒有縫隙的玻璃片不會產生明顯毛細現象，水不會沿表面大幅爬升。"}, {"lv": 3, "type": "choice", "q": "老師問：「同一種紙，要讓水爬得更高，可以怎麼做？」下列回答何者方向正確？", "options": ["設法讓水移動的縫隙變得更細小", "把紙泡在更燙的水裡", "把紙剪成更小塊", "在紙上塗一層塑膠膜"], "answer": 0, "explain": "縫隙愈小水爬得愈高；塗塑膠膜反而擋住縫隙，剪小、加熱都無法讓水爬更高。"}, {"lv": 3, "type": "choice", "q": "下列關於毛細現象的應用，哪一組「全部」都正確？", "options": ["毛筆吸墨、海綿吸水、燭芯吸蠟油", "毛筆吸墨、磁鐵吸鐵、海綿吸水", "燭芯吸蠟油、電燈發光、毛巾吸汗", "海綿吸水、冰箱結冰、油漆刷沾漆"], "answer": 0, "explain": "毛筆吸墨、海綿吸水、燭芯吸蠟油都是毛細現象；磁鐵吸鐵、電燈發光、冰箱結冰都不是。"}, {"lv": 3, "type": "choice", "q": "小芳把兩條相同的紙巾分別捲鬆和捲緊，捲緊的紙巾纖維間縫隙比較小。把兩條一端浸入染色水，最可能的結果是？", "options": ["捲緊（縫隙較小）的紙巾，水爬升得比較高", "捲鬆（縫隙較大）的紙巾，水爬升得比較高", "兩條紙巾水爬升得一樣高", "兩條紙巾水都不會爬升"], "answer": 0, "explain": "縫隙愈小水移動距離愈長，所以捲緊、縫隙較小的紙巾水爬得比較高。"}, {"lv": 3, "type": "choice", "q": "老師說：「毛細現象的水會往四面八方移動。」下列哪個生活觀察最能支持這句話？", "options": ["白襯衫沾到一滴醬油後，汙漬向周圍慢慢暈開變大", "球滾下樓梯時一階一階往下掉", "水龍頭的水直直落入水槽", "冰塊在杯子裡慢慢融化"], "answer": 0, "explain": "醬油汙漬沿著布的縫隙向周圍暈開，正說明水會往四面八方移動。"}, {"lv": 3, "type": "tf", "q": "如果把抹布換成一張同樣大小、沒有縫隙的塑膠片掛在水桶邊，桶外的部分一樣會被水沾溼。", "answer": false, "explain": "塑膠片沒有縫隙，不會產生毛細現象，水不會越過桶緣，桶外不會被沾溼。"}, {"lv": 3, "type": "tf", "q": "在乾的地面上，植物的根能吸到土壤中靠毛細作用往上移動的毛細水。", "answer": true, "explain": "土壤中的毛細水會被植物根部吸收，這也和毛細現象有關。"}]}, {"id": "3B", "name": "3-2　水平與連通管原理", "cards": [{"tier": "基礎", "text": "杯子或水壺裡的水，靜止時水面是平的，<br>這叫做「<span class='hl'>水平</span>」。"}, {"tier": "基礎", "text": "神奇的是：把水壺<span class='hl'>傾斜</span>，<br>水靜止後，水面還是維持水平（一樣高）。"}, {"tier": "基礎", "text": "寶特瓶、澆水器也一樣，<br>平放或斜放，水面都維持水平。"}, {"tier": "進階", "text": "「<span class='hl'>連通管原理</span>」：<br>幾個形狀不同、但<span class='hl'>底部相通</span>的容器……"}, {"tier": "進階", "text": "……裝水靜止後，<br>每個容器的<span class='hl'>水面高度都一樣高</span>！"}, {"tier": "進階", "text": "用一條水管裝水，不管怎麼移動兩端，<br>靜止時兩端水面也<span class='hl'>一樣高</span>。"}, {"tier": "深入", "text": "應用：<span class='hl'>洗手臺</span>的設計，<br>就用到連通管原理。"}, {"tier": "深入", "text": "應用：熱水瓶外面的<span class='hl'>透明窗</span>，<br>可以看出裡面還有多少水……"}, {"tier": "深入", "text": "……因為透明窗和內膽<span class='hl'>底部相通</span>，<br>水面一樣高（連通管原理）。"}, {"tier": "深入", "text": "應用：用一條裝水的水管，<br>可以幫忙測量<span class='hl'>畫掛得正不正（水平）</span>。"}], "questions": [{"lv": 1, "type": "tf", "q": "容器內的水靜止時,水面會維持在相同高度的水平面,這種現象叫做「水平」。", "answer": true, "explain": "課本指出容器中的水靜止時,水面會維持在相同高度的水平面,稱為水平。"}, {"lv": 1, "type": "tf", "q": "把水壺傾斜放著,水靜止後,壺內的水面還是會維持一樣高。", "answer": true, "explain": "水壺平放和傾斜時,水靜止後水面都會維持一樣高。"}, {"lv": 1, "type": "tf", "q": "寶特瓶裝水後傾斜,水靜止時瓶內水面會變成斜斜的,不是水平的。", "answer": false, "explain": "寶特瓶不管平放或傾斜,水靜止時水面都維持在相同高度的水平面。"}, {"lv": 1, "type": "tf", "q": "數個形狀不同、底部相通的容器注入定量的水,水靜止時各容器的水面高度都相同,這叫連通管原理。", "answer": true, "explain": "這正是連通管原理的定義。"}, {"lv": 1, "type": "tf", "q": "連通管原理中,各個容器的底部必須是互相相通的。", "answer": true, "explain": "連通管原理是指底部相通的容器,水面高度才會相同。"}, {"lv": 1, "type": "tf", "q": "用一條水管裝水,改變水管左右兩端的高度,水靜止時兩端的水面高度仍然會相同。", "answer": true, "explain": "課本實驗:不管改變水管哪一端的高度,水靜止時兩端水面高度都會保持相同。"}, {"lv": 1, "type": "tf", "q": "澆水器內的水,不管平放或斜放,都會維持水平。", "answer": true, "explain": "課本提到澆水器內的水,不管平放或斜放也都是維持水平。"}, {"lv": 1, "type": "tf", "q": "洗手臺是生活中應用連通管原理的例子。", "answer": true, "explain": "課本列出洗手臺是連通管原理在日常生活的應用之一。"}, {"lv": 1, "type": "tf", "q": "熱水瓶的透明窗可以讓我們看出瓶內大約還有多少水。", "answer": true, "explain": "透明窗和內膽底部相通,屬連通管原理,所以能看出內部水量。"}, {"lv": 1, "type": "tf", "q": "水壺、寶特瓶內的水彼此是相連通的,所以斜放也能維持水平。", "answer": true, "explain": "課本說明水壺、寶特瓶內的水是相連通的,斜放也能維持水平。"}, {"lv": 1, "type": "tf", "q": "連通管原理需要把水裝在「形狀完全相同」的容器中才會成立。", "answer": false, "explain": "連通管原理是針對「形狀不同」但底部相通的容器,水面高度仍會相同。"}, {"lv": 1, "type": "tf", "q": "水在底部相通的容器裡靜止時,水面高度會相同。", "answer": true, "explain": "這就是連通管原理:底部相通的容器,水靜止時水面高度相同。"}, {"lv": 1, "type": "tf", "q": "裝水的水管靜止時,兩端的水面高度會一邊高一邊低。", "answer": false, "explain": "裝水水管靜止時,兩端的水面高度會相同,不是一高一低。"}, {"lv": 1, "type": "tf", "q": "水平指的是水面維持在「相同高度」的平面。", "answer": true, "explain": "水平就是水面維持在相同高度的水平面。"}, {"lv": 1, "type": "tf", "q": "水壺只有平放時水面才是水平的,傾斜時就不是水平了。", "answer": false, "explain": "水壺平放和傾斜時,水靜止後水面都會維持一樣高(水平)。"}, {"lv": 1, "type": "tf", "q": "形狀不同但底部相通的容器,注入定量的水後靜止時,水面高度都一樣。", "answer": true, "explain": "這就是連通管原理的內容。"}, {"lv": 1, "type": "tf", "q": "熱水瓶的透明窗和內膽在底部是相通的。", "answer": true, "explain": "課本說明透明窗和內膽在底部是連通的,所以透明窗水面能反映內膽水量。"}, {"lv": 1, "type": "tf", "q": "用裝水的水管可以幫忙判斷掛畫是否掛得水平。", "answer": true, "explain": "水管能測量畫是否掛水平,因為水管內兩邊水面會維持相同高度。"}, {"lv": 1, "type": "choice", "q": "容器內的水靜止時,水面維持在相同高度的水平面,這種現象稱為什麼?", "options": ["水平", "毛細現象", "虹吸現象", "蒸發"], "answer": 0, "explain": "容器內的水靜止時水面維持在相同高度的水平面,稱為水平。"}, {"lv": 1, "type": "choice", "q": "數個形狀不同、底部相通的容器,注入定量的水靜止後,各容器的水面高度會怎樣?", "options": ["都不相同", "由高到低排列", "都相同", "無法判斷"], "answer": 2, "explain": "連通管原理:底部相通的容器,水靜止時各容器水面高度都相同。"}, {"lv": 1, "type": "choice", "q": "下列哪一個是連通管原理在生活中的應用?", "options": ["電風扇", "洗手臺", "電燈", "桌子"], "answer": 1, "explain": "課本列出洗手臺是連通管原理的生活應用。"}, {"lv": 1, "type": "choice", "q": "把寶特瓶裝水後傾斜放置,水靜止時瓶內的水面會?", "options": ["維持在相同高度的水平面", "變成斜面", "上升到瓶口", "完全消失"], "answer": 0, "explain": "寶特瓶傾斜時,水靜止後水面仍維持在相同高度的水平面。"}, {"lv": 1, "type": "choice", "q": "用一條水管裝水,改變左右兩端高度,水靜止時兩端水面高度會?", "options": ["左邊比較高", "右邊比較高", "保持相同", "看不出來"], "answer": 2, "explain": "不管改變哪一端高度,水靜止時水管兩端水面高度都會保持相同。"}, {"lv": 1, "type": "choice", "q": "熱水瓶上那個能看出內部水量多少的構造叫做什麼?", "options": ["把手", "瓶蓋", "透明窗", "壺嘴"], "answer": 2, "explain": "熱水瓶的透明窗能看出瓶內水量。"}, {"lv": 1, "type": "choice", "q": "連通管原理成立的重要條件是,這些容器的哪個部位互相相通?", "options": ["瓶口", "底部", "把手", "蓋子"], "answer": 1, "explain": "連通管原理是指「底部相通」的容器,水面高度才會相同。"}, {"lv": 1, "type": "choice", "q": "下列哪一句話正確描述「水平」?", "options": ["水面維持在相同高度的平面", "水會往高處流", "水變成水蒸氣", "水會結冰"], "answer": 0, "explain": "水平就是水面維持在相同高度的水平面。"}, {"lv": 1, "type": "choice", "q": "水壺平放和傾斜時,壺內的水靜止後水面分別是?", "options": ["平放水平、傾斜不水平", "兩種都水平", "兩種都不水平", "平放不水平、傾斜水平"], "answer": 1, "explain": "水壺平放和傾斜時,水靜止後水面都會維持一樣高(都水平)。"}, {"lv": 1, "type": "choice", "q": "澆水器內的水不管平放或斜放,都會?", "options": ["流光", "維持水平", "沸騰", "結冰"], "answer": 1, "explain": "澆水器內的水,不管平放或斜放也都是維持水平。"}, {"lv": 1, "type": "choice", "q": "裝水的水管靜止時,兩端的水面高度會?", "options": ["相同", "一邊高一邊低", "一直上升", "一直下降"], "answer": 0, "explain": "裝水水管靜止時,兩端水面高度會相同。"}, {"lv": 1, "type": "choice", "q": "水裝在不同形狀但底部相通的容器中,水靜止時水面高度會相同,這個現象稱為?", "options": ["毛細現象", "連通管原理", "虹吸現象", "水平面差"], "answer": 1, "explain": "這就是連通管原理的定義。"}, {"lv": 1, "type": "choice", "q": "下列哪一個構造能應用連通管原理,讓我們不打開蓋子也能知道熱水瓶內水量?", "options": ["瓶身的把手", "瓶口的蓋子", "旁邊的透明窗", "底部的腳座"], "answer": 2, "explain": "透明窗和內膽底部相通,屬連通管原理,能看出內部水量。"}, {"lv": 1, "type": "choice", "q": "想知道掛畫有沒有掛水平,可以利用下列哪一種工具?", "options": ["放大鏡", "裝水的水管", "溫度計", "磁鐵"], "answer": 1, "explain": "用裝水的水管可以測量掛畫是否水平。"}, {"lv": 1, "type": "choice", "q": "連通管原理裡的容器,形狀必須?", "options": ["完全相同", "可以不同", "愈大愈好", "都是圓形"], "answer": 1, "explain": "連通管原理針對形狀不同但底部相通的容器,水面高度仍會相同。"}, {"lv": 1, "type": "choice", "q": "關於水平的敘述,下列何者正確?", "options": ["只有平放的容器水面才水平", "容器傾斜時水面就不水平了", "容器平放或傾斜,水靜止時水面都水平", "水平和水量多少有關"], "answer": 2, "explain": "容器平放或傾斜,水靜止時水面都會維持水平。"}, {"lv": 1, "type": "choice", "q": "連通管裡各容器水面高度相同,是因為這些容器水面以下?", "options": ["互相相通", "完全密封", "裝了不同的水", "形狀相同"], "answer": 0, "explain": "課本說明是因為不同容器水面以下有相通,所以水面高度相同。"}, {"lv": 1, "type": "tf", "q": "連通管原理和虹吸現象是同一種現象,意思完全相同。", "answer": false, "explain": "連通管原理與虹吸現象是不同的現象,連通管是底部相通容器 水不再移動", "水會倒流"], "answer": 2, "explain": "當兩個容器的水面高度相等時,虹吸現象會停止,水就不會再移動。"}, {"lv": 1, "type": "choice", "q": "下列哪一個是生活中虹吸現象的應用?", "options": ["虹吸式馬桶", "電風扇", "電燈", "冰箱"], "answer": 0, "explain": "虹吸式馬桶利用虹吸現象把穢物沖走,是虹吸現象在生活中的應用。"}, {"lv": 1, "type": "choice", "q": "虹吸現象中,水是沿著什麼東西移動的?", "options": ["毛巾", "彎曲的水管", "玻璃片", "海綿"], "answer": 1, "explain": "虹吸現象是水沿著彎曲的水管先上升再流向出水口。"}, {"lv": 1, "type": "choice", "q": "自然教室的大水族箱要換水,用哪一種方法既方便又能把底部的水換得很乾淨?", "options": ["用水杯舀", "用毛巾吸", "用水管", "用手潑"], "answer": 2, "explain": "利用水管換水方便,而且可以把水族箱底部的水換得很乾淨。"}, {"lv": 1, "type": "choice", "q": "在虹吸現象中,水會從哪裡流出來?", "options": ["入水口", "出水口", "水管中間", "水面上"], "answer": 1, "explain": "虹吸現象中,當出水口低於水面時,水會從出水口流出。"}, {"lv": 1, "type": "choice", "q": "虹吸式馬桶是利用虹吸現象來做什麼?", "options": ["把穢物沖走", "加熱水", "製造冰塊", "發出聲音"], "answer": 0, "explain": "虹吸式馬桶利用虹吸現象把穢物沖走。"}, {"lv": 1, "type": "choice", "q": "下列哪一項是虹吸現象成功的條件?", "options": ["水管要充滿水", "水管要全空", "出水口要比水面高", "兩邊水面要一樣高"], "answer": 0, "explain": "虹吸現象成功的條件包括水管要充滿水、出水口要低於水族箱的水面。"}, {"lv": 1, "type": "choice", "q": "用水管幫水族箱換水時,水會沿著彎曲的水管先怎麼樣?", "options": ["先下降", "先上升再流向出水口", "直接消失", "原地不動"], "answer": 1, "explain": "虹吸現象中,水會沿著彎曲的水管先上升,再流向出水口。"}, {"lv": 1, "type": "choice", "q": "如果出水口的位置低於水面高度,水管內的水會怎麼樣?", "options": ["從出水口流出", "流回水箱", "停止不動", "結冰"], "answer": 0, "explain": "出水口位置低於水面高度時,水管內的水會從出水口流出。"}, {"lv": 1, "type": "choice", "q": "如果出水口的位置高於水面高度,水管內的水會怎麼樣?", "options": ["從出水口流出", "流回水箱中", "變多", "變熱"], "answer": 1, "explain": "出水口位置高於水面高度時,水管內的水會流回水箱中。"}, {"lv": 1, "type": "choice", "q": "虹吸現象需要水管連接的兩側水面有什麼差別,水才會流動?", "options": ["顏色差別", "高低差別", "溫度差別", "重量差別"], "answer": 1, "explain": "水管連接的兩側水面高度必須有差別,水才會由高水面往低水面流動。"}, {"lv": 1, "type": "choice", "q": "用充滿水的水管連接兩個容器,水會由哪一端流向哪一端?", "options": ["低水面流向高水面", "高水面流向低水面", "中間往兩邊", "不會流動"], "answer": 1, "explain": "虹吸現象中,水會由水面較高的一端流向水面較低的一端。"}, {"lv": 1, "type": "choice", "q": "用水杯一杯一杯舀水幫水族箱換水,有什麼缺點?", "options": ["很快就換好", "會花比較多時間,底部舀不乾淨", "完全沒缺點", "會弄壞水杯"], "answer": 1, "explain": "用水杯慢慢舀水要一杯一杯舀,會花比 swer": true, "explain": "虹吸需要水充滿水管形成連續水柱,卡了大段空氣會中斷水柱導致失敗。"}, {"lv": 3, "type": "tf", "q": "只要把出水口放在比魚缸水面高的地方,就能把魚缸的水換出來。", "answer": false, "explain": "出水口高於水面時水會流回缸裡,換不出來;要出水口低於水面才行。"}, {"lv": 3, "type": "tf", "q": "在虹吸現象中,推動水流動的是水管兩端水面的高低差。", "answer": true, "explain": "水管兩端水面的高低差是推動水由高往低流動的原因。"}, {"lv": 3, "type": "tf", "q": "用毛巾吸魚缸的水雖然也能把水吸出,但效率緩慢又容易弄溼地板,不如用水管。", "answer": true, "explain": "用毛巾吸水可以把水吸出,但效率緩慢且容易讓地板變溼,不如用水管方便。"}, {"lv": 3, "type": "choice", "q": "老師示範:把水管一端放魚缸、另一端出水口先放在高處,水流回缸;再慢慢往下移到低於水面,水開始流出。這證明了什麼?", "options": ["出水口必須低於水面,水才會從出水口流出", "水管越長水流越快", "水溫越高水流越多", "水的顏色決定流向"], "answer": 0, "explain": "出水口由高移到低於水面後水才流出,證明出水口必須低於水面水才會流出。"}, {"lv": 3, "type": "choice", "q": "小宇用充滿水的水管把高處水桶的水引到低處水桶,過程中水會沿水管先怎樣移動?", "options": ["先上升越過最高處,再流向低處出水口", "直接往下噴出", "原地打轉", "先變成水蒸氣"], "answer": 0, "explain": "虹吸時水會沿著彎曲的水管先上升(越過高處),再流向較低的出水口。"}, {"lv": 3, "type": "choice", "q": "綜合判斷:下列哪一組情況「一定」能讓魚缸的水成功被虹吸出來?", "options": ["水管充滿水,且出水口低於魚缸水面", "水管半滿,出水口高於水面", "水管充滿水,兩邊水面一樣高", "水管全空,出水口低於水面"], "answer": 0, "explain": "成功虹吸需同時:水管充滿水、出水口低於水面(有高低差),只有第一組都符合。"}, {"lv": 2, "type": "choice", "q": "下列哪一種容器換水方式,最符合「方便又能把底部換乾淨」?", "options": ["用手潑水", "用水杯一杯杯舀", "用毛巾慢慢吸", "用充滿水的水管虹吸"], "answer": 3, "explain": "用充滿水的水管虹吸換水,方便又能把水族箱底部的水換得很乾淨。"}, {"lv": 2, "type": "choice", "q": "虹吸現象停止時,兩個容器的水面高度處於什麼狀態?", "options": ["差很多", "出水口那邊比較高", "入水口那邊比較高", "兩邊一樣高"], "answer": 3, "explain": "當兩個容器的水面高度相等(一樣高)時,虹吸現象會停止。"}, {"lv": 2, "type": "choice", "q": "下列哪一項「不是」虹吸現象成功的必要條件?", "options": ["水管要充滿水", "出水口要低於水面", "兩側水面要有高低差", "水要先加熱變溫"], "answer": 3, "explain": "虹吸不需要把水加熱;水管充滿水、出水口低於水面、兩側有高低差才是必要條件。"}, {"lv": 2, "type": "choice", "q": "用充滿水的水管連接兩水族箱,水流方向由什麼決定?", "options": ["水管的顏色", "水的溫度", "容器的大小", "兩端水面的高低"], "answer": 3, "explain": "水會由水面較高的一端流向較低的一端,流向由兩端水面高低決定。"}, {"lv": 2, "type": "choice", "q": "關於用水管幫水族箱換水的優點,下列何者正確?", "options": ["最花時間", "底部換不乾淨", "容易弄溼地板", "方便又能把底部換乾淨"], "answer": 3, "explain": "用水管換水方便,而且能把水族箱底部的水換得很乾淨。"}, {"lv": 2, "type": "choice", "q": "虹吸現象中,當出水口高於水面時,水管內的水流向是?", "options": ["持續流出出水口", "靜止不動", "分成兩半", "流回水箱中"], "answer": 3, "explain": "出水口高於水面時,水管內的水會流回水箱中。"}, {"lv": 2, "type": "choice", "q": "做「出水口高低對水流影響」的實驗時,下列哪一項應該保持相同?", "options": ["每次換不同水管", "每次換不同魚缸", "每次加不同顏色水", "水管裡都要充滿水"], "answer": 3, "explain": "要比較出水口高低的影響,應保持水管都充滿水等條件相同,只改變出水口高低。"}, {"lv": 2, "type": "choice", "q": "關於虹吸現象中水的移動,下列哪一個敘述正確?", "options": ["水管要全空", "靠加熱讓水流動", "靠縫隙讓水移動", "水管充滿水時水才能順利移動"], "answer": 3, "explain": "水管充滿水水才能順利移動,是虹吸現象的正確條件。"}, {"lv": 2, "type": "tf", "q": "虹吸現象只要水管充滿水就一定成功,和出水口高低沒有關係。", "answer": false, "explain": "還必須出水口低於水面、兩側有高低差才會成功,和出水口高低有關係。"}, {"lv": 2, "type": "tf", "q": "用水管虹吸換水,是三種換水方法中比較方便又乾淨的方式。", "answer": true, "explain": "用水管換水方便又能把底部換乾淨,優於水杯舀和毛巾吸。"}, {"lv": 2, "type": "choice", "q": "魚缸水面比水桶高,用充滿水的水管相連後,水會往哪邊流動?", "options": ["往魚缸流", "靜止不動", "來回流動", "往水桶流"], "answer": 3, "explain": "水由水面較高的魚缸流向水面較低的水桶。"}, {"lv": 3, "type": "choice", "q": "小芳用虹吸換水換不出來,檢查後發現水管裡只裝了一半的水。她應該怎麼做才會成功?", "options": ["把水管加熱", "把出水口再抬高", "換更長的水管", "把水管裝滿水,並讓出水口低於水面"], "answer": 3, "explain": "虹吸要成功,需把水管裝滿水並讓出水口低於水面,形成連續水柱與高低差。"}, {"lv": 3, "type": "choice", "q": "為什麼當兩個容器水面一樣高時,虹吸就會停止?", "options": ["水變熱了", "水管變細了", "水管裡沒水了", "沒有高低差就沒有推動水流的力量"], "answer": 3, "explain": "虹吸靠兩側水面高低差推動,水面一樣高時沒有高低差,水就停止流動。"}, {"lv": 3, "type": "choice", "q": "下列哪一個生活應用和虹吸現象有關?", "options": ["用毛筆沾墨", "蠟燭燭芯吸蠟油", "用衛生紙擦乾水", "虹吸式馬桶沖走穢物"], "answer": 3, "explain": "虹吸式馬桶利用虹吸把穢物沖走;前三項都是毛細現象。"}, {"lv": 3, "type": "choice", "q": "小強想讓虹吸換水換得更乾淨更多,下列做法最有效的是?", "options": ["把出水口抬到比水面高", "水管只裝一半水", "把兩邊水面調成一樣高", "維持出水口低於水面,並把出水口端放更低"], "answer": 3, "explain": "維持出水口低於水面並放更低,保持高低差,水會流得更多、底部換得更乾淨。"}, {"lv": 3, "type": "choice", "q": "用充滿水的水管把高處的水引到低處,水在管中的移動順序是?", "options": ["先變水蒸氣再凝結", "直接往下噴", "原地打轉", "先沿管上升越過高處,再流向低處出水口"], "answer": 3, "explain": "虹吸時水先沿彎曲水管上升越過高處,再流向較低的出水口。"}, {"lv": 3, "type": "choice", "q": "關於虹吸現象和連通管原理的關係,下列敘述最正確的是?", "options": ["完全沒有關係", "只有連通管和水面有關", "只有虹吸和水面有關", "兩者相互影響,都和相連容器水面高度有關"], "answer": 3, "explain": "虹吸現象與連通管原理相互影響,都與相連通容器中水面高度有關。"}, {"lv": 3, "type": "tf", "q": "虹吸換水若中途停止,代表魚缸和水桶的水面已經變得一樣高。", "answer": true, "explain": "兩邊水面一樣高時虹吸停止,中途停止通常代表水面已相等。"}, {"lv": 3, "type": "tf", "q": "虹吸式馬桶和用海綿吸水,原理是一樣的。", "answer": false, "explain": "虹吸式馬桶是虹吸現象,海綿吸水是毛細現象,原理不同。"}]}]}, {"id": "u4", "title": "第四單元　了解臺灣的環境", "cls": "u4", "lessons": [{"id": "4A", "name": "4-1　地表環境與自然資源", "cards": [{"tier": "基礎", "text": "臺灣有各種地形：<br><span class='hl'>高山、丘陵、平原、河川</span>。"}, {"tier": "基礎", "text": "臺灣最大的平原是<span class='hl'>嘉南平原</span>。"}, {"tier": "基礎", "text": "臺灣最高峰是<span class='hl'>玉山</span>（高 3952 公尺）。"}, {"tier": "基礎", "text": "不同的地表環境，<br>住著<span class='hl'>不同的動物</span>。"}, {"tier": "進階", "text": "山地：臺灣水鹿、長鬃山羊。<br>丘陵：<span class='hl'>石虎</span>、斯文豪氏赤蛙。"}, {"tier": "進階", "text": "平原：梅花鹿、珠頸斑鳩。<br>河川：馬口魚、拉氏清溪蟹。"}, {"tier": "進階", "text": "自然資源是<span class='hl'>有限</span>的，<br>我們要好好<span class='hl'>珍惜</span>使用。"}, {"tier": "深入", "text": "過度開發會破壞環境：<br>開礦讓山地凹陷、下大雨容易山崩。"}, {"tier": "深入", "text": "過度砍樹 → 山變光禿、土石流失；<br>過度採砂石 → 改變河道、下游淹水。"}, {"tier": "深入", "text": "過度抽<span class='hl'>地下水</span>，<br>會造成<span class='hl'>地層下陷</span>。"}, {"tier": "深入", "text": "重要觀念：開發時要減少破壞，<br>取得<span class='hl'>人類需求</span>與<span class='hl'>生態保護</span>的平衡。"}], "questions": [{"lv": 1, "type": "choice", "q": "臺灣的地表環境有許多不同的地形，下列哪一項「不是」課本提到的常見地形？", "options": ["高山", "丘陵", "沙漠", "平原"], "answer": 2, "explain": "課本提到臺灣有陡峭的高山、較低緩的丘陵和平原等多樣地形，並沒有提到沙漠。"}, {"lv": 1, "type": "choice", "q": "臺灣最大的平原，也是重要的農業區，是下列哪一個？", "options": ["嘉南平原", "宜蘭平原", "屏東平原", "臺北盆地"], "answer": 0, "explain": "嘉南平原是臺灣最大的平原和農業區，範圍橫越彰化、雲林、嘉義、臺南和高雄等地。"}, {"lv": 1, "type": "choice", "q": "臺灣最高峰是下列哪一座山的主峰？", "options": ["阿里山", "雪山", "玉山", "火炎山"], "answer": 2, "explain": "臺灣有許多山脈，其中以玉山山脈的玉山主峰為第一高峰，高度有3952公尺。"}, {"lv": 1, "type": "choice", "q": "玉山主峰的高度大約是多少公尺？", "options": ["52公尺", "395公尺", "9352公尺", "3952公尺"], "answer": 3, "explain": "玉山主峰是臺灣最高峰，高度有3952公尺。"}, {"lv": 1, "type": "choice", "q": "苗栗丘陵的最高峰是下列哪一座山？", "options": ["玉山", "雪山", "火炎山", "大霸尖山"], "answer": 2, "explain": "苗栗丘陵的最高峰為火炎山，位在苗栗縣三義鄉和苑裡鎮的交界處，是臺灣小百岳之一。"}, {"lv": 1, "type": "choice", "q": "下列哪一種地表環境通常有茂密的森林？", "options": ["平原", "河川", "山地", "住宅區"], "answer": 2, "explain": "課本提到山地有茂密的森林。"}, {"lv": 1, "type": "choice", "q": "丘陵地常被人們開墾成下列哪一種樣子，呈現階梯狀？", "options": ["農田", "住宅區", "魚塭", "梯田"], "answer": 3, "explain": "丘陵比山地低，有些會被開墾成梯田，呈現階梯狀，通常為茶葉種植使用。"}, {"lv": 1, "type": "choice", "q": "丘陵的梯田通常用來種植下列哪一種作物？", "options": ["稻米", "玉米", "茶葉", "西瓜"], "answer": 2, "explain": "丘陵被開墾成的梯田通常為茶葉種植使用。"}, {"lv": 1, "type": "choice", "q": "平原是開闊的平地，人們通常會把它開墾成什麼？", "options": ["農田或住宅區", "礦場", "森林", "梯田"], "answer": 0, "explain": "平原是開闊的平地，人們會開墾成農田或是住宅區。"}, {"lv": 1, "type": "choice", "q": "下列哪一種動物可以在山地看到？", "options": ["梅花鹿", "石虎", "馬口魚", "臺灣水鹿"], "answer": 3, "explain": "山地可以看到臺灣水鹿和臺灣長鬃山羊。"}, {"lv": 1, "type": "choice", "q": "臺灣長鬃山羊主要生活在下列哪一種地表環境？", "options": ["河川", "平原", "山地", "海邊"], "answer": 2, "explain": "課本提到山地可以看到臺灣水鹿和臺灣長鬃山羊。"}, {"lv": 1, "type": "choice", "q": "下列哪一種動物可以在丘陵看到？", "options": ["石虎", "梅花鹿", "馬口魚", "珠頸斑鳩"], "answer": 0, "explain": "丘陵可以看到石虎和斯文豪氏赤蛙。"}, {"lv": 1, "type": "choice", "q": "斯文豪氏赤蛙主要生活在下列哪一種地表環境？", "options": ["平原", "丘陵", "河川底部", "高山雪地"], "answer": 1, "explain": "課本提到丘陵可以看到石虎和斯文豪氏赤蛙。"}, {"lv": 1, "type": "choice", "q": "下列哪一組動物都是課本提到生活在平原的動物？", "options": ["臺灣水鹿、石虎", "馬口魚、拉氏清溪蟹", "珠頸斑鳩、梅花鹿", "石虎、斯文豪氏赤蛙"], "answer": 2, "explain": "平原可以看到珠頸斑鳩和梅花鹿。"}, {"lv": 1, "type": "choice", "q": "馬口魚主要生活在下列哪一種地表環境？", "options": ["山地森林", "丘陵梯田", "河川", "平原農田"], "answer": 2, "explain": "河川可以看到拉氏清溪蟹和馬口魚。"}, {"lv": 1, "type": "choice", "q": "拉氏清溪蟹是課本中哪一種地表環境的代表動物？", "options": ["河川", "平原", "丘陵", "山地"], "answer": 0, "explain": "課本提到河川可以看到拉氏清溪蟹和馬口魚。"}, {"lv": 1, "type": "choice", "q": "關於自然資源，下列敘述何者正確？", "options": ["自然資源用不完", "自然資源是有限的，要珍惜使用", "自然資源愈用愈多", "自然資源不需要保護"], "answer": 1, "explain": "自然資源是有限的，需要珍惜使用。"}, {"lv": 1, "type": "choice", "q": "人類的生活需要依賴下列哪一項？", "options": ["自然環境中的各種資源", "只靠電力", "完全不需要任何資源", "只靠金錢"], "answer": 0, "explain": "人類生存與生活需依賴自然環境中的各種資源，但自然資源都是有限的，需要珍惜使用。"}, {"lv": 1, "typ : "梅花鹿和珠頸斑鳩都生活在平原，是平原的代表動物。", "answer": true, "explain": "課本提到平原可以看到珠頸斑鳩和梅花鹿。"}, {"lv": 2, "type": "tf", "q": "河川和平原是同一種地表環境，所以裡面的動物也完全一樣。", "answer": false, "explain": "河川和平原是不同的地表環境，動物也不同：河川有馬口魚、拉氏清溪蟹，平原有梅花鹿、珠頸斑鳩。"}, {"lv": 2, "type": "tf", "q": "如果在山區開採石灰岩，可能會讓原本完整的山地變得凹陷。", "answer": true, "explain": "山區開採金、銀、石灰岩等礦產，會讓山地呈現凹陷的情況。"}, {"lv": 2, "type": "tf", "q": "臺灣長鬃山羊和石虎都生活在山地。", "answer": false, "explain": "臺灣長鬃山羊生活在山地，但石虎生活在丘陵，兩者不在同一種環境。"}, {"lv": 3, "type": "choice", "q": "某地原本是茂密的森林，後來人們把樹木幾乎全部砍光，下大雨時這裡最可能發生什麼事？為什麼？", "options": ["不會有影響，因為樹和水土無關", "會長出更多新樹，因為陽光變多", "容易土石流失，因為沒有林木保護土地", "地下水會變多，因為雨水直接流進地底"], "answer": 2, "explain": "過度砍伐讓山光禿禿，失去林木保護，下大雨時容易造成土石流失。"}, {"lv": 3, "type": "choice", "q": "沿海地區的人們長期大量抽取地下水來使用，多年後地面慢慢下沉。這個現象最可能的原因是什麼？", "options": ["抽取的速度超過雨水補注的速度，造成地層下陷", "海水把陸地沖低了", "地震把地面震低了", "蓋太多房子把地面壓低了"], "answer": 0, "explain": "過度抽取地下水超過雨水補注的速度，會沒有地下水可用，甚至造成地層下陷。"}, {"lv": 3, "type": "choice", "q": "工程隊在河川地大量開採砂石後，當地居民發現下游村莊在大雨時更容易淹水。下列哪一項是最合理的解釋？", "options": ["開採砂石讓河水變乾淨，所以淹水", "砂石被搬走後河川變深，所以不會淹水", "這與開採砂石完全無關", "大量開採砂石改變了河道，下游因此容易淹水"], "answer": 3, "explain": "在河川地大量開採砂石會改變河道、造成土石流失，下游地區因此容易淹水。"}, {"lv": 3, "type": "choice", "q": "課本提到「為了促進經濟發展，免不了會開發自然環境」。下列哪一種做法最符合「人類需求與生態保護取得平衡」的精神？", "options": ["完全禁止任何開發，什麼都不能做", "盡情開發，不必考慮環境", "在開發的過程中盡量減少對環境的破壞", "把所有資源一次用光以加速發展"], "answer": 2, "explain": "課本指出要在開發過程中減少環境破壞，取得人類需求與生態保護的平衡。"}, {"lv": 3, "type": "choice", "q": "小傑想設計一份「保護自然資源」的行動方案，下列哪一項做法「不適合」放進方案中？", "options": ["盡量大量開採砂石以賺更多錢", "節約用水，減少浪費地下水", "回收再利用，減少資源消耗", "植樹造林，保護山林"], "answer": 0, "explain": "大量開採砂石會破壞環境、造成下游淹水，與保護自然資源的目標相反。"}, {"lv": 3, "type": "choice", "q": "為什麼課本說「自然資源要珍惜使用」？下列理由何者最正確？", "options": ["因為自然資源是有限的，用完就沒有了", "因為自然資源很貴", "因為自然資源很難看", "因為自然資源會自己一直增加"], "answer": 0, "explain": "自然資源是有限的，人類生活又依賴它，用完就沒有了，所以要珍惜使用。"}, {"lv": 3, "type": "choice", "q": "同樣是「下大雨容易造成土石流失」，下列哪兩種人類活動都會導致這個結果？", "options": ["在平原蓋住宅、在丘陵種茶", "保護森林、減少抽地下水", "過度砍伐林木、在山區開礦", "回收資源、節約用水"], "answer": 2, "explain": "過度砍伐讓山光禿、山區開礦讓山地凹陷，下大雨時都容易造成土石流失。"}, {"lv": 3, "type": "choice", "q": "一個地區同時出現「山地凹陷」和「下大雨後容易山崩」，最可能是因為當地進行了下列哪一種活動？", "options": ["大量抽取地下水", "在山區開採礦產", "在河川開採砂石", "在平原蓋農田"], "answer": 1, "explain": "山區開採礦產會讓山地凹陷，若周邊山坡沒有防護，下大雨後容易造成山崩與土石流失。"}, {"lv": 3, "type": "choice", "q": "研究人員在某條溪流發現馬口魚和拉氏清溪蟹數量大減，並查出上游有大量開採砂石的工程。下列推論何者最合理？", "options": ["開採砂石與動物無關", "動物自己決定搬家，與環境無關", "河川的動物本來就會自己消失", "開採砂石改變河道、造成土石流失，可能破壞了牠們的河川棲地"], "answer": 3, "explain": "馬口魚和拉氏清溪蟹是河川動物，大量開採砂石會改變河道、造成土石流失，破壞牠們的棲地。"}, {"lv": 3, "type": "choice", "q": "小美主張「為了賺錢，山上的樹想砍多少就砍多少」。根據課本觀念，下列哪一個反駁最恰當？", "options": ["林木很便宜，砍了也沒關係", "林木成長需要數年到數百年，砍光後成長速度趕不上，還會造成土石流失", "砍樹完全沒有壞處", "砍樹可以讓地下水變多"], "answer": 1, "explain": "林木成長需要數年到數百年，若全部砍光則成長速度趕不上，森林消失會使動物失去家，下大雨也容易土石流失。"}, {"lv": 3, "type": "choice", "q": "下列四位同學的說法，哪一位「最符合」課本對自然資源的觀念？", "options": ["甲：資源用不完，不必節省", "乙：資源有限，要珍惜並在開發時減少破壞", "丙：為了發展，環境破壞愈多愈好", "丁：完全不開發才是唯一正確的做法"], "answer": 1, "explain": "課本強調自然資源有限要珍惜，且開發時要減少破壞，取得人類需求與生態保護的平衡。"}, {"lv": 3, "type": "choice", "q": "一座原本住著臺灣水鹿和臺灣長鬃山羊的山，因為被大量開礦而變得凹陷光禿。對這些動物最直接的影響是什麼？", "options": ["完全沒有影響", "棲息環境被破壞，動物可能失去家", "動物會變多", "動物會搬到河川住"], "answer": 1, "explain": "開礦破壞了山地環境，臺灣水鹿和臺灣長鬃山羊的棲息環境受到破壞，可能失去牠們的家。"}, {"lv": 3, "type": "choice", "q": "政府想在某座山開發觀光，又想保護當地的森林和動物。根據課本精神，下列哪一種規劃最理想？", "options": ["把整座山的樹全部砍掉蓋飯店", "完全不准任何人上山", "在開發時盡量減少破壞，兼顧人類需求與生態保護", "把山地挖空開礦以增加收入"], "answer": 2, "explain": "課本強調開發時要減少環境破壞，取得人類需求與生態保護的平衡。"}, {"lv": 3, "type": "choice", "q": "下列哪一種情況「不是」由人類過度開發所造成的環境問題？", "options": ["過度抽地下水造成地層下陷", "過度砍伐造成土石流失", "大量開採砂石造成下游淹水", "山地自然長出茂密森林"], "answer": 3, "explain": "山地自然長出茂密森林是自然現象，並非人類過度開發造成的問題；其餘三項都是人類過度開發的後果。"}, {"lv": 3, "type": "choice", "q": "小明住的地方原本地下水充足，但工廠和農田長期大量抽水。如果不改善，最可能出現什麼長遠後果？", "options": ["地下水永遠用不完", "沒有地下水可用，甚至地層下陷", "雨水會自動補滿一切", "土地會自己升高"], "answer": 1, "explain": "過度抽取地下水超過雨水補注速度，最後會沒有地下水可用，甚至造成地層下陷。"}, {"lv": 3, "type": "choice", "q": "想要同時保護「山地、丘陵、平原、河川」四種環境的動物，下列哪一種整體做法最有效？", "options": ["只保護山地就好", "減少各種過度開發，維護不同地表環境", "把動物全部集中到平原", "把河川的水全部抽乾"], "answer": 1, "explain": "不同地表環境有不同生物，減少過度開發、維護各種環境，才能保護各環境的動物。"}, {"lv": 3, "type": "choice", "q": "課本提到貴子坑前後的差異轉變，主要是想讓學生認識什麼？", "options": ["自然資源用不完", "過度開發會造成環境破壞，要思考如何取得平衡", "開礦完全沒有壞處", "河川動物的種類"], "answer": 1, "explain": "透過貴子坑前後差異，引導學生認識過度開發造成的環境破壞，並思考如何取得人類需求與生態保護的平衡。"}, {"lv": 3, "type": "tf", "q": "因為林木成長需要數年到數百年，所以一旦過度砍光，森林很難馬上恢復。", "answer": true, "explain": "林木成長需要數年到數百年，若全部砍光，成長速度趕不上，森林就會消失難以馬上恢復。"}, {"lv": 3, "type": "tf", "q": "只要對人類經濟有幫助，就算把自然環境完全破壞也沒關係。", "answer": false, "explain": "課本強調要在開發過程中減少環境破壞，取得人類需求與生態保護的平衡，不能完全破壞環境。"}, {"lv": 3, "type": "tf", "q": "沿海地區地層下陷，最可能和當地長期過度抽取地下水有關。", "answer": true, "explain": "過度抽取地下水超過雨水補注速度，會造成地層下陷。"}, {"lv": 3, "type": "tf", "q": "某條河川的下游突然變得容易淹水，上游又剛好大量開採砂石，這兩件事可能有關聯。", "answer": true, "explain": "大量開採砂石會改變河道、造成土石流失，下游因此容易淹水，兩者可能有關。"}, {"lv": 3, "type": "tf", "q": "保護森林、節約用水、減少濫採砂石，都是珍惜自然資源、保護環境的好做法。", "answer": true, "explain": "這些做法都能減少對自然環境的破壞，符合珍惜有限自然資源的觀念。"}, {"lv": 3, "type": "tf", "q": "自然資源既然有限，最好的辦法就是完全不開發、什麼資源都不使用。", "answer": false, "explain": "課本指出為了經濟發展免不了要開發，重點是在開發過程中減少破壞、取得平衡，而非完全不使用。"}, {"lv": 3, "type": "tf", "q": "在山區開礦造成山地凹陷後，如果周邊山坡沒有防護措施，下大雨容易造成山崩與土石流失。", "answer": true, "explain": "課本指出開礦使山地凹陷，若周邊山坡地沒有防護措施，下大雨後容易造成山崩與土石流失。"}, {"lv": 3, "type": "tf", "q": "森林被砍光後，受影響的只有樹木，住在山裡的小動物完全不會受到影響。", "answer": false, "explain": "森林消失後，不只林木沒了，住在山裡小動物的家也會沒有，動物會受到影響。"}, {"lv": 3, "type": "tf", "q": "同一條河川若水質和河道被破壞，馬口魚和拉氏清溪蟹的生存都可能受到威脅。", "answer": true, "explain": "馬口魚和拉氏清溪蟹都生活在河川，河道被破壞會威脅牠們共同的棲地。"}, {"lv": 3, "type": "tf", "q": "想在開發山林的同時保護生態，可以選擇在開發時減少破壞，而不是把整片山林全部剷平。", "answer": true, "explain": "課本強調要在開發過程中減少環境破壞，取得人類需求與生態保護的平衡。"}, {"lv": 3, "type": "tf", "q": "如果一個地區同時發生地層下陷和地下水枯竭，過度抽取地下水是合理的原因之一。", "answer": true, "explain": "過度抽取地下水超過雨水補注速度，會造成沒有地下水可用，甚至地層下陷。"}, {"lv": 3, "type": "tf", "q": "因為平原和山地的環境不同，所以在平原很難看到只生活在山地的臺灣長鬃山羊。", "answer": true, "explain": "不同地表環境有不同生物，臺灣長鬃山羊是山地動物，在平原本來就很難看到。"}, {"lv": 3, "type": "tf", "q": "珍惜自然資源只是大人的事，和小學生的日常生活沒有任何關係。", "answer": false, "explain": "自然資源有限、人人都依賴它，珍惜資源人人有責，包括小學生在生活中節約使用。"}, {"lv": 3, "type": "tf", "q": "在丘陵過度開墾種茶，如果完全不顧水土保持，也可能對當地環境造成負面影響。", "answer": true, "explain": "課本強調過度開發自然環境會造成破壞，丘陵開墾若不顧水土保持同樣可能傷害環境。"}, {"lv": 2, "type": "choice", "q": "下列哪一組「地形與代表動物」的配對是「正確」的？", "options": ["山地－臺灣水鹿", "河川－梅花鹿", "平原－石虎", "丘陵－馬口魚"], "answer": 0, "explain": "臺灣水鹿是山地的代表動物，配對正確。其餘配對皆錯誤。"}, {"lv": 2, "type": "choice", "q": "火炎山位在苗栗丘陵，它「不是」下列哪一種地形的最高峰？", "options": ["臺灣全島", "苗栗丘陵", "臺灣的某一座丘陵", "苗栗縣的山區"], "answer": 0, "explain": "火炎山是苗栗丘陵的最高峰，但臺灣全島的最高峰是玉山主峰（3952公尺）。"}, {"lv": 2, "type": "choice", "q": "下列哪一項「不是」課本提到人類過度開發造成的環境破壞？", "options": ["山地凹陷", "土石流失", "地層下陷", "森林自然茂密生長"], "answer": 3, "explain": "森林自然茂密生長是自然現象；山地凹陷、土石流失、地層下陷都是人類過度開發造成的破壞。"}, {"lv": 2, "type": "tf", "q": "梯田位於丘陵，農田和住宅區則多位於平原，兩種開墾方式對應不同的地形。", "answer": true, "explain": "課本提到丘陵會開墾成梯田，平原會開墾成農田或住宅區，對應不同地形。"}, {"lv": 2, "type": "tf", "q": "玉山主峰和嘉南平原都是臺灣的地形，前者是最高峰，後者是最大的平原。", "answer": true, "explain": "玉山主峰是臺灣最高峰（3952公尺），嘉南平原是臺灣最大的平原。"}, {"lv": 3, "type": "choice", "q": "一個地區若想長久擁有乾淨充足的地下水，下列哪一種做法最恰當？為什麼？", "options": ["盡量多抽，因為地下水抽不完", "抽水量控制在不超過雨水補注速度，避免地下水枯竭", "把地下水一次抽光再說", "完全不下雨也沒關係"], "answer": 1, "explain": "地下水來自降雨滲透，若抽取超過雨水補注速度會枯竭甚至地層下陷，故應控制抽水量。"}, {"lv": 3, "type": "choice", "q": "課本說「免不了要開發環境」，又說「要珍惜資源」，這兩句話合起來想表達的核心是什麼？", "options": ["完全不要開發", "隨便開發都可以", "在開發與保護之間取得平衡", "資源用完再想辦法"], "answer": 2, "explain": "課本要傳達的是：開發在所難免，但要減少破壞，取得人類需求與生態保護的平衡。"}, {"lv": 3, "type": "choice", "q": "小強發現家鄉的山變得光禿、河道改變、地面還下陷了。這些現象合起來最可能說明了什麼？", "options": ["大自然自己變的，與人無關", "當地可能有過度砍伐、開採砂石、抽地下水等過度開發行為", "這些現象彼此完全沒有關係", "環境會自己愈變愈好"], "answer": 1, "explain": "山光禿（過度砍伐）、河道改變（開採砂石）、地層下陷（過度抽地下水）都是人類過度開發的後果。"}, {"lv": 3, "type": "tf", "q": "如果完全禁止任何開發，反而不符合課本所說『取得人類需求與生態保護平衡』的觀念。", "answer": true, "explain": "課本指出為經濟發展免不了要開發，重點是減少破壞、取得平衡，而非完全禁止開發。"}, {"lv": 3, "type": "tf", "q": "地下水來自降雨滲透，所以只要持續下雨，再怎麼大量抽取地下水都不會枯竭。", "answer": false, "explain": "即使有降雨補注，若抽取速度超過雨水補注速度，地下水仍會枯竭，甚至造成地層下陷。"}, {"lv": 3, "type": "tf", "q": "保護不同的地表環境，等於同時保護了住在這些環境裡的各種生物。", "answer": true, "explain": "不同地表環境有不同生物，維護各種環境就能保護生活其中的各種動物。"}]}, {"id": "4B", "name": "4-2　地表物質與雨水的作用", "cards": [{"tier": "基礎", "text": "地表的物質，依<span class='hl'>顆粒大小</span>分三種：<br>礫石、砂、土壤。"}, {"tier": "基礎", "text": "由大到小：<span class='hl'>礫石</span>（最大最粗）<br>＞ 砂（中間）＞ <span class='hl'>土壤</span>（最小最細）。"}, {"tier": "基礎", "text": "怎麼分辨？<br>用<span class='hl'>放大鏡</span>看顆粒、用<span class='hl'>手摸</span>感覺粗細。"}, {"tier": "基礎", "text": "不同地方的土，顏色不一樣，<br>常見：黃褐色、紅色、黑色。"}, {"tier": "進階", "text": "<span class='hl'>雨水</span>會改變地表，<br>把地表的物質<span class='hl'>搬走</span>。"}, {"tier": "進階", "text": "重要規則：雨量（水量）<span class='hl'>愈大</span>，<br>搬走的物質愈多、愈大，搬得<span class='hl'>愈遠</span>。"}, {"tier": "進階", "text": "另一個規則：顆粒<span class='hl'>愈小</span>的物質，<br>被水搬得<span class='hl'>愈遠</span>。"}, {"tier": "深入", "text": "公平實驗：要比較「水量大小」，<br>就只能改變<span class='hl'>水量</span>……"}, {"tier": "深入", "text": "……土堆的高度、大小、澆水的高度和時間，<br>都要<span class='hl'>一樣</span>（才公平）。"}, {"tier": "深入", "text": "想一想：地震後鬆動的土石，<br>遇到豪雨容易形成<span class='hl'>土石流</span>。"}], "questions": [{"lv": 1, "type": "choice", "q": "地表物質依顆粒大小可分成三類，下列哪一種的顆粒最大？", "options": ["礫石", "砂", "土壤", "以上都一樣大"], "answer": 0, "explain": "地表物質依顆粒大小可分為礫石、砂、土壤，其中礫石的顆粒最大。"}, {"lv": 1, "type": "choice", "q": "地表物質中，哪一種的顆粒最小？", "options": ["礫石", "砂", "土壤", "三者一樣"], "answer": 2, "explain": "土壤的顆粒最小，砂介於中間，礫石最大。"}, {"lv": 1, "type": "choice", "q": "用手摸摸看，下列哪一種地表物質摸起來最粗？", "options": ["土壤", "礫石", "砂", "三者都很細"], "answer": 1, "explain": "摸起來最粗的是礫石，最細的是土壤，砂介於兩者之間。"}, {"lv": 1, "type": "choice", "q": "用手摸摸看，哪一種地表物質摸起來最細？", "options": ["砂", "礫石", "三者都很粗", "土壤"], "answer": 3, "explain": "摸起來最細的是土壤，最粗的是礫石。"}, {"lv": 1, "type": "choice", "q": "礫石、砂、土壤的顆粒由大到小，正確的排序是？", "options": ["土壤 > 砂 > 礫石", "砂 > 礫石 > 土壤", "礫石 > 土壤 > 砂", "礫石 > 砂 > 土壤"], "answer": 3, "explain": "顆粒大小：礫石最大、砂居中、土壤最小，所以是礫石 > 砂 > 土壤。"}, {"lv": 1, "type": "choice", "q": "砂的顆粒大小，和礫石、土壤相比是怎樣的？", "options": ["比礫石還大", "比土壤還小", "介於礫石和土壤之間", "和礫石一樣大"], "answer": 2, "explain": "砂的顆粒大小介於礫石和土壤之間。"}, {"lv": 1, "type": "choice", "q": "想要觀察並比較礫石、砂、土壤顆粒的大小，可以使用下列哪一種工具？", "options": ["溫度計", "磁鐵", "放大鏡", "量角器"], "answer": 2, "explain": "可以用放大鏡觀察三樣物質顆粒大小的不同。"}, {"lv": 1, "type": "choice", "q": "除了用放大鏡看顆粒大小，還可以用什麼方法分辨礫石、砂、土壤？", "options": ["用耳朵聽", "用鼻子聞味道", "用手摸觸感", "用尺量重量"], "answer": 2, "explain": "可以用放大鏡看顆粒大小，也可以用手摸觸感來區分礫石、砂、土壤。"}, {"lv": 1, "type": "choice", "q": "下列哪一種物質，摸起來比土壤粗，但又不像礫石那麼粗？", "options": ["礫石", "砂", "黏土", "泥水"], "answer": 1, "explain": "摸起來比土壤粗但又不像礫石的是砂。"}, {"lv": 1, "type": "choice", "q": "我們可以依據什麼來區分礫石、砂和土壤？", "options": ["顆粒大小與觸感", "顏色深淺", "重量輕重", "味道濃淡"], "answer": 0, "explain": "可以依據顆粒大小和觸感（摸起來的粗細）來區分礫石、砂和土壤。"}, {"lv": 1, "type": "choice", "q": "一般校園或公園中常見的土，通常是什麼顏色？", "options": ["綠色", "黃褐色", "藍色", "白色"], "answer": 1, "explain": "一般校園或公園中常見的土是黃褐色。"}, {"lv": 1, "type": "choice", "q": "下列哪一種顏色，是常見的土壤顏色之一？", "options": ["紫色", "紅色", "透明", "螢光綠"], "answer": 1, "explain": "常見的土壤顏色有黃褐、紅和黑，紅色是其中之一。"}, {"lv": 1, "type": "choice", "q": "不同地區採集到的土，下列敘述何者正確？", "options": ["顏色完全一樣", "顏色不大相同", "都是黑色", "都是白色"], "answer": 1, "explain": "不同地區的土不大相同，常見的土壤顏色有黃褐、紅和黑。"}, {"lv": 1, "type": "choice", "q": "雨水會對地表造成什麼影響？", "options": ["讓地表完全不變", "使土壤消失不見", "改變地表環境", "把石頭變大"], "answer": 2, "explain": "雨水會改變地表的環境，例如搬運地表物質。"}, {"lv": 1, "type": "choice", "q": "雨水落到地表上，會把地表物質怎麼樣？", "options": ["永遠固定不動", "變成空氣", "凝結成冰", "搬運到其他地方"], "answer": 3, "explain": "雨水能夠搬運地表物質，把它搬運到其他地方。"}, {"lv": 1, "type": "choice", "q": "在水量相同的情況下，顆粒愈小的物質會被水搬運得怎樣？", "options": ["愈遠", "愈近", "完全不動", "沉到最底下"], "answer": 0, "explain": "顆粒愈小的物質，會被水搬得愈遠。"}, {"lv": 1, "type": "choice", "q": "對著土堆澆水時，礫石、砂、土壤中哪一種最容易被水沖走？", "options": ["礫石", "土壤", "三者一樣難沖走", "都沖不走"], "answer": 1, "explain": "土壤最容易被水沖走，因為顆粒愈小的物質愈容易被水帶走、搬得愈遠。"}, {"lv": 1, "type": "choice", "q": "澆水量愈大，土堆會發生什麼變化？", "options": ["愈來愈高", "完全沒變化", "凹陷愈明顯", "變得更硬"], "answer": 2, "explain": "澆水量愈大，土堆凹陷會愈明顯。"}, {"lv": 1, "type": "choice", "q": "在「比較礫石、砂和土壤」的實驗中，用放大鏡觀察會發現什麼？", "options": ["三者顆粒大小不一樣", "三者顏色都一樣", "三者都會發光", "三者都是液體"], "answer": 0, "explain": "用放大鏡觀察可發現礫石顆粒最大、砂居中、土壤最小，三者顆粒大小不同。"}, {"lv": 1, "type": "choice", "q": "下列哪一種物 用本單元概念判斷，他的說法？", "options": ["不合理，雨大小和泥沙無關", "不合理，泥沙不會被水搬", "合理，但和水量無關", "合理，因為水量愈大搬運的物質愈多"], "answer": 3, "explain": "水量愈大，可搬運較多的地表物質，所以雨愈大被沖進排水溝的泥沙愈多，說法合理。"}, {"lv": 3, "type": "choice", "q": "做完水量大小的實驗後，發現『水量大的土堆流失較多物質、搬得較遠』。這個結果說明了什麼？", "options": ["水量大小和搬運無關", "水量愈大，對地表的搬運作用愈強", "水量小搬得比較遠", "物質不會被搬運"], "answer": 1, "explain": "實驗結果支持『水量愈大，可沖走顆粒愈大、搬運物質愈多、距離愈遠』的結論。"}, {"lv": 3, "type": "choice", "q": "關於『地震』和『豪雨』對土石流的角色，下列敘述何者最正確？", "options": ["地震和豪雨都沒有關係", "地震使土石鬆動，豪雨提供充足雨水帶動土石", "只要有地震一定會土石流", "只要下小雨就會土石流"], "answer": 1, "explain": "地震後山坡土石鬆動（提供鬆散土石），再加上豪雨（充足雨水），就容易形成土石流。"}, {"lv": 3, "type": "choice", "q": "為什麼山區一旦土石流失，下游地區容易跟著淹水？", "options": ["大量土石被雨水搬到下游，改變河道並淤積", "因為下游自己會冒水", "因為土石會吸光河水", "因為下游地勢比較高"], "answer": 0, "explain": "雨水會搬運大量土石到下游堆積，淤積河道、改變河道，使下游容易淹水。"}, {"lv": 3, "type": "choice", "q": "小美做實驗時，一個土堆澆水高度很高、另一個澆水高度很低。這樣的實驗有什麼問題？", "options": ["沒有問題，可以這樣做", "土堆會比較好看", "同時改變了水量以外的條件，結果不公平", "可以省時間"], "answer": 2, "explain": "倒水高度應保持相同，若同時改變會無法判斷是水量還是高度造成差異，結果不公平。"}, {"lv": 3, "type": "choice", "q": "雨後在土堆下方看到一層細泥、再往外一點才看到較粗的砂。最可能的原因是？", "options": ["泥比砂重所以跑得遠", "顆粒小的泥被搬得較遠，顆粒大的砂留在較近處", "水把砂變成泥", "這是巧合，和顆粒大小無關"], "answer": 1, "explain": "顆粒愈小被搬得愈遠，所以細泥被搬到較遠處，較粗的砂留在較近的地方。"}, {"lv": 3, "type": "choice", "q": "如果想模擬『豪雨』對土堆的搬運作用，應該怎麼澆水？", "options": ["只滴幾滴水", "完全不澆水", "用較大的水量澆水", "用很慢很小的水量澆"], "answer": 2, "explain": "豪雨代表大水量，水量愈大搬運作用愈強，所以要用較大的水量來模擬。"}, {"lv": 3, "type": "choice", "q": "下列哪一種情況『最不容易』發生土石流？", "options": ["鬆散厚土石的山坡，下豪雨", "地震後鬆動的山坡，遇豪雨", "土石豐富又鬆散，加上充足雨水", "堅硬完整、沒有鬆散土石的岩壁，下小雨"], "answer": 3, "explain": "土石流需要鬆散豐富的土石加充足雨水；堅硬無鬆散土石、又只下小雨，最不容易發生。"}, {"lv": 3, "type": "choice", "q": "同一個土堆，第一次澆少量水、第二次澆大量水。比較兩次，第二次最可能觀察到什麼？", "options": ["凹陷較淺、物質流失較少", "完全沒有差別", "土堆反而長高", "凹陷較明顯、流失物質較多、搬得較遠"], "answer": 3, "explain": "水量愈大，土堆凹陷愈明顯、流失物質愈多、搬運距離愈遠。"}, {"lv": 3, "type": "choice", "q": "老師說『顆粒愈小被搬得愈遠』。下列生活現象哪一個最能支持這句話？", "options": ["大石頭被沖到最遠的地方", "大雨後，細泥被沖到很遠的下游，礫石多留在原地附近", "所有顆粒都停在同一個地方", "顆粒大的被沖得最遠"], "answer": 1, "explain": "細泥顆粒小被搬到很遠的下游，礫石顆粒大留在原地附近，正好支持『顆粒愈小被搬得愈遠』。"}, {"lv": 3, "type": "choice", "q": "為什麼說『水量大小對地表影響』的實驗，只能改變水量這一個條件？", "options": ["這樣比較省水", "這樣土堆比較穩", "這樣才能確定地表的改變是水量造成的", "這樣實驗比較快"], "answer": 2, "explain": "只改變水量、其他條件相同，才能確定觀察到的差異是由水量造成的，這是公平實驗的原則。"}, {"lv": 3, "type": "tf", "q": "地震後山坡土石鬆動，遇到豪雨容易形成土石流。", "answer": true, "explain": "地震後山坡土石鬆動，加上豪雨的充足雨水，容易形成土石流。"}, {"lv": 3, "type": "tf", "q": "只要有豐富的土石，就算沒有雨水也會發生土石流。", "answer": false, "explain": "土石流需要豐富且鬆散的土石，還要有充足的雨水才能協助土石流動，缺一不可。"}, {"lv": 3, "type": "tf", "q": "土石要足夠鬆散，才比較容易被水帶走而形成土石流。", "answer": true, "explain": "發生土石流的地方土石要足夠鬆散，才容易被水帶走。"}, {"lv": 3, "type": "tf", "q": "下豪大雨時，地表物質被移動的速度愈快、距離愈遠。", "answer": true, "explain": "下豪大雨時，地表物質被移動的速度愈快、距離愈遠。"}, {"lv": 3, "type": "tf", "q": "颱風豪雨把上游大量泥沙搬到下游堆積，可以用『雨水會搬運地表物質』來解釋。", "answer": true, "explain": "雨水能搬運地表物質，水量愈大搬得愈多、愈遠，故能把上游泥沙搬到下游堆積。"}, {"lv": 3, "type": "tf", "q": "同一場雨裡，礫石會被搬到比細泥更遠的地方。", "answer": false, "explain": "顆粒愈小被搬得愈遠，細泥顆粒比礫石小，所以細泥被搬得比礫石遠。"}, {"lv": 3, "type": "tf", "q": "做水量大小的實驗時，只要改變水量、其他條件相同，結果才公平可信。", "answer": true, "explain": "公平實驗要控制變因，只改變水量、其他相同，才能確定差異由水量造成。"}, {"lv": 3, "type": "tf", "q": "堅硬完整、沒有鬆散土石的岩壁，下小雨時很容易發生土石流。", "answer": false, "explain": "土石流需要鬆散豐富的土石加充足雨水；堅硬無鬆散土石又只下小雨，最不容易發生。"}, {"lv": 3, "type": "tf", "q": "雨後土堆下方出現黃濁的水和小溝紋，代表雨水搬運了地表的泥土。", "answer": true, "explain": "水夾雜泥土流到下方形成小溝紋、看起來黃黃濁濁，正是雨水搬運地表物質的現象。"}, {"lv": 3, "type": "tf", "q": "想模擬豪雨對土堆的搬運作用，應該用很小的水量慢慢澆。", "answer": false, "explain": "豪雨代表大水量，應該用較大的水量澆水才能模擬豪雨的搬運作用。"}, {"lv": 3, "type": "tf", "q": "水量愈大，土堆凹陷愈明顯、流失的物質也愈多。", "answer": true, "explain": "澆水量愈大，土堆凹陷愈明顯，可搬運的物質也愈多。"}, {"lv": 3, "type": "tf", "q": "地震使山坡土石鬆動，豪雨提供充足雨水，兩者一起作用容易造成土石流。", "answer": true, "explain": "地震使土石鬆動、豪雨提供充足雨水，兩個條件一起才容易形成土石流。"}, {"lv": 3, "type": "tf", "q": "在實驗中，一個土堆澆水高度很高、另一個很低，仍然算是公平的實驗。", "answer": false, "explain": "倒水高度應保持相同，否則無法判斷差異是水量還是高度造成，不算公平實驗。"}, {"lv": 3, "type": "tf", "q": "雨後在土堆外圍較遠處發現最細的泥，可用『顆粒愈小被搬得愈遠』解釋。", "answer": true, "explain": "顆粒愈小被搬得愈遠，所以最細的泥會出現在較遠的地方。"}, {"lv": 3, "type": "tf", "q": "山區土石被雨水大量沖到下游淤積，可能改變河道，使下游容易淹水。", "answer": true, "explain": "雨水把大量土石搬到下游堆積，淤積並改變河道，使下游容易淹水。"}, {"lv": 3, "type": "tf", "q": "做水量大小實驗時，把兩個土堆做成不同高度，比較能看出水量的影響。", "answer": false, "explain": "土堆高度必須相同，只改變水量，才能正確看出水量造成的影響。"}, {"lv": 3, "type": "tf", "q": "雨水量愈大，搬運地表物質的距離就愈遠。", "answer": true, "explain": "水量愈大，搬運的距離愈遠，這是雨水改變地表的重要現象。"}, {"lv": 3, "type": "tf", "q": "土石流只要有充足雨水就會發生，和土石是否鬆散無關。", "answer": false, "explain": "土石流需要豐富且鬆散的土石，再加上充足雨水，兩個條件缺一不可。"}, {"lv": 3, "type": "tf", "q": "同一個土堆澆大量水比澆少量水，物質會流失更多、被搬得更遠。", "answer": true, "explain": "水量愈大，土堆流失物質愈多、搬運距離愈遠。"}]}, {"id": "4C", "name": "4-3　地震與防災", "cards": [{"tier": "基礎", "text": "臺灣位於兩個板塊<br>（<span class='hl'>歐亞板塊、菲律賓海板塊</span>）的交界，<br>所以地震很多。"}, {"tier": "基礎", "text": "「<span class='hl'>震源</span>」：<br>地震發生的「起始點」。"}, {"tier": "基礎", "text": "「<span class='hl'>震央</span>」：<br>震源在「地表上」的位置（投影點）。"}, {"tier": "進階", "text": "「<span class='hl'>地震規模</span>」：表示地震的大小（能量），<br><span class='hl'>沒有單位</span>（用芮氏規模）。"}, {"tier": "進階", "text": "「<span class='hl'>震度</span>」：人<span class='hl'>感受到的搖晃</span>，<br>或建築物被破壞的程度。"}, {"tier": "進階", "text": "中央氣象署把震度分成<span class='hl'>10 級</span>：<br>0、1、2、3、4、5弱、5強、6弱、6強、7。"}, {"tier": "進階", "text": "地震災害：房屋倒塌、橋梁斷裂、<br>土壤液化、海嘯、火災。"}, {"tier": "深入", "text": "地震時口訣：<span class='hl'>趴下、掩護、穩住</span>，<br>最重要是保護<span class='hl'>頭和脖子</span>。"}, {"tier": "深入", "text": "躲在堅固桌子下、遠離窗戶和會倒的櫃子；<br>逃生<span class='hl'>走樓梯、不搭電梯</span>。"}, {"tier": "深入", "text": "平時準備：固定家具、<br>準備<span class='hl'>緊急避難包</span>（水、乾糧、照明、藥品）。"}, {"tier": "深入", "text": "地震後若聞到<span class='hl'>瓦斯味</span>：<br>不可開關電器或用火（會爆炸），<br>要開窗、關總開關。"}, {"tier": "深入", "text": "每年<span class='hl'>9 月 21 日</span>是「<span class='hl'>國家防災日</span>」<br>（紀念 921 大地震）。"}], "questions": [{"lv": 1, "type": "choice", "q": "地震發生的起始點，我們稱它為什麼？", "options": ["震源", "震央", "震度", "地震規模"], "answer": 0, "explain": "震源是指地震發生（地層錯動）的起始點。"}, {"lv": 1, "type": "choice", "q": "震源在地表上的垂直投影點，叫做什麼？", "options": ["震度", "震源", "震央", "規模"], "answer": 2, "explain": "震央是震源在地表上的垂直投影點，地震報告上常以紅色星   {key:"master", stage:5, ic:"🏆", name:"精熟關",     desc:"綜合全部，要全部答對才精熟！", need:4, pool:[1,2,3], pass:1.0},
];
const STAGE_LABEL = ["未開始","📖 讀完重點","🥉 基礎","🥈 中等","🥇 進階","🏆 精熟"];
const ROUND = 10;
const STORE_KEY = "nat4_guided_v1";

function load(){ try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};} }
function save(o){ try{localStorage.setItem(STORE_KEY, JSON.stringify(o));}catch(e){} }
function getStage(id){ return load()[id]||0; }
function setStage(id, s){ const o=load(); o[id]=Math.max(o[id]||0, s); save(o); }
function badgeClass(s){ return s>0?("badge s"+s):"badge"; }

const allLessons = DATA.flatMap(u=>u.lessons);
const totalQ = allLessons.reduce((n,l)=>n+l.questions.length,0);

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

/* ---- HOME ---- */
function renderHome(){
  const list=document.getElementById("unitList"); list.innerHTML="";
  DATA.forEach(u=>{
    const wrap=document.createElement("div"); wrap.className="unit"+(u.cls==="u4"?" u4":"");
    wrap.innerHTML=`<h2>${u.title}</h2>`;
    u.lessons.forEach(ls=>{
      const s=getStage(ls.id);
      const stars=["🥉","🥈","🥇","🏆"].map((m,k)=> s>=k+2 ? m : "⚪").join("　");
      const card=document.createElement("div"); card.className="card";
      card.innerHTML=`<div class="lesson-head"><span class="name">${ls.name}</span><span class="${badgeClass(s)}">${STAGE_LABEL[s]}</span></div>
        <div class="ministars">${stars}</div>
        <div class="btnrow"><button class="${u.cls==='u4'?'btn-u4':'btn-u3'}" data-id="${ls.id}">進入闖關 →</button></div>`;
      wrap.appendChild(card);
    });
    list.appendChild(wrap);
  });
  const mastered=allLessons.filter(l=>getStage(l.id)>=5).length;
  const pct=Math.round(mastered/allLessons.length*100);
  document.getElementById("ovPct").textContent=pct;
  document.getElementById("ovBar").style.width=pct+"%";
  document.getElementById("ovText").textContent = mastered===allLessons.length?"🎊 全部精熟，太厲害了！":`已精熟 ${mastered} / ${allLessons.length} 課，加油！`;
  document.getElementById("ovQ").textContent=totalQ;
  list.querySelectorAll("button[data-id]").forEach(b=> b.addEventListener("click",()=>openLesson(b.getAttribute("data-id"))));
}
function show(sec){ ["home","lesson","cards","quiz","result"].forEach(s=>document.getElementById(s).classList.toggle("hidden", s!==sec)); window.scrollTo({top:0,behavior:"smooth"}); }
function goHome(){ renderHome(); show("home"); }

/* ---- LESSON MAP ---- */
let curId=null;
function findLesson(id){ return allLessons.find(l=>l.id===id); }
function openLesson(id){
  curId=id; const ls=findLesson(id); const s=getStage(id);
  document.getElementById("lsName").textContent=ls.name;
  const b=document.getElementById("lsBadge"); b.className=badgeClass(s); b.textContent=STAGE_LABEL[s];
  const box=document.getElementById("stageList"); box.innerHTML="";
  STAGES.forEach(st=>{
    const unlocked = s>=st.need;
    const done = s>=st.stage;
    const row=document.createElement("div");
    row.className="stage"+(done?" done":"")+(!unlocked?" locked":"");
    let actHtml;
    if(!unlocked){ actHtml=`<span class="status lk">🔒 未解鎖</span>`; }
    else { actHtml=`<button class="${done?'btn-soft':'btn-main'}" data-key="${st.key}">${st.key==='read'?(done?'再讀一次':'開始讀'):(done?'再挑戰':'開始')}</button>`; }
    row.innerHTML=`<div class="ic">${done?'✅':st.ic}</div>
      <div class="info"><div class="t">${st.ic} ${st.name}</div><div class="d">${st.desc}</div></div>
      <div class="act">${actHtml}</div>`;
    box.appendChild(row);
  });
  box.querySelectorAll("button[data-key]").forEach(btn=> btn.addEventListener("click",()=>{
    const key=btn.getAttribute("data-key");
    if(key==="read") startCards(); else startQuiz(key);
  }));
  show("lesson");
}
function backToLesson(){ openLesson(curId); }

/* ---- CARDS (guided reading) ---- */
let cd={idx:0, cards:[]};
function startCards(){ cd={idx:0, cards:findLesson(curId).cards}; show("cards"); renderCard(); }
function renderCard(){
  const c=cd.cards[cd.idx];
  document.getElementById("cdTier").textContent="🌱🌿🌳"[["基礎","進階","深入"].indexOf(c.tier)]+" "+c.tier;
  document.getElementById("cdTier").className="tierchip tier-"+c.tier;
  document.getElementById("cdText").innerHTML=c.text;
  document.getElementById("cdIdx").textContent=`第 ${cd.idx+1} / ${cd.cards.length} 張`;
  const dots=document.getElementById("cdDots"); dots.innerHTML="";
  cd.cards.forEach((_,i)=>{ const d=document.createElement("span"); d.className="dot"+(i===cd.idx?" on":(i<cd.idx?" seen":"")); dots.appendChild(d); });
  document.getElementById("cdPrev").disabled = cd.idx===0;
  document.getElementById("cdNext").textContent = cd.idx===cd.cards.length-1 ? "讀完了！✅" : "下一張 →";
}
document.getElementById("cdPrev").addEventListener("click",()=>{ if(cd.idx>0){cd.idx--; renderCard();} });
document.getElementById("cdNext").addEventListener("click",()=>{
  if(cd.idx<cd.cards.length-1){ cd.idx++; renderCard(); }
  else { setStage(curId,1); backToLesson(); }
});

/* ---- QUIZ ---- */
let q={key:null, items:[], idx:0, correct:0, answered:false, cfg:null};
function startQuiz(key){
  const cfg=STAGES.find(s=>s.key===key); const ls=findLesson(curId);
  let pool=ls.questions.filter(it=>cfg.pool.includes(it.lv));
  pool=shuffle(pool).slice(0, Math.min(ROUND, pool.length)).map(it=>{
    if(it.type==="choice"){ // 打散選項，重算正解
      const idxs=shuffle(it.options.map((_,i)=>i));
      const opts=idxs.map(i=>it.options[i]);
      const ans=idxs.indexOf(it.answer);
      return {...it, options:opts, answer:ans};
    }
    return it;
  });
  q={key, items:pool, idx:0, correct:0, answered:false, cfg};
  show("quiz"); renderQ();
}
function renderQ(){
  q.answered=false; const it=q.items[q.idx];
  document.getElementById("qLvl").textContent=`${q.cfg.ic} ${q.cfg.name}`;
  document.getElementById("qScore").textContent=`✔ ${q.correct} / ${q.items.length}`;
  document.getElementById("qBar").style.width=Math.round(q.idx/q.items.length*100)+"%";
  document.getElementById("qText").innerHTML=`<span class="qtype">${it.type==="tf"?"是非題":"選擇題"}</span>${it.q}`;
  const opts=document.getElementById("qOpts"); opts.innerHTML="";
  const choices=it.type==="tf"?["⭕ 對","❌ 錯"]:it.options;
  choices.forEach((c,i)=>{ const b=document.createElement("button"); b.className="opt"; b.innerHTML=c; b.addEventListener("click",()=>answer(i,b)); opts.appendChild(b); });
  const fb=document.getElementById("qFb"); fb.className="feedback"; fb.innerHTML="";
  document.getElementById("qNext").classList.add("hidden");
}
function answer(i,btn){
  if(q.answered)return; q.answered=true; const it=q.items[q.idx];
  const correctIdx=it.type==="tf"?(it.answer?0:1):it.answer; const right=(i===correctIdx);
  if(right)q.correct++;
  const opts=document.getElementById("qOpts").children;
  for(let k=0;k<opts.length;k++)opts[k].setAttribute("disabled","true");
  opts[correctIdx].classList.add("correct"); if(!right)btn.classList.add("wrong");
  const fb=document.getElementById("qFb"); fb.className="feedback show "+(right?"good":"bad");
  fb.innerHTML=`<span class="lab">${right?"✅ 答對了！":"❌ 答錯了"}</span>${it.explain}`;
  document.getElementById("qScore").textContent=`✔ ${q.correct} / ${q.items.length}`;
  const nx=document.getElementById("qNext"); nx.classList.remove("hidden");
  nx.textContent=(q.idx===q.items.length-1)?"看結果 🎯":"下一題 →";
}
document.getElementById("qNext").addEventListener("click",()=>{ if(q.idx<q.items.length-1){q.idx++; renderQ();} else finishQuiz(); });

function finishQuiz(){
  const total=q.items.length, acc=q.correct/total, passed=acc>=q.cfg.pass;
  document.getElementById("qBar").style.width="100%";
  document.getElementById("rScore").textContent=`答對 ${q.correct} / ${total} 題（${Math.round(acc*100)}%）`;
  document.getElementById("rEmoji").textContent = passed?(q.cfg.key==="master"?"🏆":"🎉"):"💪";
  const v=document.getElementById("rVerdict");
  const nextBtn=document.getElementById("rNext");
  if(passed){
    const before=getStage(curId); setStage(curId, q.cfg.stage);
    v.className="verdict pass";
    if(q.cfg.key==="master") v.innerHTML="🏆 恭喜！這一課 <b>精熟</b> 達成！";
    else v.innerHTML=`✅ 過關！解鎖下一關 <b>${STAGES.find(s=>s.need===q.cfg.stage)?.name||""}</b>`;
    const nextStage=STAGES.find(s=>s.need===q.cfg.stage);
    if(nextStage){ nextBtn.classList.remove("hidden"); nextBtn.textContent="前往 "+nextStage.name+" →"; nextBtn.onclick=()=> nextStage.key==="read"?startCards():startQuiz(nextStage.key); }
    else { nextBtn.classList.add("hidden"); }
  } else {
    v.className="verdict fail";
    const need=Math.ceil(q.cfg.pass*total);
    v.innerHTML=`再加油！這一關要答對 <b>${need}/${total}</b> 才能過。再挑戰一次，題目會換新的！`;
    nextBtn.classList.add("hidden");
  }
  document.getElementById("rRetry").onclick=()=>startQuiz(q.key);
  show("result");
}

function resetAll(){ if(confirm("確定清除所有課程的闖關進度嗎？")){ localStorage.removeItem(STORE_KEY); goHome(); } }
goHome();
</script>
</body>
