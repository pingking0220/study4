<style>

  .qtype{font-size:.78rem; font-weight:700; padding:2px 8px; border-radius:6px; background:#eef2f7; color:var(--muted); margin-right:8px;}
  .opts{display:flex; flex-direction:column; gap:10px;}

  .feedback{margin-top:14px; padding:12px 14px; border-radius:12px; font-weight:600; display:none;} .feedback.show{display:block;}

  .result{text-align:center; padding:10px 6px;} .result .big{font-size:3rem; margin:6px 0;} .result .score{font-size:1.3rem; font-weight:800;}
  .verdict{font-size:1.1rem; font-weight:800; margin:10px 0; padding:12px; border-radius:12px;} .verdict.pass{background:#e7f9ee; color:#15803d;} .verdict.fail{background:#fdf0e1; color:#a85a17;}
  footer{ text-align:center; color:var(--muted); font-size:.8rem; margin-top:30px;}
  @media(max-width:520px){ header.top h1{font-size:1.22rem} .qtext{font-size:1.05rem} .readcard .big{font-size:1.15rem} .flipfront .w{font-size:1.7rem} }
</style>

常遭車輛輾壓，墾丁國家公園設生態廊道等護蟹措施保護陸蟹。"}, {"lv": 3, "type": "tf", "q": "政府制定車輛行經路口要停讓行人的規定，是為了維護行人的安全。", "answer": true, "explain": "考量車輛增加及部分駕駛不遵守規定，政府制定停讓行人規定以維護行人安全。"}, {"lv": 3, "type": "tf", "q": "偏遠地區因公車班次及路線少，政府設置可事先預約的幸福巴士、幸福小黃。", "answer": true, "explain": "課本指出政府設置幸福巴士、幸福小黃，居民可透過事前預約搭乘，滿足交通需求。"}, {"lv": 3, "type": "tf", "q": "飛機規定和限制比較多，是因為飛機便宜又不重要，所以隨便規定。", "answer": false, "explain": "是因為飛機在高空飛行需精密設備確保飛航安全，一旦出事會危及全機乘客與地面，故規定多。"}, {"lv": 3, "type": "tf", "q": "國道6號水沙連高速公路多以高架橋梁建造，是為了盡量保留原有地貌、減少對環境的破壞。", "answer": true, "explain": "課本指出國道6號多以高架橋梁為主，盡可能保留原有地貌與自然景觀，減少破壞。"}, {"lv": 3, "type": "tf", "q": "開發道路、橋梁或隧道完全不會影響自然環境。", "answer": false, "explain": "開發道路、橋梁或隧道多少都會影響自然環境，造成樹木、草地、動植物消失。"}, {"lv": 3, "type": "tf", "q": "市區道路車輛增加，可能會影響行人的用路安全。", "answer": true, "explain": "課本指出市區道路車輛增加可能會影響行人的用路安全，是運輸發展的負面影響之一。"}, {"lv": 3, "type": "tf", "q": "山區的農產品可以透過公路運送到市區，使山區產業得以發展，這是運輸發展的正面影響。", "answer": true, "explain": "課本以拉拉山水蜜桃為例，說明公路使山區農產品外送、促進產業發展。"}, {"lv": 3, "type": "tf", "q": "強調「行人路權優先」，是因為行人是所有用路人中較為弱勢的族群。", "answer": true, "explain": "課本指出行人是較弱勢的族群，為減少傷亡而強調行人路權優先。"}, {"lv": 3, "type": "tf", "q": "幸福巴士、幸福小黃和一般固定班次公車一樣，乘客不可以事先預約。", "answer": false, "explain": "幸福巴士、幸福小黃可透過事前預約搭乘，較有彈性，與固定班次公車不同。"}, {"lv": 3, "type": "tf", "q": "車站的增建為周邊帶來便利，也可能吸引人口移入。", "answer": true, "explain": "課本以新北三重區為例，說明車站增建帶來便利並吸引人口移入。"}, {"lv": 3, "type": "choice", "q": "墾丁國家公園設立告示牌、交通管制及生態廊道，主要的目的是什麼？", "options": ["增加觀光收入", "加快車輛通行速度", "保護陸蟹安全抵達海邊產卵", "興建更多公路"], "answer": 2, "explain": "這些措施是為了保護陸蟹，讓牠們能安全橫越公路抵達海邊產卵。"}, {"lv": 3, "type": "choice", "q": "為什麼空中運輸的規定和限制比其他運輸方式多？", "options": ["因為飛機速度太慢", "因為飛機不能載貨", "因為飛機不受天氣影響", "因為要確保飛航安全，避免危及全機與地面人員"], "answer": 3, "explain": "飛機高空飛行需精密設備確保安全，一旦出事會危及全機乘客與地面，故規定限制較多。"}, {"lv": 3, "type": "choice", "q": "政府在偏遠地區設置「幸福巴士、幸福小黃」，最主要是為了解決什麼問題？", "options": ["偏遠地區公車班次與路線少、居民外出不便", "都市捷運太擁擠", "海邊陸蟹被輾壓", "飛機班機常延誤"], "answer": 0, "explain": "偏遠地區公車班次及行經路線少，政府設置幸福巴士、幸福小黃方便居民外出上學、就醫與購物。"}, {"lv": 3, "type": "choice", "q": "下列哪一項是運輸發展可能帶來的「負面」影響？", "options": ["促進產業發展", "方便居民往來各地", "破壞自然環境、影響行人安全", "交流訊息更便利"], "answer": 2, "explain": "運輸發展的負面影響包括破壞自然環境、影響行人的用路安全。"}, {"lv": 3, "type": "choice", "q": "國道6號水沙連高速公路多以高架橋梁建造，最主要的考量是什麼？", "options": ["節省建造經費", "讓車速更快", "方便陸蟹爬行", "保留原有地貌、減少對環境的破壞"], "answer": 3, "explain": "課本指出以高架橋梁為主是為了盡可能保留原有地貌與自然景觀，減少對環境破壞。"}, {"lv": 3, "type": "choice", "q": "要達成「人們生活與環境的永續平衡」，興建運輸設施時應該怎麼做？", "options": ["謹慎評估、適度興建", "盡量多建，越多越好", "完全不要興建任何設施", "只考慮人不考慮環境"], "answer": 0, "explain": "課本指出應謹慎評估、適度興建運輸設施，以降低對環境的危害。"}, {"lv": 3, "type": "choice", "q": "住在偏遠地區的阿嬤想去診所看病，但公車班次很少，下列哪一個方法最能幫助她？", "options": ["請她自己走路三小時", "事先預約幸福巴士或幸福小黃", "等飛機來載她", "在家裡等公車自然變多"], "answer": 1, "explain": "政府在偏遠地區設置幸福巴士、幸福小黃，可事先預約，方便居民就醫、購物。"}, {"lv": 3, "type": "choice", "q": "下列哪一項做法最符合「兼顧自然生態的運輸設計」？", "options": ["把樹林全部砍掉拓寬道路", "在陸蟹路線上設立生態廊道讓牠們安全通行", "禁止所有人使用道路", "加快車速縮短時間"], "answer": 1, "explain": "設立生態廊道、告示牌等可減少道路建設對動物的傷害，兼顧自然生態。"}, {"lv": 3, "type": "choice", "q": "開通公路會把原本的樹林切割成兩半，這說明了什麼？", "options": ["運輸發展完全沒有壞處", "樹林越多車越快", "公路一定要蓋在樹林中央", "運輸建設可能破壞動植物的生存環境"], "answer": 3, "explain": "道路開發會切割棲地、造成樹木與動植物消失，是運輸發展對環境的負面影響。"}, {"lv": 3, "type": "choice", "q": "下列哪一項最能說明「運輸發展的正面影響」？", "options": ["影響行人用路安全", "破壞當地自然環境", "促進產業與人口的發展、生活更便利", "造成空氣汙染"], "answer": 2, "explain": "運輸發展的正面影響是讓生活更便利、促進產業或人口的發展。"}, {"lv": 3, "type": "choice", "q": "為了減少行人遭汽機車撞擊傷亡，政府強調行人在使用穿越道時擁有什麼？", "options": ["優先付費權", "路權（行人路權優先）", "停車權", "開車權"], "answer": 1, "explain": "課本強調行人路權優先，行人使用穿越道時即擁有路權，汽機車須禮讓。"}, {"lv": 3, "type": "choice", "q": "下列哪一種情況最能看出「同一段路程需要結合多種運輸方式」？", "options": ["在同一條馬路上來回散步", "從高雄坐火車到臺東，再換飛機或船到綠島", "在家裡看交通影片", "只在社區內騎自行車"], "answer": 1, "explain": "前往離島綠島需結合陸上（火車）與空中或水上（飛機或船）運輸，是多種方式的結合。"}, {"lv": 3, "type": "choice", "q": "小華家住山區，農產品要運到市區銷售。下列敘述何者最正確？", "options": ["山區完全無法運送農產品", "可透過公路將農產品運送到市區，促進產業發展", "只能靠飛機運送農產品", "運送農產品對產業沒有幫助"], "answer": 1, "explain": "課本指出山區農產品可透過公路運送到市區，使山區產業得以發展。"}, {"lv": 3, "type": "choice", "q": "屏東縣雖然多平原，卻沒有像大都市一樣興建高密集度的捷運，最主要的原因是什麼？", "options": ["屏東沒有平地", "屏東禁止興建捷運", "屏東只能發展水上運輸", "屏東沒有高密集度人口需要捷運來載送"], "answer": 3, "explain": "興建運輸設施也要考量人口與經濟需求，屏東縣沒有高密集度人口需要捷運來載送。"}, {"lv": 3, "type": "choice", "q": "下列哪一項做法最能「同時兼顧運輸便利與保護環境」？", "options": ["興建道路時完全不考慮動物棲地", "以高架橋梁或生態工法減少對環境的破壞", "把所有山地都剷平蓋路", "禁止任何運輸建設"], "answer": 1, "explain": "如水沙連高速公路以高架橋梁、生態工法減少水泥用量與環境破壞，兼顧便利與環保。"}, {"lv": 3, "type": "tf", "q": "我們應該了解每個地方交通條件的差異，並尊重不同的生活方式。", "answer": true, "explain": "課本指出各地環境與條件不同，居民生活差異大，我們應了解差異並尊重不同生活方式。"}, {"lv": 3, "type": "tf", "q": "鼓勵民眾多使用大眾運輸、減少一人一車，有助於減少空氣汙染與交通擁擠。", "answer": true, "explain": "課本指出民眾多使用大眾運輸、減少一人一車的駕駛，可避免更擁擠的交通並減少空氣汙染。"}, {"lv": 3, "type": "choice", "q": "市區車輛增加後，政府制定「路口停讓行人」的規定，這反映了運輸發展的哪一面？", "options": ["只看到便利的一面", "必須兼顧安全、處理運輸帶來的負面影響", "運輸發展沒有任何問題", "行人不需要被保護"], "answer": 1, "explain": "車輛增加會影響行人安全，政府制定停讓規定正是為了處理運輸發展帶來的負面影響、兼顧安全。"}, {"lv": 3, "type": "choice", "q": "墾丁的陸蟹媽媽要到海邊產卵時，常遇到什麼危險？牠最需要的是什麼幫助？", "options": ["橫越公路時被車輛輾壓；需要生態廊道等護蟹措施", "海水太冷；需要加熱器", "沒有食物；需要餵食站", "太陽太大；需要遮陽棚"], "answer": 0, "explain": "陸蟹橫跨人為開發的公路時常遭車輛輾壓，墾丁設生態廊道、告示與交通管制保護牠們。"}, {"lv": 3, "type": "choice", "q": "下列哪一種選擇運輸方式的做法最合適？", "options": ["不管去哪都一定要搭飛機", "依目的地、時間等情形選擇合適的運輸工具", "只搭最貴的交通工具才安全", "隨便亂選反正都會到"], "answer": 1, "explain": "居民外出會考量目的地、時間等情形，選擇合適的運輸工具。"}, {"lv": 3, "type": "choice", "q": "環狀線捷運優點是縮短站距、省時，缺點是噪音干擾居民。從這個例子可以學到什麼？", "options": ["捷運完全沒有缺點", "運輸設施有優點也有缺點，設計時要評估與改善", "噪音越大越好", "應該禁止興建所有捷運"], "answer": 1, "explain": "課本以環狀捷運說明運輸設施有優缺點，設計時應評估並思考改善方式（如氣密窗、地下化）。"}, {"lv": 3, "type": "choice", "q": "水沙連高速公路採用生態工法、減少水泥用量，主要帶來下列哪一種好處？", "options": ["讓道路變得更貴", "減少二氧化碳排放、降低對環境的危害", "讓車子開得更快更危險", "增加水泥工廠的生意"], "answer": 1, "explain": "以生態工法施作可減少水泥用量與二氧化碳排放，並縮短對外道路、減少碳排放。"}, {"lv": 3, "type": "choice", "q": "下列哪一項「同時」說明了運輸發展的正面與負面影響？", "options": ["只會帶來便利", "公路讓農產品外送促進產業，但開路也可能破壞樹林棲地", "只會破壞環境", "和居民生活完全無關"], "answer": 1, "explain": "運輸發展既能促進產業、便利生活（正面），也可能破壞自然環境、影響安全（負面）。"}, {"lv": 3, "type": "tf", "q": "如果一個地方設置運輸設施後使用頻率不高、造成營運虧損，也會影響要不要興建的決定。", "answer": true, "explain": "課本補充指出興建運輸設施會考量人口與經濟需求，使用率低、虧損也會影響興建與否。"}, {"lv": 3, "type": "tf", "q": "陸蟹遭公路車輛輾壓，是運輸建設可能對野生動物造成傷害的例子。", "answer": true, "explain": "墾丁陸蟹橫越公路常遭輾壓，正是運輸建設影響野生動物的例子，故需護蟹措施。"}], "words": [{"w": "陸上運輸", "info": "在陸地上載人或載貨的方式，像公路、鐵路、捷運、高鐵都是。"}, {"w": "水上運輸", "info": "靠海、有湖泊或河流的地方，用船在水上載人和貨物。"}, {"w": "空中運輸", "info": "用飛機在天空載人或貨物，速度快、可以飛到很遠的國家。"}, {"w": "公路", "info": "給汽車、機車、行人走的道路，例如國道、省道、縣道。"}, {"w": "鐵路", "info": "讓火車在鐵軌上行駛的設施，像臺鐵、高鐵、捷運，載運量大、速度快。"}, {"w": "橋梁", "info": "蓋在河流或山谷上的通道，讓道路可以跨過河、越過山谷。"}, {"w": "隧道", "info": "在山裡面挖出的通道，讓道路或鐵路可以穿過山。"}, {"w": "碼頭", "info": "讓船停靠的地方，可以上下旅客或搬運貨物。"}, {"w": "港口", "info": "船舶停靠、裝卸貨物的地方，一個港口可以有很多座碼頭。"}, {"w": "渡輪", "info": "可以同時載人和載車輛的船，常用在離島或短程往來，像旗津到鼓山。"}, {"w": "貨輪", "info": "專門用來運送大量貨物的大船，可以開到世界各地。"}, {"w": "生態廊道", "info": "為了保護動物而設置的通道，讓動物可以安全通過馬路，不被車子撞到。"}], "apply": ["說說看，你的家鄉有哪些交通工具？平常上學會搭哪一種？", "想一想，從你家出發到外縣市玩，會用到哪些運輸方式？", "你覺得蓋一條新的馬路，會不會影響附近的動物或環境呢？說說你的想法。", "如果家鄉公車班次很少，你會建議政府怎麼幫忙居民出門？"]}, {"id": "3-2", "name": "3-2　訊息的傳遞", "cards": [{"tier": "基礎", "text": "人們傳遞訊息，<br>是為了<span class='hl'>溝通、聯繫情感</span>。"}, {"tier": "基礎", "text": "現在的傳遞方式：口耳相傳、書信郵寄、<br>電話、<span class='hl'>網路通訊</span>、智慧型手機。"}, {"tier": "基礎", "text": "早期的傳遞方式：<br><span class='hl'>飛鴿傳書、旗語、烽火、電報、摩斯密碼</span>。"}, {"tier": "基礎", "text": "智慧型手機、平板能攜帶又能上網，<br>叫做「<span class='hl'>行動載具</span>」。"}, {"tier": "進階", "text": "各種傳遞方式的共同優點：<br><span class='hl'>打破時間與空間的限制</span>。"}, {"tier": "進階", "text": "網路通訊的功能：即時聯絡、查詢資料、<br>學習知識、休閒娛樂、購物消費。"}, {"tier": "進階", "text": "網路通訊也有壞處：網路謠言、<br>難辨真假、<span class='hl'>網路成癮</span>、用太久傷身體。"}, {"tier": "深入", "text": "面對網路訊息要<span class='hl'>先查證、判斷真假</span><br>（可查臺灣事實查核中心）。"}, {"tier": "深入", "text": "護眼：用眼 <span class='hl'>30 分鐘</span>，休息 <span class='hl'>10 分鐘</span>；<br>妥善分配使用時間。"}, {"tier": "深入", "text": "尊重<span class='hl'>肖像權</span>：上傳合照要先經對方同意；<br>不可隨意下載別人的照片來用。"}, {"tier": "深入", "text": "不隨意轉傳沒有根據的訊息，<br>遵守<span class='hl'>網路禮儀</span>。"}], "questions": [{"lv": 1, "type": "tf", "q": "人們為了溝通、聯繫情感等需要，發展出各種傳遞訊息的方法。", "answer": true, "explain": "課本指出，人們為了溝通、聯繫情感等需要，才發展出各種傳遞訊息的方法。"}, {"lv": 1, "t 風貌，能呈現居民生活與歷史文化。"}, {"lv": 3, "type": "tf", "q": "野柳的奇特岩石和七股的黑面琵鷺，雖然一個是岩石、一個是動物，但都屬於自然風貌。", "answer": true, "explain": "奇特岩石與候鳥生態都是大自然形成，皆屬自然風貌。"}, {"lv": 3, "type": "tf", "q": "要完整介紹家鄉之美，可以同時運用畫圖、攝影與文字並與他人分享。", "answer": true, "explain": "課本建議結合畫圖、攝影、文字記錄家鄉，並與更多人分享。"}, {"lv": 3, "type": "tf", "q": "客家庄舉辦的桐花季活動和山上野生盛開的油桐花，屬於完全相同的一類風貌。", "answer": false, "explain": "野生油桐花是自然風貌，人類舉辦的桐花季活動則是人文風貌。"}], "words": [{"w": "自然風貌", "info": "受到地形、氣候影響而形成的特別風景，像奇特的岩石、湖泊、動植物。"}, {"w": "人文風貌", "info": "人們生活中創造出來的特色，像產業活動、建築、節慶等。"}, {"w": "翠峰湖", "info": "宜蘭縣山上的高山湖泊，湖水清澈、生態豐富，是臺灣最大的高山湖泊。"}, {"w": "野柳", "info": "新北市萬里區海邊的地方，有女王頭等奇特岩石，是海浪長時間拍打形成的。"}, {"w": "油桐花", "info": "苗栗等山區四、五月盛開的白花，花落時像下雪，被稱為五月雪。"}, {"w": "黑面琵鷺", "info": "稀少的候鳥，每年冬天會飛到臺南七股溼地過冬。"}, {"w": "石滬", "info": "早期漁民用海邊礁石排成的捕魚陷阱，展現先民捕魚的智慧。"}, {"w": "大溪橋", "info": "桃園市大溪區的橋，改建成西式造型後成為吸引遊客的美麗景點。"}, {"w": "原住民族祭典", "info": "原住民族的傳統節慶，像魯凱族的小米收穫祭，會穿傳統服飾、唱歌跳舞。"}, {"w": "產業活動", "info": "居民工作、生產的活動，像捕魚、種田，是家鄉人文風貌的一部分。"}, {"w": "節慶活動", "info": "家鄉舉辦的慶典或祭典，展現當地居民的生活與文化。"}, {"w": "攝影記錄", "info": "用照相機把家鄉的風景拍下來，保留家鄉真實的樣子。"}], "apply": ["說說看，你的家鄉有哪些特別的風景或建築？", "想一想，你的家鄉有沒有什麼節慶或祭典？大家會做些什麼？", "你會用畫圖、攝影還是寫文字，把家鄉的美介紹給別人？為什麼？", "如果有外地的朋友來你的家鄉玩，你會帶他去看哪裡？"]}, {"id": "4-2", "name": "4-2　家鄉的特產", "cards": [{"tier": "基礎", "text": "特產是家鄉居民生產、<br><span class='hl'>具有特色</span>的物品。"}, {"tier": "基礎", "text": "各地特產不同，和當地的<br><span class='hl'>自然環境、氣候、產業、歷史文化</span>有關。"}, {"tier": "進階", "text": "特產類型①：配合自然環境生產的<span class='hl'>農作物／水產品</span><br>（三星蔥、林邊蓮霧、布袋虱目魚）。"}, {"tier": "進階", "text": "特產類型②：加工製成的<span class='hl'>食品</span><br>（玉井芒果乾、成功柴魚片）。"}, {"tier": "進階", "text": "特產類型③：利用自然資源做的<span class='hl'>生活用品／工藝品</span><br>（鶯歌陶瓷、埔里手工紙、美濃油紙傘、三地門皮雕）。"}, {"tier": "進階", "text": "加工的好處：<span class='hl'>延長保存、避免浪費、增加收入</span>。"}, {"tier": "深入", "text": "遊客來觀光採購的家鄉特產，叫「<span class='hl'>伴手禮</span>」，<br>是居民的收入來源之一。"}, {"tier": "深入", "text": "<span class='hl'>農漁會</span>會用網站行銷在地的農漁產品。"}, {"tier": "深入", "text": "推廣特產常結合<span class='hl'>觀光、節慶</span><br>（南投世界茶業博覽會、三義木雕節），促進地方經濟。"}], "questions": [{"lv": 1, "type": "choice", "q": "關於「特產」的意思，下列哪一項說法正確？", "options": ["特產是從外國進口的稀有物品", "特產是家鄉居民從事產業活動所生產、具有特色的物品", "特產是政府配發給每戶人家的物品", "特產是工廠隨意大量製造的普通商品"], "answer": 1, "explain": "特產是家鄉居民從事產業活動所生產的特色物品。"}, {"lv": 1, "type": "choice", "q": "宜蘭縣三星鄉最有名的特色農作物是什麼？", "options": ["蓮霧", "虱目魚", "青蔥（三星蔥）", "芒果"], "answer": 2, "explain": "三星鄉雨量多、水質良好，生長的青蔥蔥白長、香味濃郁。"}, {"lv": 1, "type": "choice", "q": "屏東縣林邊鄉氣候溫暖，生長的哪一種水果甜度很高？", "options": ["草莓", "蓮霧", "葡萄", "梅子"], "answer": 1, "explain": "林邊鄉氣候溫暖，生長的蓮霧甜度高。"}, {"lv": 1, "type": "choice", "q": "嘉義縣布袋鎮鄰近海邊，當地開闢魚塭養殖的水產品是什麼？", "options": ["鰹魚", "虱目魚", "太陽餅", "葡萄"], "answer": 1, "explain": "布袋鎮鄰近海邊，開闢魚塭養殖虱目魚。"}, {"lv": 1, "type": "choice", "q": "臺南市玉井區的居民把當地種植的芒果，用什麼方式製作成芒果乾？", "options": ["冷凍", "油炸", "烘烤", "醃漬"], "answer": 2, "explain": "玉井區居民將當地種植的芒果，以烘烤方式製作成芒果乾。"}, {"lv": 1, "type": "choice", "q": "臺東縣成功鎮的居民，把出海捕捉到的鰹魚加工製作成什麼特產？", "options": ["蓮霧", "陶瓷", "三星蔥", "柴魚片"], "answer": 3, "explain": "成功鎮居民將捕捉到的鰹魚，透過蒸熟、燒烤、刨削等方式加工製作成柴魚片。"}, {"lv": 1, "type": "choice", "q": "新北市鶯歌區的居民運用當地的黏土，主要製作出哪一類特產？", "options": ["陶瓷用品", "油紙傘", "手工紙", "皮雕"], "answer": 0, "explain": "鶯歌區居民運用當地黏土，製作成茶壺、碗盤等陶瓷用品。"}, {"lv": 1, "type": "choice", "q": "南投縣埔里鎮為了保存傳統產業，努力推廣哪一種工藝的文化教育？", "options": ["陶瓷", "木雕", "皮雕", "手工造紙"], "answer": 3, "explain": "埔里鎮的造紙業者為了保存傳統的手工造紙產業，推廣紙藝文化教育。"}, {"lv": 1, "type": "choice", "q": "高雄市美濃區的油紙傘，是當地哪一個族群文化的傳統工藝品？", "options": ["閩南文化", "客家文化", "原住民族文化", "外省文化"], "answer": 1, "explain": "美濃區油紙傘是當地客家文化的傳統工藝品，象徵幸福、吉祥。"}, {"lv": 1, "type": "choice", "q": "屏東縣三地門鄉的皮雕工藝師，把哪一種圖紋結合創意製作成手工藝品？", "options": ["客家花布圖紋", "日本浮世繪圖紋", "原住民族圖紋", "西洋幾何圖紋"], "answer": 2, "explain": "三地門鄉的皮雕工藝師將原住民族圖紋結合創意，製作出有特色的手工藝品。"}, {"lv": 1, "type": "choice", "q": "外地遊客來到家鄉觀光時所採購的家鄉特產，稱為什麼？", "options": ["紀念章", "入場券", "土產券", "伴手禮"], "answer": 3, "explain": "外地遊客在觀光時所採購的家鄉特產，稱為伴手禮。"}, {"lv": 1, "type": "choice", "q": "把農作物或水產品加工製成食品，有什麼好處？", "options": ["可以延長食物的保存期限", "會讓食物更快腐爛", "會減少居民的收入", "會讓食物失去特色"], "answer": 0, "explain": "加工後可以延長食物的保存 ype": "tf", "q": "把容易腐壞的鰹魚加工成柴魚片，反而會讓漁產更快壞掉、更容易浪費。", "answer": false, "explain": "加工是為了延長保存、避免腐爛浪費，不會讓漁產更快壞掉。"}, {"lv": 3, "type": "tf", "q": "遊客來家鄉觀光採購伴手禮，能為當地帶來收入，是居民收入來源之一。", "answer": true, "explain": "遊客採購伴手禮帶來收入，是家鄉居民收入來源之一。"}, {"lv": 3, "type": "tf", "q": "家鄉舉辦特產活動結合觀光與節慶，既能展現家鄉特色，也能促進地方經濟發展。", "answer": true, "explain": "結合觀光、節慶的特產活動能展現特色並促進地方經濟。"}, {"lv": 3, "type": "tf", "q": "鶯歌居民利用當地黏土做陶瓷，說明特產的形成和當地的自然資源有關。", "answer": true, "explain": "就地取材利用黏土做陶瓷，顯示特產與當地自然資源相關。"}, {"lv": 3, "type": "tf", "q": "不同家鄉舉辦的特產活動之所以不同，是因為各地的特產不同。", "answer": true, "explain": "各家鄉結合自己的在地特產舉辦活動，所以活動會不一樣。"}, {"lv": 3, "type": "tf", "q": "屏東林邊產蓮霧、臺南玉井產芒果，這顯示自然環境不同會使各地特色水果不同。", "answer": true, "explain": "各地自然環境與氣候不同，會有不同的特色農作物。"}, {"lv": 3, "type": "tf", "q": "農漁會透過網站行銷在地農漁產品，目的是幫助銷售並增加居民收入。", "answer": true, "explain": "網站行銷有助於打開銷路、增加居民收入。"}, {"lv": 3, "type": "tf", "q": "認識家鄉特產對了解家鄉文化沒有任何幫助。", "answer": false, "explain": "有些特產帶有人文特色，認識特產能加深對家鄉文化的體認。"}, {"lv": 3, "type": "tf", "q": "把農產品包裝成商品再販售，有助於行銷與運送，能增加居民收入。", "answer": true, "explain": "包裝成商品有利於銷售與運送，是推廣在地農產品、增加收入的做法。"}, {"lv": 3, "type": "tf", "q": "客家油紙傘的吉祥象徵意義，說明特產只看價錢、與文化無關。", "answer": false, "explain": "油紙傘的象徵意義正說明特產能反映當地傳統文化，並非只看價錢。"}, {"lv": 3, "type": "tf", "q": "特產源自家鄉的產業活動，與自然環境、氣候、歷史文化都息息相關。", "answer": true, "explain": "地方特產的形成與自然環境、氣候、產業、歷史文化息息相關。"}, {"lv": 3, "type": "tf", "q": "把新鮮芒果加工成芒果乾後，更方便寄送到遠方而不容易腐壞。", "answer": true, "explain": "加工延長保存期限，使特產更方便運送與保存。"}, {"lv": 3, "type": "tf", "q": "推廣家鄉特產只會浪費金錢，對地方經濟沒有任何幫助。", "answer": false, "explain": "推廣特產能展現家鄉特色，並能促進地方經濟發展。"}, {"lv": 3, "type": "tf", "q": "虱目魚是在魚塭養殖的水產品，這和布袋鎮鄰近海邊的自然環境有關。", "answer": true, "explain": "布袋鎮鄰近海邊，適合開闢魚塭養殖虱目魚，顯示特產與自然環境相關。"}, {"lv": 3, "type": "tf", "q": "同樣是把農漁產加工的特產，芒果乾和柴魚片都達到了延長保存、避免浪費的效果。", "answer": true, "explain": "兩者都是加工食品，都能延長保存期限、避免農漁產腐爛浪費。"}], "words": [{"w": "特產", "info": "家鄉居民生產、有當地特色的物品，不同家鄉常有自己的特產。"}, {"w": "農作物", "info": "農民種出來的東西，像宜蘭三星的青蔥、屏東林邊的蓮霧。"}, {"w": "水產品", "info": "從海裡或魚塭養殖、捕撈來的東西，像嘉義布袋的虱目魚。"}, {"w": "加工食品", "info": "把農作物或水產品再製作而成的食品，像芒果乾、柴魚片。"}, {"w": "工藝品", "info": "用當地自然資源做出的生活用品或手工藝品，像鶯歌陶瓷、美濃油紙傘。"}, {"w": "伴手禮", "info": "外地遊客來家鄉觀光時，會採購帶走的家鄉特產。"}, {"w": "農會", "info": "當地農民組成的團體，幫忙包裝、銷售在地的農產品。"}, {"w": "漁會", "info": "當地漁民組成的團體，負責介紹和銷售當地的漁產品。"}, {"w": "自然資源", "info": "大自然本來就有、對生活有用的東西，像水、土壤、植物。"}, {"w": "推廣活動", "info": "結合觀光、節慶舉辦的活動，用來介紹和推廣家鄉特產。"}, {"w": "觀光節慶", "info": "像木雕藝術節、世界茶業博覽會，吸引遊客來認識家鄉特產。"}, {"w": "陶瓷用品", "info": "用當地黏土做成的茶壺、碗盤等器具，是新北鶯歌的特產。"}], "apply": ["說說看，你的家鄉有什麼特產？你會怎麼向別人介紹它？", "想一想，為什麼不同的家鄉會有不一樣的特產？", "你有沒有跟家人去外地買過伴手禮？那是什麼特產？", "如果你要幫家鄉的特產做宣傳海報，你會寫些什麼？"]}, {"id": "4-3", "name": "4-3　愛我家鄉", "cards": [{"tier": "基礎", "text": "愛護家鄉有三個面向：<br><span class='hl'>友善環境、保存文化、為家鄉盡心力</span>。"}, {"tier": "基礎", "text": "友善環境：參與<span class='hl'>淨灘</span><br>（撿垃圾、把海洋廢棄物再利用）。"}, {"tier": "基礎", "text": "友善環境：用友善土地的方式耕作，<br><span class='hl'>不用農藥、化肥</span>。"}, {"tier": "進階", "text": "「<span class='hl'>老鷹紅豆</span>」：農民改用農機把紅豆種子深埋，<br>小鳥不吃豆苗，老鷹也不再中毒。"}, {"tier": "進階", "text": "保存文化：用行動<span class='hl'>記錄家鄉</span><br>（臺南將軍國小拍紀錄片、做繪本，記錄神明帽老店）。"}, {"tier": "深入", "text": "為家鄉盡心力：主動關心公共事務、<br>用<span class='hl'>實際行動</span>解決問題。"}, {"tier": "深入", "text": "例子：新北野柳國小學生<span class='hl'>寫信給市長</span>、<br>用竹叢礁成功復育軟絲。"}, {"tier": "深入", "text": "愛護家鄉是<span class='hl'>每一個人</span>的責任。"}], "questions": [{"lv": 1, "type": "choice", "q": "愛護家鄉有三個面向，下列何者「不是」其中之一？", "options": ["友善環境、重視生態", "保存文化、永續發展", "為家鄉盡心力", "破壞自然、發展工業"], "answer": 3, "explain": "愛護家鄉的三個面向是友善環境重視生態、保存文化永續發展、為家鄉盡心力，破壞自然並非愛護家鄉的方式。"}, {"lv": 1, "type": "choice", "q": "許多人到海邊「撿拾垃圾」、清理沙灘的活動稱為什麼？", "options": ["淨灘", "插秧", "登山", "划船"], "answer": 0, "explain": "到海邊撿拾垃圾、清理沙灘的活動稱為淨灘，可以維護海洋與沙灘環境。"}, {"lv": 1, "type": "choice", "q": "友善土地的耕作方式，主要是「不使用」下列哪些東西？", "options": ["陽光和雨水", "農藥和化學肥料", "農機和種子", "土壤和水分"], "answer": 1, "explain": "友善土地的耕作方式不使用農藥和化學肥料，以減少對土地及自然生態的破壞。"}, {"lv": 1, "type": "choice", "q": "「老鷹紅豆」故事中，老鷹一開始為什麼會中毒？", "options": ["吃了被農藥毒死的小鳥屍體", "喝了受汙染的河水", "吃了噴農藥的紅豆", "被獵人開槍射傷"], "answer": 0, "explain": "農民撒下摻了農藥的稻穀毒小鳥，老鷹吃了中毒小鳥的屍體，因此跟著中毒。"}, {"lv": 1, "type": "choice", "q": "屏東縣農民後來改用什麼方法種紅豆，讓小鳥不再吃豆苗？", "options": ["用稻草蓋住豆苗", "用農機把紅豆種子深埋進土裡", "在田裡放稻草人", "用網子蓋住整片田"], "answer": 1, "explain": "屏東農民改用農機把紅豆種子深深埋進土裡，豆苗長出地面時已又粗又壯，小鳥就不吃豆苗了。"}, {"lv": 1, "type": "choice", "q": "臺南市將軍國小的學生，用哪些方法記錄家鄉的事物？", "options": ["蓋新大樓", "拍攝紀錄片、製作繪本", "開設工廠", "舉辦運動會"], "answer": 1, "explain": "將軍國小學生為了傳承家鄉文化，著手拍攝紀錄片、製作繪本，為家鄉建置影像資料庫。"}, {"lv": 1, "type": "choice", "q": "將軍國小學生製作的繪本「神明的造型師」，是以哪一種老店為故事主題？", "options": ["神明帽老店", "糖果老店", "書店", "麵店"], "answer": 0, "explain": "「神明的造型師」繪本以在地傳承三代的神明帽老店為故事主題，記錄保存這項手工技藝。"}, {"lv": 1, "type": "choice", "q": "新北市野柳國小的學生，為了反映海域生態遭破壞，做了什麼行動？", "options": ["寫信給市長", "搬離家鄉", "關閉漁港", "禁止大家吃魚"], "answer": 0, "explain": "野柳國小學生觀察到海域生態遭破壞、軟絲變少，於是寫信給新北市市長，希望恢復原有的海洋生態。"}, {"lv": 1, "type": "choice", "q": "野柳國小的學生利用什麼東西成功復育軟絲？", "options": ["塑膠箱", "竹叢礁", "漁網", "鐵籠"], "answer": 1, "explain": "在相關單位合作下，利用竹叢礁復育軟絲，竹叢礁有利於軟絲產卵，使軟絲數量逐漸增加。"}, {"lv": 1, "type": "choice", "q": "學生把在海邊撿到的廢棄物拿來做什麼，給予它們新生命？", "options": ["創作成藝術作品", "直接丟掉", "埋進沙裡", "賣給工廠"], "answer": 0, "explain": "學生利用海邊撿拾的廢棄物創作出藝術作品，給予廢棄物新生命，例如用廢棄雨衣做成水母玩偶。"}, {"lv": 1, "type": "choice", "q": "課文中提到，愛護家鄉是「誰」的責任？", "options": ["只有政府官員", "只有學校老師", "每一個人", "只有科學家"], "answer": 2, "explain": "課文強調愛護家鄉是每一個人的責任，大家都要主動關心並以實際行動參與解決家鄉的問題。"}, {"lv": 1, "type": "choice", "q": "有些家鄉的傳統文化面臨什麼樣的情形，所以需要我們關心保護？", "options": ["逐漸消失", "越來越多", "完全消失", "變得很有名"], "answer": 0, "explain": "有些家鄉的傳統文化面臨逐漸消失的情形，因此居民運用各種方式，將原本的文化注入嶄新的活力。"}, {"lv": 1, "type": "choice", "q": "野柳國小學生親手打造的「竹叢礁」，主要是用什麼材料做成的？", "options": ["竹子", "鋼鐵", "玻璃", "塑膠"], "answer": 0, "explain": "竹叢礁是用竹子做成的，放到海裡後有利於軟絲產卵，幫助復育海洋生態。"}, {"lv": 1, "type": "choice", "q": "過去有些家鄉的居民「不當使用」什麼，使得土地及自然生態受到破壞？", "options": ["農藥", "清水", "堆肥", "竹子"], "answer": 0, "explain": "過去有些家鄉居民不當使用農藥，使得土地及自然生態受到破壞，後來許多人才開始採用友善土地的耕作方式。"}, {"lv": 1, "type": "choice", "q": "老鷹紅豆故事的結局，老鷹的數量怎麼了？", "options": ["完全消失", "慢慢恢復", "沒有改變", "變得更少"], "answer": 1, "explain": "農民不再毒鳥後，老鷹也不再因為吃小鳥而中毒，數量開始慢慢恢復，重新翱翔於天空。"}, {"lv": 1, " const STORE_KEY = "soc4_balanced_v1";

  {ic:"🥉", name:"基礎關", pool:[1],     pass:0.8},
  {ic:"🥈", name:"中等關", pool:[1,2],   pass:0.8},
  {ic:"🥇", name:"進階關", pool:[2,3],   pass:0.8},
  {ic:"🏆", name:"精熟關", pool:[1,2,3], pass:1.0},
];
const STATIONS = [
  {key:"intro", ic:"📖", name:"重點導讀", desc:"先讀懂：由淺到深的重點小卡", gate:null},
  {key:"words", ic:"🔑", name:"關鍵字卡", desc:"翻卡記住重要名詞和概念", gate:null},
  {key:"apply", ic:"🌍", name:"生活應用", desc:"想一想，把學到的連到生活", gate:null},
  {key:"quiz",  ic:"✏️", name:"闖關測驗", desc:"分級測驗，檢查學會了沒", gate:"intro"},
];
function load(){ try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};} }
function save(o){ try{localStorage.setItem(STORE_KEY, JSON.stringify(o));}catch(e){} }
function lp(id){ return load()[id]||{}; }
function setDone(id,key){ const o=load(); o[id]=o[id]||{}; o[id][key]=true; save(o); }
function setQ(id,s){ const o=load(); o[id]=o[id]||{}; o[id].q=Math.max(o[id].q||0,s); save(o); }
function stationDone(id,key){ const p=lp(id); return key==="quiz"?(p.q||0)>=4:!!p[key]; }
function lessonMastered(id){ const p=lp(id); return p.intro&&p.words&&(p.q||0)>=4; }
const allLessons = DATA.flatMap(u=>u.lessons);
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

function renderHome(){
  const list=document.getElementById("unitList"); list.innerHTML="";
  DATA.forEach(u=>{
    const wrap=document.createElement("div"); wrap.className="unit"+(u.cls==="u4"?" u4":"");
    wrap.innerHTML=`<h2>${u.title}</h2>`;
    u.lessons.forEach(ls=>{
      const icons=STATIONS.map(s=>stationDone(ls.id,s.key)?s.ic:"⚪").join(" ");
      const mastered=lessonMastered(ls.id); const anyprog=STATIONS.some(s=>stationDone(ls.id,s.key));
      const badge=mastered?'<span class="badge master">🏆 完成</span>':(anyprog?'<span class="badge go">學習中</span>':'<span class="badge">未開始</span>');
      const card=document.createElement("div"); card.className="card";
      card.innerHTML=`<div class="lesson-head"><span class="name">${ls.name}</span>${badge}</div>

      wrap.appendChild(card);
    });
    list.appendChild(wrap);
  });
  const m=allLessons.filter(l=>lessonMastered(l.id)).length; const pct=Math.round(m/allLessons.length*100);

  document.getElementById("ovText").textContent=m===allLessons.length?"🎊 全部完成，太棒了！":`已完成 ${m} / ${allLessons.length} 課，加油！`;

function show(sec){ ["home","lesson","sect","quizmenu","quiz","result"].forEach(s=>document.getElementById(s).classList.toggle("hidden",s!==sec)); window.scrollTo({top:0,behavior:"smooth"}); }

let curId=null;
function findLesson(id){ return allLessons.find(l=>l.id===id); }
function openLesson(id){
  curId=id; const ls=findLesson(id);
  document.getElementById("lsName").textContent=ls.name;
  const mastered=lessonMastered(id); const b=document.getElementById("lsBadge");
  b.className="badge"+(mastered?" master":""); b.textContent=mastered?"🏆 完成":"學習中";
  const box=document.getElementById("stationList"); box.innerHTML="";
  STATIONS.forEach(st=>{
    const unlocked=!st.gate||stationDone(id,st.gate); const done=stationDone(id,st.key);
    let extra=""; if(st.key==="quiz"){ const q=lp(id).q||0; extra=q>0&&q<4?`（目前 ${QLEVELS[q-1].ic}）`:""; }
    const row=document.createElement("div"); row.className="station"+(done?" done":"")+(!unlocked?" locked":"");
    const act=!unlocked?`<span class="status lk">🔒 先讀導讀</span>`:`<button class="${done?'btn-soft':'btn-main'}" data-key="${st.key}">${done?'再看一次':'開始'}</button>`;
    row.innerHTML=`<div class="ic">${done?'✅':st.ic}</div><div class="info"><div class="t">${st.ic} ${st.name}${extra}</div><div class="d">${st.desc}</div></div><div class="act">${act}</div>`;
    box.appendChild(row);
  });
  box.querySelectorAll("button[data-key]").forEach(btn=>btn.addEventListener("click",()=>openStation(btn.getAttribute("data-key"))));
  show("lesson");
}
function backToLesson(){ openLesson(curId); }
function openStation(key){ if(key==="intro")startCards(); else if(key==="words")startWords(); else if(key==="apply")renderApply(); else if(key==="quiz")openQuizMenu(); }

  document.getElementById("flipc").onclick=()=>{ wd.flip=!wd.flip; renderWord(); };

    const stage=k+1; const unlocked=(k===0)?stationDone(id,"intro"):q>=k; const done=q>=stage;
    const row=document.createElement("div"); row.className="station"+(done?" done":"")+(!unlocked?" locked":"");
    const act=!unlocked?`<span class="status lk">🔒 ${k===0?'先讀導讀':'先過上一關'}</span>`:`<button class="${done?'btn-soft':'btn-main'}" data-lv="${k}">${done?'再挑戰':'開始'}</button>`;
    row.innerHTML=`<div class="ic">${done?'✅':lv.ic}</div><div class="info"><div class="t">${lv.ic} ${lv.name}</div><div class="d">${lv.pool.length===1?'最核心':(lv.pass>=1?'綜合全部，要全對':'答對 8/10 過關')}</div></div><div class="act">${act}</div>`;
    box.appendChild(row);
  });
  box.querySelectorAll("button[data-lv]").forEach(btn=>btn.addEventListener("click",()=>startQuiz(parseInt(btn.getAttribute("data-lv")))));
  show("quizmenu");
}
let q={lv:0,items:[],i:0,correct:0,answered:false};
function startQuiz(lvIdx){
  const cfg=QLEVELS[lvIdx]; const ls=findLesson(curId);
  let pool=ls.questions.filter(it=>cfg.pool.includes(it.lv));
  pool=shuffle(pool).slice(0,Math.min(ROUND,pool.length)).map(it=>{ if(it.type==="choice"){ const ix=shuffle(it.options.map((_,i)=>i)); return {...it,options:ix.map(i=>it.options[i]),answer:ix.indexOf(it.answer)}; } return it; });
  q={lv:lvIdx,items:pool,i:0,correct:0,answered:false}; show("quiz"); renderQ();
}
function renderQ(){
  q.answered=false; const it=q.items[q.i]; const cfg=QLEVELS[q.lv];
  document.getElementById("qLvl").textContent=`${cfg.ic} ${cfg.name}`;
  document.getElementById("qScore").textContent=`✔ ${q.correct} / ${q.items.length}`;
  document.getElementById("qBar").style.width=Math.round(q.i/q.items.length*100)+"%";
  document.getElementById("qText").innerHTML=`<span class="qtype">${it.type==="tf"?"是非題":"選擇題"}</span>${it.q}`;
  const opts=document.getElementById("qOpts"); opts.innerHTML="";
  (it.type==="tf"?["⭕ 對","❌ 錯"]:it.options).forEach((c,i)=>{ const b=document.createElement("button"); b.className="opt"; b.innerHTML=c; b.addEventListener("click",()=>answer(i,b)); opts.appendChild(b); });
  const fb=document.getElementById("qFb"); fb.className="feedback"; fb.innerHTML=""; document.getElementById("qNext").classList.add("hidden");
}
function answer(i,btn){
  if(q.answered)return; q.answered=true; const it=q.items[q.i]; const ci=it.type==="tf"?(it.answer?0:1):it.answer; const right=(i===ci);
  if(right)q.correct++;
  const opts=document.getElementById("qOpts").children; for(let k=0;k<opts.length;k++)opts[k].setAttribute("disabled","true");
  opts[ci].classList.add("correct"); if(!right)btn.classList.add("wrong");
  const fb=document.getElementById("qFb"); fb.className="feedback show "+(right?"good":"bad");
  fb.innerHTML=`<span class="lab">${right?"✅ 答對了！":"❌ 答錯了"}</span>${it.explain}`;
  document.getElementById("qScore").textContent=`✔ ${q.correct} / ${q.items.length}`;
  const nx=document.getElementById("qNext"); nx.classList.remove("hidden"); nx.textContent=(q.i===q.items.length-1)?"看結果 🎯":"下一題 →";
}
document.getElementById("qNext").addEventListener("click",()=>{ if(q.i<q.items.length-1){q.i++; renderQ();} else finishQuiz(); });
function finishQuiz(){
  const total=q.items.length, acc=q.correct/total, cfg=QLEVELS[q.lv], passed=acc>=cfg.pass;
  document.getElementById("qBar").style.width="100%";
  document.getElementById("rScore").textContent=`答對 ${q.correct} / ${total} 題（${Math.round(acc*100)}%）`;
  document.getElementById("rEmoji").textContent=passed?(q.lv===3?"🏆":"🎉"):"💪";
  const v=document.getElementById("rVerdict"); const nb=document.getElementById("rNext");
  if(passed){ setQ(curId,q.lv+1); v.className="verdict pass";
    if(q.lv===3)v.innerHTML="🏆 恭喜！通過 <b>精熟關</b>！"; else v.innerHTML=`✅ 過關！解鎖 <b>${QLEVELS[q.lv+1].name}</b>`;
    if(q.lv<3){ nb.classList.remove("hidden"); nb.textContent="前往 "+QLEVELS[q.lv+1].name+" →"; nb.onclick=()=>startQuiz(q.lv+1); } else nb.classList.add("hidden");
  } else { v.className="verdict fail"; const need=Math.ceil(cfg.pass*total); v.innerHTML=`再加油！這一關要答對 <b>${need}/${total}</b>。再試一次，題目會換新的！`; nb.classList.add("hidden"); }
  document.getElementById("rRetry").onclick=()=>startQuiz(q.lv); show("result");
}
function resetAll(){ if(confirm("確定清除所有課程的學習與闖關進度嗎？")){ localStorage.removeItem(STORE_KEY); goHome(); } }
goHome();
</script>
